<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>台湾華語 単語カード（TOCFL）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .speak-btn { margin-top: 8px; padding: 8px 16px; border-radius: 999px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: #f97316; color: white; }
    .mode-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .mode-btn { padding: 8px 24px; border-radius: 999px; border: 2px solid #3b82f6; background: white; color: #3b82f6; font-weight: bold; cursor: pointer; }
    .mode-btn.active { background: #3b82f6; color: white; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .quiz-option-btn { padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; background: white; font-size: 16px; cursor: pointer; transition: 0.2s; color: #000000; }
  </style>
</head>
<body>
  <div class="app">
    <h1>台湾華語 単語カード</h1>
    <div class="left-sidebar">
      <div id="category-bar" class="category-bar"></div>

      <div class="sheet-links">
        <div class="sheet-links-title">データ管理</div>
        <a href="https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/edit#gid=0" target="_blank" class="sheet-link">タブ1</a>
        <a href="https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/edit#gid=1997786373" target="_blank" class="sheet-link">タブ2</a>
        <a href="https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/edit#gid=386010793" target="_blank" class="sheet-link">タブ5</a>
        </div>

      <div class="sheet-links">
        <div class="sheet-links-title">チートシート・ツール</div>
        <a href="tool/time.html" target="_blank" class="sheet-link">🕒 時間表現マスター図解</a>
        
        <a href="tool/quiz.html?gid=1162710921&title=時間表現テスト" target="_blank" class="sheet-link">📝 時間表現テスト</a>
        </div>
    </div>
    
    <div class="mode-toggle">
      <button id="mode-card-btn" class="mode-btn active">カード</button>
      <button id="mode-quiz-btn" class="mode-btn">クイズ</button>
      <button id="mode-listening-btn" class="mode-btn">リスニング</button>
    </div>

    <div id="card-mode">
      <div class="card">
        <button id="bookmark-btn" class="bookmark-btn">☆</button>
        <div class="zh" id="word-zh"></div>
        <div class="pinyin" id="word-pinyin"></div>
        <div class="jp" id="word-jp"></div>
        <div class="note" id="word-note"></div>
        <button id="speak-btn" class="speak-btn">発音を聞く</button>
        <div class="counter" id="word-counter"></div>
      </div>
      <div class="buttons">
        <button id="prev-btn">前へ</button>
        <button id="random-btn">ランダム</button>
        <button id="next-btn">次へ</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
