      {"word": "部", "pinyin": "bù", "katakana": "", "meaning": "部（映画や機械の量詞）", "hint": "【数字・量詞】量詞", "category": "数字・量詞", "subcategory": "量詞"},

    ];

    const TARGET_SCORE = 3;
    const MOCK_COUNT = 20;

    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [gameType, setGameType] = useState('practice');
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [chunkIndex, setChunkIndex] = useState(0);
      const [mockList, setMockList] = useState([]);
      const [mockIdx, setMockIdx] = useState(0);
      const [mockScore, setMockScore] = useState(0);

      // グループ分けロジック (今回は品詞・サブカテゴリが変わるタイミングで、かつ60語前後で区切る)
      const chunks = useMemo(() => {
        const res = [];
        let cur = [];
        wordData.forEach((w, i) => {
          if (cur.length >= 60 && i > 0 && w.subcategory !== wordData[i-1].subcategory) {
            res.push(cur); cur = [];
          }
          cur.push(w);
        });
        if (cur.length > 0) res.push(cur);
        return res;
      }, []);

      const playAudio = (t) => {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = "zh-TW"; u.rate = 0.85;
        window.speechSynthesis.speak(u);
      };

      useEffect(() => {
        if (gameState === 'quiz' && currentWord && !selectedOption && gameMode === 'listening') {
          playAudio(currentWord.word);
        }
      }, [currentWord, gameState, gameMode, selectedOption]);

      const startPractice = (mode, idx) => {
        setGameType('practice'); setGameMode(mode); setChunkIndex(idx);
        const target = chunks[idx];
        const stats = {}; target.forEach(w => stats[w.word] = 0);
        setWordStats(stats); setGameState('quiz');
        genQuestion(target, stats);
      };

      const startMock = () => {
        setGameType('mock'); setGameMode('standard');
        const list = shuffle(wordData).slice(0, MOCK_COUNT);
        setMockList(list); setMockIdx(0); setMockScore(0);
        setGameState('quiz'); genMockQuestion(list, 0);
      };

      const genQuestion = (list, stats, prev) => {
        let active = list.filter(w => stats[w.word] < TARGET_SCORE);
        if (active.length === 0) { setGameState('completed'); return; }
        if (active.length > 1 && prev) active = active.filter(w => w.word !== prev);
        const target = active[Math.floor(Math.random() * active.length)];
        // 意味が似ているグループなので、ダミー選択肢は「同じグループ（似た意味）の中から引っ張る」と難易度が上がって良い
        const otherMeanings = list.filter(w => w.meaning !== target.meaning).map(w => w.meaning);
        
        // もし同じグループだけだとダミーが足りなければ、全体からも補充
        if (otherMeanings.length < 3) {
            const allOther = wordData.filter(w => w.meaning !== target.meaning).map(w => w.meaning);
            otherMeanings.push(...allOther);
        }

        const d = shuffle(otherMeanings).slice(0, 3);
        setCurrentWord(target); setOptions(shuffle([target.meaning, ...d])); setSelectedOption(null);
      };

      const genMockQuestion = (list, i) => {
        if (i >= list.length) { setGameState('completed'); return; }
        const target = list[i];
        const d = shuffle(wordData.filter(w => w.meaning !== target.meaning)).slice(0, 3).map(w => w.meaning);
        setCurrentWord(target); setOptions(shuffle([target.meaning, ...d])); setSelectedOption(null);
      };

      const handleAnswer = (opt) => {
        if (selectedOption) return;
        setSelectedOption(opt);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (opt === currentWord.meaning) {
          if (gameType === 'practice') setWordStats(p => ({...p, [currentWord.word]: p[currentWord.word] + 1}));
          else setMockScore(s => s + 1);
        }
      };

                  const categories = [...new Set(c.map(w => w.category))].slice(0, 2).join(", ");
                  return (
                    <div key={i} className="bg-slate-50 p-4 rounded-xl text-left border border-slate-200">
                      <div className="flex justify-between items-center mb-1">
                        <span className="font-bold">グループ {i+1}</span>
                        <span className="text-xs text-slate-400 font-bold bg-slate-200 px-2 py-1 rounded-md">{c.length}語</span>
                      </div>
                      <p className="text-xs text-emerald-600 font-semibold mb-3">主な内容: {categories} など</p>
                      
                      <div className="flex gap-2">
                        <button onClick={() => startPractice('standard', i)} className="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-sm font-bold flex justify-center items-center gap-1"><Play size={16} fill="currentColor"/>通常</button>
                        <button onClick={() => startPractice('listening', i)} className="flex-1 bg-orange-500 text-white py-2 rounded-lg text-sm font-bold flex justify-center items-center gap-1"><Headphones size={16}/>リスニング</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (

      const isHidden = gameMode === 'listening' && !selectedOption;
      const progress = gameType === 'practice' 
        ? (Object.values(wordStats).reduce((a, b) => a + b, 0) / (chunks[chunkIndex].length * TARGET_SCORE)) * 100

              <span className={`absolute top-4 left-0 w-full text-center text-sm font-semibold tracking-wider ${gameType === 'mock' ? 'text-purple-500' : 'text-emerald-500'}`}>
                {gameType === 'mock' ? `第 ${mockIdx + 1} 問` : (gameMode === 'listening' ? 'リスニング問題' : '問題')}
              </span>
              
              {isHidden ? (
                <div className="flex flex-col items-center mt-4">
                  <button onClick={() => playAudio(currentWord.word)} className="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mb-4">
                    <Volume2 size={40} />
                  </button>
                  <p className="text-slate-400">音声を聞いて選んでください</p>
                </div>
              ) : (
                <div className="mt-4">
                  <h2 className="text-5xl font-bold text-slate-800 mb-2">{currentWord.word}</h2>
                  <p className="text-slate-400">{currentWord.pinyin}</p>
                </div>
              )}
              {gameType === 'practice' && !selectedOption && (
                <div className="flex justify-center gap-1 mt-4">
                  {[...Array(TARGET_SCORE)].map((_, i) => (
                    <Star key={i} size={20} fill={i < wordStats[currentWord.word] ? "#FACC15" : "none"} className={i < wordStats[currentWord.word] ? "text-yellow-400" : "text-slate-200"} />
                  ))}
                </div>
              )}
            </div>

            <div className="space-y-3">
              {options.map((opt, i) => (
                <button key={i} onClick={() => handleAnswer(opt)} disabled={!!selectedOption} className={`w-full p-4 rounded-2xl border-2 text-left font-bold transition-all ${
                  !selectedOption ? "bg-white border-slate-100 hover:border-emerald-400" :
                  opt === currentWord.meaning ? "bg-green-100 border-green-500 text-green-700" :
                  opt === selectedOption ? "bg-red-100 border-red-500 text-red-700" : "bg-slate-50 border-slate-50 text-slate-300"
                }`}>{opt}</button>
              ))}
            </div>

            {selectedOption && (
              <div className="mt-6 animate-in">
                <div className="bg-emerald-50 p-4 rounded-2xl mb-4 border border-emerald-100">
                  <p className="text-xs text-emerald-600 font-bold mb-1 uppercase">Pinyin & Category</p>
                  <p className="font-bold text-emerald-900">{currentWord.pinyin}</p>
                  {currentWord.hint && <p className="text-sm text-emerald-700 mt-2">{currentWord.hint}</p>}
                </div>
                <button onClick={() => gameType === 'practice' ? genQuestion(chunks[chunkIndex], wordStats, currentWord.word) : (setMockIdx(m => m + 1), genMockQuestion(mockList, mockIdx + 1))} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                  <span>{gameType === 'mock' && mockIdx === mockList.length - 1 ? '結果を見る' : '次へ'}</span><ArrowRight size={20} />
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
