    const CATEGORIES = [
      { id: 'all', label: 'すべて', emoji: '🌟' },
      { id: 'food', label: '飲食・容器', emoji: '🍔' },
      { id: 'shape', label: '形状・日用品', emoji: '👕' },
      { id: 'place', label: '場所・乗り物', emoji: '🏢' },
      { id: 'other', label: '人・事・回数', emoji: '👤' },
      { id: 'position', label: '位置・対義語', emoji: '📍' },
    ];

    let activeCat = 'all';

    // 音声読み上げ機能 (台湾華語設定)
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // 連続再生をリセット
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW'; // 台湾華語（繁体字）の音声を指定
        utterance.rate = 0.9;     // 少しゆっくりで聞き取りやすく
        window.speechSynthesis.speak(utterance);
      } else {
        alert("お使いのブラウザは音声読み上げに対応していません。");
      }
    }

    // タブの描画
    function renderTabs() {
      const tabsContainer = document.getElementById('tabs-container');
      tabsContainer.innerHTML = CATEGORIES.map(cat => {
        const isActive = activeCat === cat.id;
        const btnClass = isActive 
          ? 'bg-stone-800 text-white shadow-md scale-105' 
          : 'bg-transparent text-stone-500 hover:bg-stone-100';
        return `
          <button
            onclick="changeCategory('${cat.id}')"
            class="px-4 py-2 rounded-xl font-bold text-sm md:text-base transition-all duration-200 flex items-center gap-2 ${btnClass}"
          >
            <span>${cat.emoji}</span> ${cat.label}
          </button>
        `;
      }).join('');
    }

    // カテゴリ変更
    function changeCategory(catId) {
      activeCat = catId;
      renderTabs();
      renderCards();
    }

    // カードの描画
    function renderCards() {
      const displayData = flowData.filter(item => activeCat === 'all' || item.category === activeCat);
      document.getElementById('status-count').textContent = `表示中: ${displayData.length} パターン`;

      const cardsContainer = document.getElementById('cards-container');
      cardsContainer.innerHTML = displayData.map(flow => {
        
        let grammarHtml = '';
        if (flow.grammar.type === 'verb-measure' || flow.grammar.type === 'state-measure') {
          grammarHtml = `
            <div class="flex items-stretch justify-center gap-2 w-full mb-1">
              <div class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all" onclick="speak('${flow.grammar.verb}')" title="発音を聞く">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">動詞</span>
                <span class="text-3xl font-extrabold drop-shadow-sm mb-1">${flow.grammar.verb}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1">🔊 ${flow.grammar.verbPy}</span>
                <span class="text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate">${flow.grammar.verbJp}</span>
              </div>
              <div class="flex items-center justify-center">
                <span class="text-xl font-black opacity-30">+</span>
              </div>
              <div class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all" onclick="speak('${flow.grammar.measure}')" title="発音を聞く">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">量詞</span>
                <span class="text-3xl font-extrabold drop-shadow-sm mb-1">${flow.grammar.measure}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1">🔊 ${flow.grammar.measurePy}</span>
                <span class="text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate">${flow.grammar.measureJp}</span>
              </div>
            </div>
          `;
        } else if (flow.grammar.type === 'position') {
          grammarHtml = `
            <div class="flex items-stretch justify-center w-full mb-1">
              <div class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-3 cursor-pointer hover:bg-white hover:scale-105 transition-all" onclick="speak('${flow.grammar.main}')" title="発音を聞く">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">方位詞</span>
                <span class="text-3xl font-extrabold drop-shadow-sm mb-1 tracking-widest">${flow.grammar.main}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-2">🔊 ${flow.grammar.mainPy}</span>
                <span class="text-sm font-bold bg-current/10 px-3 py-1 rounded w-full text-center">${flow.grammar.mainJp}</span>
              </div>
            </div>
          `;
        } else if (flow.grammar.type === 'opposite') {
          grammarHtml = `
            <div class="flex items-stretch justify-center gap-2 w-full mb-1">
              <div class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all" onclick="speak('${flow.grammar.verbA}')" title="発音を聞く">
                <span class="text-3xl font-extrabold drop-shadow-sm mb-1">${flow.grammar.verbA}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1">🔊 ${flow.grammar.verbAPy}</span>
                <span class="text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate">${flow.grammar.verbAJp}</span>
              </div>
              <div class="flex items-center justify-center">
                <span class="text-sm font-black opacity-40 italic">VS</span>
              </div>
              <div class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all" onclick="speak('${flow.grammar.verbB}')" title="発音を聞く">
                <span class="text-3xl font-extrabold drop-shadow-sm mb-1">${flow.grammar.verbB}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1">🔊 ${flow.grammar.verbBPy}</span>
                <span class="text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate">${flow.grammar.verbBJp}</span>
              </div>
            </div>
          `;
        }

        const noteHtml = flow.note ? `
          <div class="mt-6 bg-amber-500/10 border border-amber-500/30 rounded-2xl p-4 flex gap-3 shadow-sm">
            <span class="text-2xl leading-none">💡</span>
            <p class="text-amber-200 text-sm md:text-base leading-relaxed font-bold tracking-wide">
              ${flow.note}
            </p>
          </div>
        ` : '';

        return `
          <div class="bg-white rounded-[2rem] shadow-md border border-stone-200 overflow-hidden hover:shadow-xl transition-all duration-300 group animation-fade-in">
            <!-- 1. Step Flow Section (Top) -->
            <div class="p-5 md:p-8 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-3 bg-gradient-to-b from-white to-stone-50">
              
              <!-- Step 1: Base / Actor -->
              <div class="flex flex-col items-center justify-center w-full md:w-[30%] p-5 rounded-3xl border-[3px] bg-white ${flow.body.color} shadow-sm group-hover:-translate-y-1 transition-transform">
                <span class="text-5xl mb-3 drop-shadow-sm">${flow.body.emoji}</span>
                <span class="text-2xl font-extrabold">${flow.body.zh}</span>
                <span 
                  onclick="speak('${flow.body.zh}')"
                  class="text-sm font-bold opacity-70 mt-1 cursor-pointer hover:opacity-100 hover:text-black flex items-center gap-1 transition-colors bg-white/50 px-2 py-0.5 rounded-md"
                  title="クリックして発音を聞く"
                >
                  🔊 ${flow.body.pinyin}
                </span>
                <span class="text-xs mt-2 bg-white/80 px-3 py-1 rounded-full border border-current opacity-80">${flow.body.jp}</span>
              </div>

              <!-- Arrow -->
              <div class="text-stone-300 font-black text-3xl transform rotate-90 md:rotate-0">➔</div>

              <!-- Step 2: Target / Item -->
              <div class="flex flex-col items-center justify-center w-full md:w-[30%] p-5 rounded-3xl border-[3px] bg-white ${flow.item.color} shadow-sm group-hover:-translate-y-1 transition-transform delay-75">
                <span class="text-5xl mb-3 drop-shadow-sm">${flow.item.emoji}</span>
                <span class="text-2xl font-extrabold">${flow.item.zh}</span>
                <span 
                  onclick="speak('${flow.item.zh}')"
                  class="text-sm font-bold opacity-70 mt-1 cursor-pointer hover:opacity-100 hover:text-black flex items-center gap-1 transition-colors bg-white/50 px-2 py-0.5 rounded-md"
                  title="クリックして発音を聞く"
                >
                  🔊 ${flow.item.pinyin}
                </span>
                <span class="text-xs mt-2 bg-white/80 px-3 py-1 rounded-full border border-current opacity-80">${flow.item.jp}</span>
              </div>

              <!-- Arrow -->
              <div class="text-stone-300 font-black text-3xl transform rotate-90 md:rotate-0">➔</div>

              <!-- Step 3: Grammar Logic -->
              <div class="flex flex-col items-center justify-center w-full md:w-[35%] p-5 rounded-3xl border-[3px] shadow-inner ${flow.grammar.bgClass}">
                ${grammarHtml}
                <span class="text-xs mt-3 bg-white/60 px-3 py-1.5 rounded-full font-bold uppercase tracking-wider">${flow.grammar.label}</span>
              </div>

            </div>

            <!-- 2. Sentence & Note Section (Bottom) -->
            <div class="bg-stone-800 text-stone-100 p-6 md:p-8 flex items-start gap-5 border-t-[6px] border-stone-700">
              <div class="text-4xl mt-1 opacity-90 drop-shadow-md">📖</div>
              <div class="flex-1 flex flex-col">
                <div class="text-2xl md:text-3xl font-bold tracking-wide mb-2 leading-tight">
                  ${flow.sentence.zh}
                </div>
                
                <div 
                  onclick="speak('${flow.sentence.zh}')"
                  class="text-stone-400 font-medium text-base md:text-lg mb-4 font-mono cursor-pointer hover:text-stone-200 flex items-center gap-2 transition-colors w-max"
                  title="クリックして例文の発音を聞く"
                >
                  🔊 ${flow.sentence.pinyin}
                </div>
                
                <div class="text-stone-300 font-bold text-sm md:text-base bg-stone-700/60 self-start px-4 py-2 rounded-xl border border-stone-600 shadow-inner">
                  ${flow.sentence.jp}
                </div>

                ${noteHtml}
              </div>
            </div>

          </div>
        `;
      }).join('');
    }

    // 初期化
    renderTabs();
    renderCards();
  </script>
</body>
</html>
