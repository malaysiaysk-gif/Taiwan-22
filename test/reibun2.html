        item: { zh: '書', pinyin: 'shū', jp: '本', emoji: '📕', color: 'bg-slate-50 text-slate-900 border-slate-200' },
        grammar: { type: 'opposite', verbA: '借', verbAPy: 'jiè', verbAJp: '借りる', verbB: '還', verbBPy: 'huán', verbBJp: '返す', label: '対比（借りる / 返す）', bgClass: 'bg-slate-100 border-slate-300 text-slate-800' },
        sentence: { zh: '我去圖書館借書，明天還書。', pinyin: 'Wǒ qù túshūguǎn jiè shū, míngtiān huán shū.', jp: '私は図書館へ本を借りに行き、明日本を返します。' },
        note: '「還」は副詞の hái（まだ）と同じ漢字なので、図書館のイラストなどでは動詞の「返す」だと見抜いてください。'
      },
      {
        id: 'pos_7', category: 'position',
        body: { zh: '人', pinyin: 'rén', jp: '人', emoji: '🧑', color: 'bg-slate-50 text-slate-900 border-slate-200' },
        item: { zh: '門', pinyin: 'mén', jp: 'ドア', emoji: '🚪', color: 'bg-slate-50 text-slate-900 border-slate-200' },
        grammar: { type: 'opposite', verbA: '推', verbAPy: 'tuī', verbAJp: '押す', verbB: '拉', verbBPy: 'lā', verbBJp: '引く', label: '対比（押す / 引く）', bgClass: 'bg-slate-100 border-slate-300 text-slate-800' },
        sentence: { zh: '進去要推門，出來要拉門。', pinyin: 'Jìnqù yào tuī mén, chūlái yào lā mén.', jp: '入る時はドアを押し、出る時はドアを引きます。' },
        note: 'ドアの開け閉めや、カート・スーツケースを操作しているイラストでよく出題されます。'
      }
    ];

    const CATEGORIES = [
      { id: 'all', label: 'すべて', emoji: '🌟' },
      { id: 'food', label: '飲食・容器', emoji: '🍔' },
      { id: 'shape', label: '形状・日用品', emoji: '👕' },
      { id: 'place', label: '場所・乗り物', emoji: '🏢' },
      { id: 'other', label: '人・事・回数', emoji: '👤' },
      { id: 'position', label: '位置・対義語', emoji: '📍' },
    ];

    let activeCat = 'all';

    // === 新機能：学習モード関連のステート ===
    let globalReveal = false;
    let playStats = {}; // 要素ごとの再生回数を記録 { "food_1_body": 1, ... }
    let clickTimers = {}; // 「もう1回」表示のリセットタイマー

    // 音声読み上げ＆再生回数カウント機能
    function handlePlay(elementId, event) {
      if(event) event.stopPropagation();
      const btn = event.currentTarget;
      const textToSpeak = btn.dataset.zh;
      const pinyinText = btn.dataset.pinyin;

      // 音声再生
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'zh-TW'; 
        utterance.rate = 0.9;     
        window.speechSynthesis.speak(utterance);
      }

      // 全部オープン状態ならカウントは不要
      if (globalReveal) return;

      if (!playStats[elementId]) playStats[elementId] = 0;
      playStats[elementId]++;

      const pinyinDisplay = btn.querySelector('.pinyin-display') || btn;

      if (playStats[elementId] === 1) {
        // 1回目のクリック
        pinyinDisplay.innerHTML = `<span class="text-orange-500 font-bold drop-shadow">もう1回!</span>`;
        btn.classList.add('scale-105', 'ring-2', 'ring-orange-300');

        if(clickTimers[elementId]) clearTimeout(clickTimers[elementId]);
        clickTimers[elementId] = setTimeout(() => {
          if (playStats[elementId] === 1) {
             pinyinDisplay.innerHTML = `🔊 ${pinyinText}`;
             btn.classList.remove('scale-105', 'ring-2', 'ring-orange-300');
          }
        }, 2000);

      } else if (playStats[elementId] >= 2) {
        // 2回目のクリック（アンロック）
        if(clickTimers[elementId]) clearTimeout(clickTimers[elementId]);
        pinyinDisplay.innerHTML = `🔊 ${pinyinText}`;
        btn.classList.remove('scale-105', 'ring-2', 'ring-orange-300');
        revealElement(elementId);
      }
    }

    // 要素をアンロック（オープン）する関数
    function revealElement(elementId) {
      const placeholders = document.querySelectorAll(`.placeholder-${elementId}`);
      placeholders.forEach(el => el.classList.add('hidden'));

      const reveals = document.querySelectorAll(`.reveal-${elementId}`);
      reveals.forEach(el => {
        el.classList.remove('hidden');
        el.classList.add('reveal-anim'); // ふわっと表示
      });
    }

    // 全部オープン/学習モードの切り替え
    function toggleRevealAll() {
      globalReveal = !globalReveal;
      const btn = document.getElementById('reveal-all-btn');
      
      if (globalReveal) {
        btn.innerHTML = '🔓 学習モードに戻す（隠す）';
        btn.classList.replace('bg-stone-800', 'bg-emerald-600');
      } else {
        btn.innerHTML = '👁️ 最初から全部オープン';
        btn.classList.replace('bg-emerald-600', 'bg-stone-800');
        playStats = {}; // 再生回数をリセット
      }
      renderCards(); // 全体を再描画
    }

    // タブの描画
    function renderTabs() {
      const tabsContainer = document.getElementById('tabs-container');
      tabsContainer.innerHTML = CATEGORIES.map(cat => {
        const isActive = activeCat === cat.id;
        const btnClass = isActive 
          ? 'bg-stone-800 text-white shadow-md scale-105' 
          : 'bg-transparent text-stone-500 hover:bg-stone-100';
        return `
          <button
            onclick="changeCategory('${cat.id}')"
            class="px-4 py-2 rounded-xl font-bold text-sm md:text-base transition-all duration-200 flex items-center gap-2 ${btnClass}"
          >
            <span>${cat.emoji}</span> ${cat.label}
          </button>
        `;
      }).join('');
    }

    // カテゴリ変更
    function changeCategory(catId) {
      activeCat = catId;
      renderTabs();
      renderCards();
    }

    // カードの描画
    function renderCards() {
      const displayData = flowData.filter(item => activeCat === 'all' || item.category === activeCat);
      document.getElementById('status-count').textContent = `表示中: ${displayData.length} パターン`;

      const cardsContainer = document.getElementById('cards-container');
      cardsContainer.innerHTML = displayData.map(flow => {
        
        // =====================================
        // 文法ブロックの生成
        // =====================================
        let grammarHtml = '';
        if (flow.grammar.type === 'verb-measure' || flow.grammar.type === 'state-measure') {
          const vId = `${flow.id}_g_verb`;
          const mId = `${flow.id}_g_measure`;
          const vRev = globalReveal || playStats[vId] >= 2;
          const mRev = globalReveal || playStats[mId] >= 2;

          grammarHtml = `
            <div class="flex items-stretch justify-center gap-2 w-full mb-1">
              <div data-zh="${flow.grammar.verb}" data-pinyin="${flow.grammar.verbPy}" class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all select-none" onclick="handlePlay('${vId}', event)" title="2回クリックでオープン">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">動詞</span>
                <span class="placeholder-${vId} text-3xl font-extrabold opacity-30 mb-1 ${vRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${vId} text-3xl font-extrabold drop-shadow-sm mb-1 ${vRev ? '' : 'hidden'}">${flow.grammar.verb}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1"><span class="pinyin-display">🔊 ${flow.grammar.verbPy}</span></span>
                <span class="reveal-${vId} text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate ${vRev ? '' : 'hidden'}">${flow.grammar.verbJp}</span>
              </div>
              <div class="flex items-center justify-center">
                <span class="text-xl font-black opacity-30">+</span>
              </div>
              <div data-zh="${flow.grammar.measure}" data-pinyin="${flow.grammar.measurePy}" class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all select-none" onclick="handlePlay('${mId}', event)" title="2回クリックでオープン">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">量詞</span>
                <span class="placeholder-${mId} text-3xl font-extrabold opacity-30 mb-1 ${mRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${mId} text-3xl font-extrabold drop-shadow-sm mb-1 ${mRev ? '' : 'hidden'}">${flow.grammar.measure}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1"><span class="pinyin-display">🔊 ${flow.grammar.measurePy}</span></span>
                <span class="reveal-${mId} text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate ${mRev ? '' : 'hidden'}">${flow.grammar.measureJp}</span>
              </div>
            </div>
          `;
        } else if (flow.grammar.type === 'position') {
          const mId = `${flow.id}_g_main`;
          const mRev = globalReveal || playStats[mId] >= 2;

          grammarHtml = `
            <div class="flex items-stretch justify-center w-full mb-1">
              <div data-zh="${flow.grammar.main}" data-pinyin="${flow.grammar.mainPy}" class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-3 cursor-pointer hover:bg-white hover:scale-105 transition-all select-none" onclick="handlePlay('${mId}', event)" title="2回クリックでオープン">
                <span class="text-[10px] font-bold opacity-60 mb-1 tracking-wider">方位詞</span>
                <span class="placeholder-${mId} text-3xl font-extrabold opacity-30 mb-1 tracking-widest ${mRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${mId} text-3xl font-extrabold drop-shadow-sm mb-1 tracking-widest ${mRev ? '' : 'hidden'}">${flow.grammar.main}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-2"><span class="pinyin-display">🔊 ${flow.grammar.mainPy}</span></span>
                <span class="reveal-${mId} text-sm font-bold bg-current/10 px-3 py-1 rounded w-full text-center ${mRev ? '' : 'hidden'}">${flow.grammar.mainJp}</span>
              </div>
            </div>
          `;
        } else if (flow.grammar.type === 'opposite') {
          const vAId = `${flow.id}_g_verbA`;
          const vBId = `${flow.id}_g_verbB`;
          const vARev = globalReveal || playStats[vAId] >= 2;
          const vBRev = globalReveal || playStats[vBId] >= 2;

          grammarHtml = `
            <div class="flex items-stretch justify-center gap-2 w-full mb-1">
              <div data-zh="${flow.grammar.verbA}" data-pinyin="${flow.grammar.verbAPy}" class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all select-none" onclick="handlePlay('${vAId}', event)" title="2回クリックでオープン">
                <span class="placeholder-${vAId} text-3xl font-extrabold opacity-30 mb-1 ${vARev ? 'hidden' : ''}">???</span>
                <span class="reveal-${vAId} text-3xl font-extrabold drop-shadow-sm mb-1 ${vARev ? '' : 'hidden'}">${flow.grammar.verbA}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1"><span class="pinyin-display">🔊 ${flow.grammar.verbAPy}</span></span>
                <span class="reveal-${vAId} text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate ${vARev ? '' : 'hidden'}">${flow.grammar.verbAJp}</span>
              </div>
              <div class="flex items-center justify-center">
                <span class="text-sm font-black opacity-40 italic">VS</span>
              </div>
              <div data-zh="${flow.grammar.verbB}" data-pinyin="${flow.grammar.verbBPy}" class="flex-1 flex flex-col items-center justify-center bg-white/90 rounded-xl shadow-sm border border-current/20 p-2 cursor-pointer hover:bg-white hover:scale-105 transition-all select-none" onclick="handlePlay('${vBId}', event)" title="2回クリックでオープン">
                <span class="placeholder-${vBId} text-3xl font-extrabold opacity-30 mb-1 ${vBRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${vBId} text-3xl font-extrabold drop-shadow-sm mb-1 ${vBRev ? '' : 'hidden'}">${flow.grammar.verbB}</span>
                <span class="text-[11px] font-mono font-bold opacity-70 mb-1"><span class="pinyin-display">🔊 ${flow.grammar.verbBPy}</span></span>
                <span class="reveal-${vBId} text-xs font-bold bg-current/10 px-2 py-1 rounded w-full text-center truncate ${vBRev ? '' : 'hidden'}">${flow.grammar.verbBJp}</span>
              </div>
            </div>
          `;
        }

        // =====================================
        // 全体の組み立て
        // =====================================
        const bId = `${flow.id}_body`;
        const iId = `${flow.id}_item`;
        const sId = `${flow.id}_sentence`;
        
        const bRev = globalReveal || playStats[bId] >= 2;
        const iRev = globalReveal || playStats[iId] >= 2;
        const sRev = globalReveal || playStats[sId] >= 2;

        return `
          <div class="bg-white rounded-[2rem] shadow-md border border-stone-200 overflow-hidden hover:shadow-xl transition-all duration-300 group animation-fade-in">
            <!-- 1. Step Flow Section (Top) -->
            <div class="p-5 md:p-8 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-3 bg-gradient-to-b from-white to-stone-50">
              
              <!-- Step 1: Base / Actor -->
              <div class="flex flex-col items-center justify-center w-full md:w-[30%] p-5 rounded-3xl border-[3px] bg-white ${flow.body.color} shadow-sm group-hover:-translate-y-1 transition-transform">
                <span class="text-5xl mb-3 drop-shadow-sm">${flow.body.emoji}</span>
                
                <span class="placeholder-${bId} text-3xl font-extrabold opacity-30 mb-1 ${bRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${bId} text-2xl font-extrabold mb-1 ${bRev ? '' : 'hidden'}">${flow.body.zh}</span>
                
                <span 
                  data-zh="${flow.body.zh}" data-pinyin="${flow.body.pinyin}"
                  onclick="handlePlay('${bId}', event)"
                  class="text-sm font-bold opacity-70 mt-1 cursor-pointer hover:opacity-100 hover:text-black flex items-center gap-1 transition-all bg-white/50 px-2 py-0.5 rounded-md select-none"
                  title="2回クリックでオープン"
                >
                  <span class="pinyin-display">🔊 ${flow.body.pinyin}</span>
                </span>
                
                <span class="reveal-${bId} text-xs mt-2 bg-white/80 px-3 py-1 rounded-full border border-current opacity-80 ${bRev ? '' : 'hidden'}">${flow.body.jp}</span>
              </div>

              <!-- Arrow -->
              <div class="text-stone-300 font-black text-3xl transform rotate-90 md:rotate-0">➔</div>

              <!-- Step 2: Target / Item -->
              <div class="flex flex-col items-center justify-center w-full md:w-[30%] p-5 rounded-3xl border-[3px] bg-white ${flow.item.color} shadow-sm group-hover:-translate-y-1 transition-transform delay-75">
                <span class="text-5xl mb-3 drop-shadow-sm">${flow.item.emoji}</span>
                
                <span class="placeholder-${iId} text-3xl font-extrabold opacity-30 mb-1 ${iRev ? 'hidden' : ''}">???</span>
                <span class="reveal-${iId} text-2xl font-extrabold mb-1 ${iRev ? '' : 'hidden'}">${flow.item.zh}</span>
                
                <span 
                  data-zh="${flow.item.zh}" data-pinyin="${flow.item.pinyin}"
                  onclick="handlePlay('${iId}', event)"
                  class="text-sm font-bold opacity-70 mt-1 cursor-pointer hover:opacity-100 hover:text-black flex items-center gap-1 transition-all bg-white/50 px-2 py-0.5 rounded-md select-none"
                  title="2回クリックでオープン"
                >
                  <span class="pinyin-display">🔊 ${flow.item.pinyin}</span>
                </span>
                
                <span class="reveal-${iId} text-xs mt-2 bg-white/80 px-3 py-1 rounded-full border border-current opacity-80 ${iRev ? '' : 'hidden'}">${flow.item.jp}</span>
              </div>

              <!-- Arrow -->
              <div class="text-stone-300 font-black text-3xl transform rotate-90 md:rotate-0">➔</div>

              <!-- Step 3: Grammar Logic -->
              <div class="flex flex-col items-center justify-center w-full md:w-[35%] p-5 rounded-3xl border-[3px] shadow-inner ${flow.grammar.bgClass}">
                ${grammarHtml}
                <span class="text-xs mt-3 bg-white/60 px-3 py-1.5 rounded-full font-bold uppercase tracking-wider">${flow.grammar.label}</span>
              </div>

            </div>

            <!-- 2. Sentence & Note Section (Bottom) -->
            <div class="bg-stone-800 text-stone-100 p-6 md:p-8 flex items-start gap-5 border-t-[6px] border-stone-700">
              <div class="text-4xl mt-1 opacity-90 drop-shadow-md">📖</div>
              <div class="flex-1 flex flex-col">
                
                <div class="placeholder-${sId} text-2xl md:text-3xl font-bold tracking-wide mb-2 leading-tight text-stone-600 ${sRev ? 'hidden' : ''}">
                  ???
                </div>
                
                <div class="reveal-${sId} text-2xl md:text-3xl font-bold tracking-wide mb-2 leading-tight ${sRev ? '' : 'hidden'}">
                  ${flow.sentence.zh}
                </div>
                
                <div 
                  data-zh="${flow.sentence.zh}" data-pinyin="${flow.sentence.pinyin}"
                  onclick="handlePlay('${sId}', event)"
                  class="text-stone-400 font-medium text-base md:text-lg mb-4 font-mono cursor-pointer hover:text-stone-200 flex items-center gap-2 transition-all w-max select-none"
                  title="2回クリックでオープン"
                >
                  <span class="pinyin-display">🔊 ${flow.sentence.pinyin}</span>
                </div>
                
                <div class="reveal-${sId} w-full ${sRev ? '' : 'hidden'}">
                  <div class="text-stone-300 font-bold text-sm md:text-base bg-stone-700/60 self-start px-4 py-2 rounded-xl border border-stone-600 shadow-inner inline-block">
                    ${flow.sentence.jp}
                  </div>

                  ${flow.note ? `
                    <div class="mt-6 bg-amber-500/10 border border-amber-500/30 rounded-2xl p-4 flex gap-3 shadow-sm">
                      <span class="text-2xl leading-none">💡</span>
                      <p class="text-amber-200 text-sm md:text-base leading-relaxed font-bold tracking-wide">
                        ${flow.note}
                      </p>
                    </div>
                  ` : ''}
                </div>

              </div>
            </div>

          </div>
        `;
      }).join('');
    }

    // 初期化
    renderTabs();
    renderCards();
  </script>
</body>
</html>
