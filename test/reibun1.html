<head>

    <title>TOCFL Band A 必須フレーズ100（音声付き・テスト形式）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc; /* Tailwind slate-50 */
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }
        .tc { font-family: 'Noto Sans TC', sans-serif; }
        
        .pinyin-btn {
            transition: all 0.2s ease;
        }
        .pinyin-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .pinyin-btn:active {
            transform: scale(0.99);
        }

        /* フェードインアニメーション */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* カスタム通知用のスタイル */
        #notification {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>

                </div>
                <div class="inline-flex items-center gap-2 bg-white/20 px-4 py-2 rounded-full text-white text-sm backdrop-blur-sm border border-white/30 shadow-sm font-bold">
                    <span class="text-lg">📖</span> クリックで答えを表示
                </div>
            </div>
        </div>
    </header>

    <!-- コントロールバー（全て開閉） -->
    <div class="max-w-4xl mx-auto px-4 mt-6 flex justify-end gap-3">
        <button onclick="toggleAllAnswers(true)" class="text-sm font-bold text-teal-600 bg-teal-50 px-3 py-1.5 rounded-lg border border-teal-200 hover:bg-teal-100 transition-colors">
            全て開く
        </button>
        <button onclick="toggleAllAnswers(false)" class="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-200 transition-colors">
            全て閉じる
        </button>
    </div>

        <!-- ここにフレーズリストがレンダリングされます -->
    </main>

                    { id: 88, zh: "這個週末你有空嗎？", py: "Zhège zhōumò nǐ yǒu kòng ma?", jp: "今週末、暇（時間）はありますか？" },
                    { id: 89, zh: "對不起，我遲到了。", py: "Duìbùqǐ, wǒ chídào le.", jp: "ごめんなさい、遅刻しました。" },
                    { id: 90, zh: "沒關係。", py: "Méi guānxi.", jp: "大丈夫です（気にしないで）。" },
                    { id: 91, zh: "歡迎光臨！", py: "Huānyíng guānglín!", jp: "いらっしゃいませ！" },
                    { id: 92, zh: "請問洗手間在哪裡？", py: "Qǐngwèn xǐshǒujiān zài nǎlǐ?", jp: "すみません、お手洗いはどこですか？" },
                    { id: 93, zh: "我要一杯咖啡。", py: "Wǒ yào yì bēi kāfēi.", jp: "コーヒーを1杯ください（強い意志・要求）。" },
                    { id: 94, zh: "冰的還是熱的？", py: "Bīng de háishì rè de?", jp: "アイスですか、それともホットですか？" },
                    { id: 95, zh: "可以刷卡嗎？", py: "Kěyǐ shuākǎ ma?", jp: "クレジットカードは使えますか？" },
                    { id: 96, zh: "很好吃。", py: "Hěn hǎochī.", jp: "とても美味しいです。" },
                    { id: 97, zh: "太辣了！", py: "Tài là le!", jp: "辛すぎます！" },
                    { id: 98, zh: "明天見。", py: "Míngtiān jiàn.", jp: "また明日。" },
                    { id: 99, zh: "你是哪國人？", py: "Nǐ shì nǎ guórén?", jp: "あなたはどこの国の人ですか？" },
                    { id: 100, zh: "我認為這很重要。", py: "Wǒ rènwéi zhè hěn zhòngyào.", jp: "私はこれがとても重要だと考えます。", note: "「覺得（juéde）」は個人の主観的な感覚（～な気がする）ですが、「認為（rènwéi）」は論理的・客観的な判断に基づいた意見（～だと考える）です。読解問題の筆者の主張などでキーワードになります。" }
                ]
            }
        ];

        // 答えの表示/非表示を切り替える関数
        window.toggleAnswer = function(btn) {
            const content = btn.nextElementSibling;
            const isHidden = content.classList.contains('hidden');

            if (isHidden) {
                // 開く
                content.classList.remove('hidden');
                content.classList.add('fade-in');
                btn.innerHTML = '<span class="text-slate-400">▲ 閉じる</span>';
                btn.classList.replace('bg-slate-100', 'bg-transparent');
                btn.classList.replace('hover:bg-slate-200', 'hover:bg-slate-50');
                btn.classList.replace('border-slate-200', 'border-transparent');
            } else {
                // 閉じる
                content.classList.add('hidden');
                content.classList.remove('fade-in');
                btn.innerHTML = 'クリックして答えを見る ▼';
                btn.classList.replace('bg-transparent', 'bg-slate-100');
                btn.classList.replace('hover:bg-slate-50', 'hover:bg-slate-200');
                btn.classList.replace('border-transparent', 'border-slate-200');
            }
        };

        // 一括開閉機能
        window.toggleAllAnswers = function(open) {
            const buttons = document.querySelectorAll('.toggle-btn');
            buttons.forEach(btn => {
                const content = btn.nextElementSibling;
                const isHidden = content.classList.contains('hidden');
                
                // 開く指示が来ていて、現在閉じているならクリックして開く
                if (open && isHidden) {
                    toggleAnswer(btn);
                } 
                // 閉じる指示が来ていて、現在開いているならクリックして閉じる
                else if (!open && !isHidden) {
                    toggleAnswer(btn);
                }
            });
        };

        // 画面のレンダリング
        function renderPhrases() {
            const container = document.getElementById('app-container');
            
            phraseData.forEach(section => {
                // セクションのラッパー
                const sectionEl = document.createElement('section');
                
                // セクションタイトル
                const titleEl = document.createElement('h2');
                titleEl.className = "text-xl md:text-2xl font-bold text-slate-800 mb-6 sticky top-0 bg-slate-50/90 backdrop-blur py-3 z-10 border-b-2 border-teal-200";
                titleEl.textContent = section.category;
                sectionEl.appendChild(titleEl);

                // アイテムのグリッド/リスト
                const listEl = document.createElement('div');
                listEl.className = "space-y-4";

                section.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow";

                    // Note（解説）のHTML生成
                    let noteHtml = '';
                    if (item.note) {
                        noteHtml = `
                            <div class="mt-4 bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-lg text-sm text-amber-900 leading-relaxed">
                                <strong class="text-amber-600">🎯 TOCFLの罠：</strong> ${item.note}
                            </div>
                        `;
                    }

                    // カードの中身（最初はピンインと再生ボタンだけ。クリックで答え表示）
                    card.innerHTML = `
                        <div class="flex gap-3 md:gap-4">
                            <div class="text-teal-500 font-bold text-xl md:text-2xl w-8 shrink-0 text-right mt-2">${item.id}.</div>
                            <div class="flex-1 space-y-3">
                                
                                <!-- ピンインと音声ボタン -->
                                <button class="pinyin-btn w-full flex items-center justify-center gap-3 bg-teal-50 hover:bg-teal-100 text-teal-800 font-mono text-base md:text-xl px-4 py-4 rounded-xl border-2 border-teal-200 cursor-pointer shadow-sm" data-text="${item.zh}">
                                    <span class="text-2xl">🔊</span> <span class="tracking-wide">${item.py}</span>
                                </button>
                                
                                <!-- 答えトグルボタン -->
                                <button onclick="toggleAnswer(this)" class="toggle-btn w-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold text-sm py-2.5 rounded-lg border border-slate-200 transition-colors cursor-pointer">
                                    クリックして答えを見る ▼
                                </button>
                                
                                <!-- 隠しコンテンツ（漢字、日本語、解説） -->
                                <div class="hidden-content hidden mt-3 pt-3 border-t border-slate-100">
                                    <div class="text-2xl md:text-3xl font-bold text-slate-800 tc mb-2 tracking-wide text-center md:text-left">${item.zh}</div>
                                    <div class="text-base md:text-lg text-slate-600 font-medium text-center md:text-left">${item.jp}</div>
                                    ${noteHtml}
                                </div>
                                
                            </div>
                        </div>
                    `;
                    listEl.appendChild(card);
                });

                sectionEl.appendChild(listEl);
                container.appendChild(sectionEl);
            });
        }

        // カスタム通知
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.remove('opacity-0');
            setTimeout(() => {
                notif.classList.add('opacity-0');
            }, 3000);
        }

        // 音声再生機能 (TTS)
        function setupAudio() {
            document.addEventListener('click', (e) => {
                const btn = e.target.closest('.pinyin-btn');
                if (!btn) return;

                const textToSpeak = btn.getAttribute('data-text');
                
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // 前の音声をキャンセル

                    const utterance = new SpeechSynthesisUtterance(textToSpeak);
                    utterance.lang = 'zh-TW'; // 台湾華語
                    utterance.rate = 0.85;    // 少しゆっくり

                    // 台湾華語のボイスを取得
                    const voices = window.speechSynthesis.getVoices();
                    const twVoice = voices.find(v => v.lang === 'zh-TW' || v.lang === 'zh-Hant-TW');
                    if (twVoice) utterance.voice = twVoice;

                    // 再生中の視覚効果
                    const originalBg = btn.className;
                    btn.classList.add('bg-teal-500', 'text-white', 'border-teal-600');
                    btn.classList.remove('bg-teal-50', 'text-teal-800', 'border-teal-200');
                    
                    utterance.onend = () => {
                        btn.className = originalBg;
                    };

                    window.speechSynthesis.speak(utterance);
                } else {
                    showNotification("お使いのブラウザは音声再生に対応していません。");
                }
            });

            // 音声リストの非同期読み込み対応
            if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            renderPhrases();
            setupAudio();
        });
    </script>
</body>
</html>
