<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台湾華語 単語カード (リスニング付き)</title>
    <style>
        /* ベースのダークテーマ設定 */
        :root {
            --bg-color: #121212;
            --card-bg-color: #1e1e1e;
            --text-color: #ffffff;
            --primary-color: #3498db; /* タブ・選択肢 */
            --highlight-color: #f39c12; /* 音声再生ボタン */
            --correct-color: #a3d9a5; /* 正解 */
            --border-color: #333333;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* タブシステム */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab-button {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-button.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* カードリスト（単語帳）モード */
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 5px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg-color);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-left: 5px solid var(--primary-color);
        }

        .zh {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .pinyin {
            font-size: 14px;
            color: #aaaaaa;
            margin: 0 0 10px 0;
            font-style: italic;
        }

        .jp {
            font-size: 16px;
            margin: 0 0 10px 0;
        }

        .meta {
            font-size: 12px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .tag {
            background-color: var(--primary-color);
            padding: 3px 8px;
            border-radius: 12px;
            margin-right: 5px;
        }

        .note {
            font-size: 13px;
            background-color: #333;
            padding: 8px;
            border-radius: 4px;
            color: #aaa;
            margin: 0;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        /* リスニングクイズモード */
        #quizPanel {
            display: none; /* 初期状態では非表示 */
            flex-direction: column;
            align-items: center;
        }

        .quiz-card {
            background-color: var(--card-bg-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .quiz-instruction {
            color: #aaaaaa;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .quiz-zh {
            font-size: 32px; /* 長い文章が入りやすいので少し小さめに調整 */
            margin-bottom: 10px;
            text-align: center;
        }

        .quiz-pinyin {
            font-size: 18px;
            color: #aaaaaa;
            font-style: italic;
            margin-bottom: 20px;
            text-align: center;
        }

        .play-button {
            background-color: var(--highlight-color);
            color: #121212;
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .play-button:hover {
            transform: scale(1.05);
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }

        /* 選択肢が3つや奇数の場合、最後の要素を中央に配置するための調整 */
        .options-container > :last-child:nth-child(odd) {
            grid-column: 1 / -1;
        }

        .option-button {
            background-color: var(--card-bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 14px;
        }

        .option-button:hover {
            background-color: #2a2a2a;
        }

        .option-button.correct {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
            color: #121212;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🇹🇼 台湾華語 単語カード</h1>
    
    <div class="tabs">
        <button class="tab-button active" onclick="switchMode('cards')">カード</button>
        <button class="tab-button" onclick="switchMode('listening')">リスニング</button>
    </div>

    <div id="cardsPanel">
        <input type="text" id="searchInput" class="search-box" placeholder="検索...">
        <div id="appContainer">
            </div>
    </div>

    <div id="quizPanel">
        <div class="quiz-card">
            <p class="quiz-instruction">音声を聞いて意味を選んでください</p>
            <p id="quizZh" class="quiz-zh"></p>
            <p id="quizPinyin" class="quiz-pinyin"></p>
            <button id="playButton" class="play-button" onclick="playCurrentTts()">もう一度聞く🔊</button>
            <div id="optionsContainer" class="options-container">
                </div>
        </div>
    </div>

    <script>
        // 単語データ（ご指定の3フレーズに限定）
        const vocabData = [
            { "zh": "滷肉飯飯少一點", "pinyin": "lǔròufàn fàn shǎo yīdiǎn", "jp": "ルーローハンご飯少なめ", "note": "「少一點（少し少なく）」は台湾の注文で超頻出の表現です。", "category": "食事", "subcategory": "注文・カスタマイズ" },
            { "zh": "炸豬排肉多一點", "pinyin": "zhà zhūpái ròu duō yīdiǎn", "jp": "とんかつ豚（肉）多め", "note": "※実際にとんかつで肉増しできる店は稀ですが、トッピング増量は「多一點」を使います。", "category": "食事", "subcategory": "注文・カスタマイズ" },
            { "zh": "生活費快點匯過來啦", "pinyin": "shēnghuófèi kuàidiǎn huì guòlái la", "jp": "仕送りハヨハヨ（早く生活費振り込んで）", "note": "「匯過來（振り込んでくる）」「啦（〜してよ！という語気詞）」で切迫感を演出しています。", "category": "日常会話", "subcategory": "お金・催促" }
        ];

        // UI要素
        const cardsPanel = document.getElementById('cardsPanel');
        const quizPanel = document.getElementById('quizPanel');
        const searchInput = document.getElementById('searchInput');
        const container = document.getElementById('appContainer');

        // クイズUI要素
        const quizZhText = document.getElementById('quizZh');
        const quizPinyinText = document.getElementById('quizPinyin');
        const optionsContainer = document.getElementById('optionsContainer');

        // クイズの状態
        let currentQuizData = null;
        let isCorrectChosen = false;

        // モード切り替え関数
        function switchMode(mode) {
            document.querySelectorAll('.tab-button').forEach(tab => tab.classList.remove('active'));
            if (mode === 'cards') {
                document.querySelector('.tab-button:nth-child(1)').classList.add('active');
                cardsPanel.style.display = 'block';
                quizPanel.style.display = 'none';
            } else {
                document.querySelector('.tab-button:nth-child(2)').classList.add('active');
                cardsPanel.style.display = 'none';
                quizPanel.style.display = 'flex';
                startListeningQuiz();
            }
        }

        // TTS（音声合成）関数
        function playTts(text) {
            if (!('speechSynthesis' in window)) {
                alert('このブラウザは音声合成に対応していません。');
                return;
            }
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; // 台湾華語
            utterance.rate = 0.8; // 聞き取りやすいように少しゆっくり
            speechSynthesis.speak(utterance);
        }

        // カード描画（単語帳モード）
        function renderCards(data) {
            container.innerHTML = '';
            data.forEach(item => {
                const card = `
                    <div class="card">
                        <div class="meta">
                            <span class="tag">${item.category}</span>
                            <span class="tag" style="background-color:#9b59b6;">${item.subcategory}</span>
                        </div>
                        <p class="zh">${item.zh}</p>
                        <p class="pinyin">${item.pinyin}</p>
                        <p class="jp">${item.jp}</p>
                        ${item.note ? `<p class="note">💡 メモ: ${item.note}</p>` : ''}
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // 初回描画
        renderCards(vocabData);

        // 検索機能
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filteredData = vocabData.filter(item => {
                return item.zh.includes(query) || item.jp.includes(query) || item.pinyin.toLowerCase().includes(query);
            });
            renderCards(filteredData);
        });

        // リスニングクイズ開始
        function startListeningQuiz() {
            renderQuizQuestion();
        }

        // 現在のTTSを再生
        function playCurrentTts() {
            if (currentQuizData) {
                playTts(currentQuizData.zh);
            }
        }

        // クイズ問題の描画
        function renderQuizQuestion() {
            if (vocabData.length === 0) return;

            // ランダムに1つ選ぶ
            const randomIndex = Math.floor(Math.random() * vocabData.length);
            currentQuizData = vocabData[randomIndex];
            isCorrectChosen = false;

            // UIを更新
            quizZhText.innerText = currentQuizData.zh;
            quizPinyinText.innerText = currentQuizData.pinyin;
            
            // 問題表示時に音声を再生
            playTts(currentQuizData.zh);

            // 選択肢の生成
            optionsContainer.innerHTML = '';
            
            const options = [currentQuizData.jp];
            
            // 他の単語から誤答を選ぶ
            const otherAnswers = vocabData
                .filter(item => item !== currentQuizData)
                .map(item => item.jp);
            
            // 誤答を最大3つ追加（単語数が少ない場合に対応）
            for (let i = 0; i < 3 && otherAnswers.length > 0; i++) {
                const wrongIndex = Math.floor(Math.random() * otherAnswers.length);
                options.push(otherAnswers.splice(wrongIndex, 1)[0]);
            }

            // 選択肢をシャッフル
            options.sort(() => Math.random() - 0.5);

            // 選択肢ボタンを作成
            options.forEach(optionText => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.innerText = optionText;
                button.onclick = () => checkAnswer(button, optionText);
                optionsContainer.appendChild(button);
            });
        }

        // 正解判定
        function checkAnswer(selectedButton, selectedText) {
            if (isCorrectChosen) return;

            if (selectedText === currentQuizData.jp) {
                isCorrectChosen = true;
                selectedButton.classList.add('correct');
                // 1.5秒後に次の問題へ
                setTimeout(() => {
                    renderQuizQuestion();
                }, 1500);
            } else {
                selectedButton.style.opacity = '0.5';
                selectedButton.disabled = true;
            }
        }
    </script>
</body>
</html>
