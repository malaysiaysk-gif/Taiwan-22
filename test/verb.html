  { "zh": "關心", "pinyin": "guānxīn", "jp": "関心を持つ、気にかける", "note": "謝謝你的關心（お気遣いありがとうございます）", "category": "動詞", "subcategory": "感情" },
  { "zh": "長大", "pinyin": "zhǎngdà", "jp": "成長する", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "教書", "pinyin": "jiāoshū", "jp": "教える（教職）", "note": "動詞＋目的語の構造", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "開會", "pinyin": "kāihuì", "jp": "会議を開く", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "加班", "pinyin": "jiābān", "jp": "残業する", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "成功", "pinyin": "chénggōng", "jp": "成功する", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "拍照", "pinyin": "pāizhào", "jp": "写真を撮る", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "咳嗽", "pinyin": "késòu", "jp": "咳をする", "note": "", "category": "動詞", "subcategory": "生理現象" },
  { "zh": "發燒", "pinyin": "fāshāo", "jp": "熱を出す", "note": "", "category": "動詞", "subcategory": "生理現象" },
  { "zh": "掛號", "pinyin": "guàhào", "jp": "診察の受付をする、書留にする", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "救命", "pinyin": "jiùmìng", "jp": "助けて、命を救う", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "影響", "pinyin": "yǐngxiǎng", "jp": "影響する", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "感覺", "pinyin": "gǎnjué", "jp": "感じる、感覚", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "花", "pinyin": "huā", "jp": "費やす", "note": "花錢（お金を使う）、花時間（時間をかける）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "訂", "pinyin": "dìng", "jp": "予約する", "note": "訂位、訂票など", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "訂位", "pinyin": "dìngwèi", "jp": "席を予約する", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "得到", "pinyin": "dédào", "jp": "手に入れる", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "逛", "pinyin": "guàng", "jp": "ぶらぶら歩く", "note": "", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "逛街", "pinyin": "guàngjiē", "jp": "街をぶらつく、ショッピングする", "note": "", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "排隊", "pinyin": "páiduì", "jp": "並ぶ", "note": "台灣人喜歡排隊（台湾人は並ぶのが好き）", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "客滿", "pinyin": "kèmǎn", "jp": "満席だ", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "刷卡", "pinyin": "shuākǎ", "jp": "クレジットカードで払う", "note": "カードを切る", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "提", "pinyin": "tí", "jp": "提げる、言及する", "note": "", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "流行", "pinyin": "liúxíng", "jp": "流行している", "note": "", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "打折", "pinyin": "dǎzhé", "jp": "割引する", "note": "打八折（20%オフ）※残り8割という意味", "category": "動詞", "subcategory": "その他の動作" },
  { "zh": "存", "pinyin": "cún", "jp": "貯める、預ける", "note": "存錢（お金を貯める）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "適合", "pinyin": "shìhé", "jp": "適合する、似合う", "note": "動詞として使う（這件衣服適合你）", "category": "動詞", "subcategory": "状態・思考" },
  { "zh": "死", "pinyin": "sǐ", "jp": "死ぬ、極度に〜だ", "note": "累死了（死ぬほど疲れた）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "聞", "pinyin": "wén", "jp": "匂いを嗅ぐ", "note": "聞起來（嗅いだところ〜だ）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "炒", "pinyin": "chǎo", "jp": "炒める", "note": "炒飯（チャーハン）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "炸", "pinyin": "zhá", "jp": "揚げる", "note": "炸雞（フライドチキン）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "嚐/嘗", "pinyin": "cháng", "jp": "味わう", "note": "嚐嚐看（味見してみて）", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "裝", "pinyin": "zhuāng", "jp": "入れる、詰める、装う", "note": "", "category": "動詞", "subcategory": "基本動作" },
  { "zh": "包括", "pinyin": "bāokuò", "jp": "含む", "note": "", "category": "動詞", "subcategory": "状態・思考" }
    ];

    // 【エラー対策】データの中の空行や、正しくない形式のものを自動で取り除きます
    const wordData = rawWordData.filter(w => w && w.zh && w.jp);

    const TARGET_SCORE = 3;
    const MOCK_COUNT = 20;

    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [gameType, setGameType] = useState('practice');
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [chunkIndex, setChunkIndex] = useState(0);
      const [mockList, setMockList] = useState([]);
      const [mockIdx, setMockIdx] = useState(0);
      const [mockScore, setMockScore] = useState(0);

      const chunks = useMemo(() => {
        const res = [];
        let cur = [];
        const getB = (p) => (p || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().replace(/[^a-z]/g, '');
        wordData.forEach((w, i) => {
          if (cur.length >= 60 && i > 0 && getB(w.pinyin) !== getB(wordData[i-1].pinyin)) {
            res.push(cur); cur = [];
          }
          cur.push(w);
        });
        if (cur.length > 0) res.push(cur);
        return res;
      }, []);

      const playAudio = (t) => {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = "zh-TW"; u.rate = 0.85;
        window.speechSynthesis.speak(u);
      };

      useEffect(() => {
        if (gameState === 'quiz' && currentWord && !selectedOption && gameMode === 'listening') {
          playAudio(currentWord.zh);
        }
      }, [currentWord, gameState, gameMode, selectedOption]);

      const startPractice = (mode, idx) => {
        setGameType('practice'); setGameMode(mode); setChunkIndex(idx);
        const target = chunks[idx];
        const stats = {}; target.forEach(w => stats[w.zh] = 0);
        setWordStats(stats); setGameState('quiz');
        genQuestion(target, stats);
      };

      const startMock = (mode) => {
        setGameType('mock'); 
        setGameMode(mode);
        const listLength = Math.min(wordData.length, MOCK_COUNT);
        const list = shuffle(wordData).slice(0, listLength);
        setMockList(list); setMockIdx(0); setMockScore(0);
        setGameState('quiz'); genMockQuestion(list, 0);
      };

      const genQuestion = (list, stats, prev) => {
        let active = list.filter(w => stats[w.zh] < TARGET_SCORE);
        if (active.length === 0) { setGameState('completed'); return; }
        if (active.length > 1 && prev) active = active.filter(w => w.zh !== prev);
        const target = active[Math.floor(Math.random() * active.length)];
        const d = shuffle(wordData.filter(w => w.jp !== target.jp)).slice(0, 3).map(w => w.jp);
        setCurrentWord(target); setOptions(shuffle([target.jp, ...d])); setSelectedOption(null);
      };

      const genMockQuestion = (list, i) => {
        if (i >= list.length) { setGameState('completed'); return; }
        const target = list[i];
        const d = shuffle(wordData.filter(w => w.jp !== target.jp)).slice(0, 3).map(w => w.jp);
        setCurrentWord(target); setOptions(shuffle([target.jp, ...d])); setSelectedOption(null);
      };

      const handleAnswer = (opt) => {
        if (selectedOption) return;
        setSelectedOption(opt);
        if (gameMode === 'standard') playAudio(currentWord.zh);
        if (opt === currentWord.jp) {
          if (gameType === 'practice') setWordStats(p => ({...p, [currentWord.zh]: p[currentWord.zh] + 1}));
          else setMockScore(s => s + 1);
        }
      };

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <h1 className="text-2xl font-bold mb-6 text-slate-800">台湾華語 単語テスト</h1>
              
              <div className="bg-purple-50 p-5 rounded-2xl mb-6 border border-purple-100">
                <h3 className="font-bold text-purple-900 mb-3">模擬試験モード（ランダム20問）</h3>
                <div className="flex gap-2">
                  <button onClick={() => startMock('standard')} className="flex-1 bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-purple-700 active:scale-95 transition-all">
                    通常（意味）
                  </button>
                  <button onClick={() => startMock('listening')} className="flex-1 bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-pink-600 active:scale-95 transition-all flex items-center justify-center gap-1">
                    <Headphones size={18} /> リスニング
                  </button>
                </div>
              </div>

              <div className="space-y-3 max-h-64 overflow-y-auto px-2">
                {chunks.map((c, i) => (
                  <div key={i} className="bg-slate-50 p-4 rounded-xl text-left border border-slate-200">
                    <div className="flex justify-between mb-2"><span className="font-bold">グループ {i+1}</span><span className="text-xs text-slate-400">{c.length}語</span></div>
                    <div className="flex gap-2">
                      <button onClick={() => startPractice('standard', i)} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">通常</button>
                      <button onClick={() => startPractice('listening', i)} className="flex-1 bg-orange-500 text-white py-2 rounded-lg text-sm font-bold">リスニング</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <Trophy size={60} className="mx-auto text-yellow-500 mb-4" />
              <h2 className="text-2xl font-bold mb-4">{gameType === 'mock' ? '試験終了' : 'グループ制覇'}</h2>
              {gameType === 'mock' && <div className="text-5xl font-black text-purple-600 mb-4">{mockScore} / {mockList.length}</div>}
              <button onClick={() => setGameState('start')} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700">トップに戻る</button>
            </div>
          </div>
        );
      }

      const isHidden = gameMode === 'listening' && !selectedOption;
      
      const progress = gameType === 'practice' 
        ? (Object.values(wordStats).reduce((a, b) => a + b, 0) / (chunks[chunkIndex].length * TARGET_SCORE)) * 100
        : (mockIdx / mockList.length) * 100;

      return (
        <div className="min-h-screen flex flex-col items-center p-4">
          <div className="w-full max-w-md mt-4">
            <div className="w-full bg-slate-200 h-2 rounded-full mb-6">
              <div className="bg-blue-500 h-2 rounded-full transition-all" style={{width: `${progress}%`}}></div>
            </div>

            <div className="bg-white rounded-3xl shadow-lg p-6 mb-6 min-h-[220px] flex flex-col justify-center text-center relative overflow-hidden">
              {isHidden ? (
                <div className="flex flex-col items-center animate-in">
                  <button onClick={() => playAudio(currentWord.zh)} className="w-20 h-20 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mb-4 hover:scale-105 active:scale-95 transition-all shadow-sm">
                    <Volume2 size={40} />
                  </button>
                  <p className="text-slate-500 font-bold">音声を聞いて選んでください</p>
                </div>
              ) : (
                <div className="animate-in">
                  <h2 className="text-5xl font-bold text-slate-800 mb-2">{currentWord.zh}</h2>
                  <p className="text-slate-400">{currentWord.pinyin}</p>
                </div>
              )}
              {gameType === 'practice' && !selectedOption && (
                <div className="flex justify-center gap-1 mt-4">
                  {[...Array(TARGET_SCORE)].map((_, i) => (
                    <Star key={i} size={20} fill={i < wordStats[currentWord.zh] ? "#FACC15" : "none"} className={i < wordStats[currentWord.zh] ? "text-yellow-400" : "text-slate-200"} />
                  ))}
                </div>
              )}
            </div>

            <div className="space-y-3">
              {options.map((opt, i) => (
                <button key={i} onClick={() => handleAnswer(opt)} disabled={!!selectedOption} className={`w-full p-4 rounded-2xl border-2 text-left font-bold transition-all ${
                  !selectedOption ? "bg-white border-slate-100 hover:border-blue-400 hover:bg-slate-50" :
                  opt === currentWord.jp ? "bg-green-100 border-green-500 text-green-700" :
                  opt === selectedOption ? "bg-red-100 border-red-500 text-red-700" : "bg-slate-50 border-slate-50 text-slate-300"
                }`}>{opt}</button>
              ))}
            </div>

            {selectedOption && (
              <div className="mt-6 animate-in">
                <div className="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                  <p className="text-xs text-blue-400 font-bold mb-1 uppercase">Pinyin & Hint</p>
                  <p className="font-bold text-blue-900">{currentWord.pinyin}</p>
                  {currentWord.note && <p className="text-sm text-slate-600 mt-2">{currentWord.note}</p>}
                </div>
                <button onClick={() => gameType === 'practice' ? genQuestion(chunks[chunkIndex], wordStats, currentWord.zh) : (setMockIdx(m => m + 1), genMockQuestion(mockList, mockIdx + 1))} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-700 active:scale-95 transition-all">
                  <span>次へ</span><ArrowRight size={20} />
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
