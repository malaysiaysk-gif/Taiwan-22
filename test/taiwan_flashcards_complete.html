      {"word": "魚", "pinyin": "yú", "katakana": "", "meaning": "魚", "hint": "量詞は「條(tiáo)」"},
      {"word": "圓", "pinyin": "yuán", "katakana": "", "meaning": "丸い", "hint": ""},
      {"word": "遠", "pinyin": "yuǎn", "katakana": "", "meaning": "遠い", "hint": ""},
      {"word": "元", "pinyin": "yuán", "katakana": "", "meaning": "元（通貨単位）", "hint": "話し言葉では「塊(kuài)」をよく使う"},
      {"word": "月", "pinyin": "yuè", "katakana": "", "meaning": "月", "hint": ""},
      {"word": "越", "pinyin": "yuè", "katakana": "", "meaning": "ますます", "hint": "越來越好（ますます良くなる）"},
      {"word": "約", "pinyin": "yuē", "katakana": "", "meaning": "約束する、誘う", "hint": ""},
      {"word": "再", "pinyin": "zài", "katakana": "", "meaning": "再び、また", "hint": "未来の反復を表す（例：再見）"},
      {"word": "在", "pinyin": "zài", "katakana": "", "meaning": "〜にある、〜にいる", "hint": "場所を示す"},
      {"word": "在", "pinyin": "zài", "katakana": "", "meaning": "〜にいる、〜で", "hint": "場所や進行形を示す"},
      {"word": "張", "pinyin": "zhāng", "katakana": "", "meaning": "枚（紙や机を数える量詞）", "hint": "一張紙（一枚の紙）"},
      {"word": "長", "pinyin": "zhǎng", "katakana": "", "meaning": "成長する、生える", "hint": "「cháng（長い）」と発音が違うので注意"},
      {"word": "著", "pinyin": "zhe", "katakana": "", "meaning": "〜している", "hint": "動作や状態の持続を表す"},
      {"word": "這", "pinyin": "zhè", "katakana": "", "meaning": "これ", "hint": "近いものを指す"},
      {"word": "整", "pinyin": "zhěng", "katakana": "", "meaning": "丸〜、整った", "hint": "整天（丸一日）"},
      {"word": "正", "pinyin": "zhèng", "katakana": "", "meaning": "ちょうど〜している", "hint": "正在（まさに〜しているところ）"},
      {"word": "只", "pinyin": "zhǐ", "katakana": "", "meaning": "〜だけ", "hint": ""},
      {"word": "紙", "pinyin": "zhǐ", "katakana": "", "meaning": "紙", "hint": ""},
      {"word": "隻", "pinyin": "zhī", "katakana": "", "meaning": "匹、羽（量詞）", "hint": "動物を数える一番一般的な量詞"},
      {"word": "枝", "pinyin": "zhī", "katakana": "", "meaning": "本（枝状のものを数える量詞）", "hint": "一枝筆（一本のペン）"},
      {"word": "支", "pinyin": "zhī", "katakana": "", "meaning": "支（棒状のものを数える量詞）", "hint": "一支給（一本のペン）"},
      {"word": "鐘", "pinyin": "zhōng", "katakana": "", "meaning": "鐘、時計", "hint": "幾點鐘？（何時？）"},
      {"word": "種", "pinyin": "zhǒng", "katakana": "", "meaning": "種類", "hint": "這種類（こういう種類）"},
      {"word": "中", "pinyin": "zhōng", "katakana": "", "meaning": "中", "hint": ""},
      {"word": "重", "pinyin": "zhòng", "katakana": "", "meaning": "重い", "hint": ""},
      {"word": "住", "pinyin": "zhù", "katakana": "", "meaning": "住む", "hint": "「在（〜に）」とセットで使うことが多い"},
      {"word": "祝", "pinyin": "zhù", "katakana": "", "meaning": "祝う、祈る", "hint": "祝你生日快樂（誕生日おめでとう）"},
      {"word": "豬", "pinyin": "zhū", "katakana": "", "meaning": "豚", "hint": ""},
      {"word": "做", "pinyin": "zuò", "katakana": "", "meaning": "する、作る", "hint": ""},
      {"word": "坐", "pinyin": "zuò", "katakana": "", "meaning": "座る、乗る", "hint": "坐車（車に乗る）"},
      {"word": "座", "pinyin": "zuò", "katakana": "", "meaning": "座（大きなものを数える量詞）", "hint": "一座山（一つの山）"}
    ];

    const TARGET_SCORE = 3;
    const MOCK_COUNT = 20;

    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [gameType, setGameType] = useState('practice');
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [chunkIndex, setChunkIndex] = useState(0);
      const [mockList, setMockList] = useState([]);
      const [mockIdx, setMockIdx] = useState(0);
      const [mockScore, setMockScore] = useState(0);

      // グループ分けロジック
      const chunks = useMemo(() => {
        const res = [];
        let cur = [];
        const getB = (p) => (p || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().replace(/[^a-z]/g, '');
        wordData.forEach((w, i) => {
          if (cur.length >= 60 && i > 0 && getB(w.pinyin) !== getB(wordData[i-1].pinyin)) {
            res.push(cur); cur = [];
          }
          cur.push(w);
        });
        if (cur.length > 0) res.push(cur);
        return res;
      }, []);

      const playAudio = (t) => {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = "zh-TW"; u.rate = 0.85;
        window.speechSynthesis.speak(u);
      };

      // リスニング自動再生
      useEffect(() => {
        if (gameState === 'quiz' && currentWord && !selectedOption && gameMode === 'listening') {
          playAudio(currentWord.word);
        }
      }, [currentWord, gameState, gameMode, selectedOption]);

      const startPractice = (mode, idx) => {
        setGameType('practice'); setGameMode(mode); setChunkIndex(idx);
        const target = chunks[idx];
        const stats = {}; target.forEach(w => stats[w.word] = 0);
        setWordStats(stats); setGameState('quiz');
        genQuestion(target, stats);
      };

      const startMock = () => {
        setGameType('mock'); setGameMode('standard');
        const list = shuffle(wordData).slice(0, MOCK_COUNT);
        setMockList(list); setMockIdx(0); setMockScore(0);
        setGameState('quiz'); genMockQuestion(list, 0);
      };

      const genQuestion = (list, stats, prev) => {
        let active = list.filter(w => stats[w.word] < TARGET_SCORE);
        if (active.length === 0) { setGameState('completed'); return; }
        if (active.length > 1 && prev) active = active.filter(w => w.word !== prev);
        const target = active[Math.floor(Math.random() * active.length)];
        const d = shuffle(wordData.filter(w => w.meaning !== target.meaning)).slice(0, 3).map(w => w.meaning);
        setCurrentWord(target); setOptions(shuffle([target.meaning, ...d])); setSelectedOption(null);
      };

      const genMockQuestion = (list, i) => {
        if (i >= list.length) { setGameState('completed'); return; }
        const target = list[i];
        const d = shuffle(wordData.filter(w => w.meaning !== target.meaning)).slice(0, 3).map(w => w.meaning);
        setCurrentWord(target); setOptions(shuffle([target.meaning, ...d])); setSelectedOption(null);
      };

      const handleAnswer = (opt) => {
        if (selectedOption) return;
        setSelectedOption(opt);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (opt === currentWord.meaning) {
          if (gameType === 'practice') setWordStats(p => ({...p, [currentWord.word]: p[currentWord.word] + 1}));
          else setMockScore(s => s + 1);
        }
      };

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <h1 className="text-2xl font-bold mb-6 text-slate-800">台湾華語 単語テスト</h1>
              <div className="bg-purple-50 p-5 rounded-2xl mb-6 border border-purple-100">
                <h3 className="font-bold text-purple-900 mb-2">模擬試験モード</h3>
                <button onClick={startMock} className="w-full bg-purple-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">ランダム20問</button>
              </div>
              <div className="space-y-3 max-h-64 overflow-y-auto px-2">
                {chunks.map((c, i) => (
                  <div key={i} className="bg-slate-50 p-4 rounded-xl text-left border border-slate-200">
                    <div className="flex justify-between mb-2"><span className="font-bold">グループ {i+1}</span><span className="text-xs text-slate-400">{c.length}語</span></div>
                    <div className="flex gap-2">
                      <button onClick={() => startPractice('standard', i)} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">通常</button>
                      <button onClick={() => startPractice('listening', i)} className="flex-1 bg-orange-500 text-white py-2 rounded-lg text-sm font-bold">リスニング</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <Trophy size={60} className="mx-auto text-yellow-500 mb-4" />
              <h2 className="text-2xl font-bold mb-4">{gameType === 'mock' ? '試験終了' : 'グループ制覇'}</h2>
              {gameType === 'mock' && <div className="text-5xl font-black text-purple-600 mb-4">{mockScore} / 20</div>}
              <button onClick={() => setGameState('start')} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">トップに戻る</button>
            </div>
          </div>
        );
      }

      // --- クイズ画面メインロジック ---
      const isHidden = gameMode === 'listening' && !selectedOption;
      const progress = gameType === 'practice' 
        ? (Object.values(wordStats).reduce((a, b) => a + b, 0) / (chunks[chunkIndex].length * TARGET_SCORE)) * 100
        : (mockIdx / MOCK_COUNT) * 100;

      return (
        <div className="min-h-screen flex flex-col items-center p-4">
          <div className="w-full max-w-md mt-4">
            <div className="w-full bg-slate-200 h-2 rounded-full mb-6">
              <div className="bg-blue-500 h-2 rounded-full transition-all" style={{width: `${progress}%`}}></div>
            </div>

            <div className="bg-white rounded-3xl shadow-lg p-6 mb-6 min-h-[220px] flex flex-col justify-center text-center relative overflow-hidden">
              {isHidden ? (
                <div className="flex flex-col items-center">
                  <button onClick={() => playAudio(currentWord.word)} className="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mb-4">
                    <Volume2 size={40} />
                  </button>
                  <p className="text-slate-400">音声を聞いて選んでください</p>
                </div>
              ) : (
                <div>
                  <h2 className="text-5xl font-bold text-slate-800 mb-2">{currentWord.word}</h2>
                  <p className="text-slate-400">{currentWord.pinyin}</p>
                </div>
              )}
              {gameType === 'practice' && !selectedOption && (
                <div className="flex justify-center gap-1 mt-4">
                  {[...Array(TARGET_SCORE)].map((_, i) => (
                    <Star key={i} size={20} fill={i < wordStats[currentWord.word] ? "#FACC15" : "none"} className={i < wordStats[currentWord.word] ? "text-yellow-400" : "text-slate-200"} />
                  ))}
                </div>
              )}
            </div>

            <div className="space-y-3">
              {options.map((opt, i) => (
                <button key={i} onClick={() => handleAnswer(opt)} disabled={!!selectedOption} className={`w-full p-4 rounded-2xl border-2 text-left font-bold transition-all ${
                  !selectedOption ? "bg-white border-slate-100 hover:border-blue-400" :
                  opt === currentWord.meaning ? "bg-green-100 border-green-500 text-green-700" :
                  opt === selectedOption ? "bg-red-100 border-red-500 text-red-700" : "bg-slate-50 border-slate-50 text-slate-300"
                }`}>{opt}</button>
              ))}
            </div>

            {selectedOption && (
              <div className="mt-6 animate-in">
                <div className="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                  <p className="text-xs text-blue-400 font-bold mb-1 uppercase">Pinyin & Hint</p>
                  <p className="font-bold text-blue-900">{currentWord.pinyin}</p>
                  {currentWord.hint && <p className="text-sm text-slate-600 mt-2">{currentWord.hint}</p>}
                </div>
                <button onClick={() => gameType === 'practice' ? genQuestion(chunks[chunkIndex], wordStats, currentWord.word) : (setMockIdx(m => m + 1), genMockQuestion(mockList, mockIdx + 1))} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                  <span>次へ</span><ArrowRight size={20} />
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
