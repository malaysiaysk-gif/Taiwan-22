<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOCFL 聴解 1-40 練習シート (Mock 1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .radio-custom:checked + label {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }

        /* 答え合わせモードのスタイル */
        .mode-review .is-correct { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .mode-review .is-wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .mode-review .is-missed { border-color: #f59e0b !important; background-color: #fffbeb !important; }
        
        /* 迷い中（フラグ）のスタイル */
        .is-flagged { 
            background-color: #fffbeb !important; 
            border-color: #fde68a !important;
        }
        .btn-flag.active {
            color: #f59e0b;
            background-color: #fef3c7;
        }

        .transition-all { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* グラスモーフィズム効果 */
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div class="max-w-2xl mx-auto px-4 pt-6">
        <!-- ヘッダー -->
        <header class="bg-white rounded-3xl shadow-sm p-6 mb-6 sticky top-4 z-20 border border-slate-200 glass">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">TOCFL 聴解 (Mock 1) <span class="text-blue-600">1-40</span></h1>
                        <p id="mode-badge" class="mt-2 inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-blue-100 text-blue-700 uppercase tracking-widest transition-all">
                            回答モード
                        </p>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Progress</div>
                        <div class="flex flex-col items-end">
                            <span id="progress-text" class="text-xl font-bold text-blue-600 tabular-nums">0 / 40</span>
                            <div id="score-display" class="hidden text-sm font-bold text-green-600 mt-1">
                                Score: <span id="correct-count">0</span> / 40
                            </div>
                        </div>
                    </div>
                </div>

                <!-- モード切替 -->
                <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                    <button id="btn-answer-mode" onclick="setMode('answer')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-blue-600">
                        回答入力
                    </button>
                    <button id="btn-review-mode" onclick="setMode('review')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700">
                        答え合わせ
                    </button>
                </div>

                <!-- プログレスバー -->
                <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- 質問リスト -->
        <form id="answer-form" class="space-y-3">
            <div id="questions-container" class="flex flex-col gap-3">
                <!-- JSで動的に生成 -->
            </div>
        </form>

        <!-- フッターメニュー（固定） -->
        <div class="fixed bottom-0 left-0 right-0 p-4 pb-8 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-10">
            <div class="max-w-2xl mx-auto flex flex-wrap gap-2 sm:gap-3">
                <button type="button" onclick="saveAnswers()" class="flex-1 min-w-[120px] py-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-50 shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500 group-hover:scale-110 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V4a1 1 0 10-2 0v7.586l-1.293-1.293z" />
                        <path d="M5 15a2 2 0 002 2h6a2 2 0 002-2v-5a2 2 0 00-2-2H7a2 2 0 00-2 2v5z" />
                    </svg>
                    保存
                </button>
                <button type="button" onclick="downloadCSV()" class="flex-1 min-w-[120px] py-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-50 shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500 group-hover:scale-110 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    CSV出力
                </button>
                <button type="button" onclick="resetConfirm()" class="px-6 py-4 bg-slate-200 text-slate-600 rounded-2xl font-bold hover:bg-red-500 hover:text-white transition-all shadow-lg">
                    リセット
                </button>
            </div>
        </div>

        <!-- 通知トースト -->
        <div id="toast" class="fixed bottom-28 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-2xl text-sm font-bold opacity-0 transition-opacity pointer-events-none z-30 shadow-2xl">
            完了しました
        </div>
    </div>

    <script>
        // PDFデータ（ls_mock_test_BandA_answer.pdf）に基づく正解
        const correctAnswers = {
            // 第一部分
            1:"B", 2:"A", 3:"B", 4:"B", 5:"A", 6:"A", 7:"C", 8:"A", 9:"B", 10:"B",
            // 第二部分
            11:"A", 12:"C", 13:"A", 14:"B", 15:"C", 16:"C", 17:"A", 18:"A", 19:"C", 20:"B",
            21:"C", 22:"C", 23:"A", 24:"B", 25:"A",
            // 第三部分
            26:"C", 27:"A", 28:"B", 29:"C", 30:"A",
            31:"C", 32:"B", 33:"C", 34:"B", 35:"C",
            36:"C", 37:"B", 38:"C", 39:"B", 40:"A"
        };

        const totalQuestions = 40;
        let currentMode = 'answer';
        let flaggedQuestions = new Set();
        // Mock 1 用のストレージキー
        const STORAGE_ANSWERS = 'tocfl_answers_mock1';
        const STORAGE_FLAGS = 'tocfl_flags_mock1';

        function init() {
            const container = document.getElementById('questions-container');
            const savedData = JSON.parse(localStorage.getItem(STORAGE_ANSWERS) || '{}');
            const savedFlags = JSON.parse(localStorage.getItem(STORAGE_FLAGS) || '[]');
            flaggedQuestions = new Set(savedFlags);

            for (let i = 1; i <= totalQuestions; i++) {
                const qDiv = document.createElement('div');
                qDiv.id = `q-row-${i}`;
                const isFlagged = flaggedQuestions.has(i);
                qDiv.className = `bg-white p-4 rounded-2xl border border-slate-200 flex items-center justify-between transition-all shadow-sm question-row ${isFlagged ? 'is-flagged' : ''}`;
                
                const options = ['A', 'B', 'C'];
                let optionsHtml = '';
                
                options.forEach(opt => {
                    const id = `q${i}-${opt}`;
                    const isChecked = savedData[`q${i}`] === opt ? 'checked' : '';
                    optionsHtml += `
                        <div class="flex items-center">
                            <input type="radio" id="${id}" name="q${i}" value="${opt}" ${isChecked} class="hidden radio-custom" onchange="handleSelectionChange()">
                            <label for="${id}" class="w-12 h-12 flex items-center justify-center rounded-xl border-2 border-slate-100 cursor-pointer font-bold text-slate-400 hover:bg-slate-50 transition-all select-none text-lg">
                                ${opt}
                            </label>
                        </div>
                    `;
                });

                qDiv.innerHTML = `
                    <div class="flex items-center gap-4 w-full">
                        <div class="flex flex-col items-center min-w-[3rem]">
                            <span class="text-slate-300 font-black text-xl leading-none">#${i}</span>
                            <button type="button" onclick="toggleFlag(${i})" id="btn-flag-${i}" class="btn-flag mt-2 p-1 rounded-lg text-slate-300 hover:text-amber-500 transition-colors ${isFlagged ? 'active' : ''}" title="自信がない">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4a1 1 0 01-.8 1.6H6a1 1 0 00-1 1v4a1 1 0 11-2 0V6z" clip-rule="evenodd" />
                                </svg>
                            </button>
                            <span id="correct-label-${i}" class="text-[10px] font-black mt-1 hidden tracking-widest uppercase opacity-80">Ans: ${correctAnswers[i]}</span>
                        </div>
                        <div class="flex gap-3 ml-auto">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
                container.appendChild(qDiv);
            }
            updateProgress();
        }

        function toggleFlag(index) {
            const row = document.getElementById(`q-row-${index}`);
            const btn = document.getElementById(`btn-flag-${index}`);
            
            if (flaggedQuestions.has(index)) {
                flaggedQuestions.delete(index);
                row.classList.remove('is-flagged');
                btn.classList.remove('active');
            } else {
                flaggedQuestions.add(index);
                row.classList.add('is-flagged');
                btn.classList.add('active');
            }
            localStorage.setItem(STORAGE_FLAGS, JSON.stringify([...flaggedQuestions]));
        }

        function handleSelectionChange() {
            updateProgress();
            if (currentMode === 'review') {
                runScoring();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const body = document.body;
            const badge = document.getElementById('mode-badge');
            const btnAns = document.getElementById('btn-answer-mode');
            const btnRev = document.getElementById('btn-review-mode');
            const scoreDisplay = document.getElementById('score-display');

            if (mode === 'review') {
                body.classList.add('mode-review');
                badge.innerText = '答え合わせ中';
                badge.className = "mt-2 inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 text-green-700 uppercase tracking-widest";
                btnRev.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-green-600";
                btnAns.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700";
                scoreDisplay.classList.remove('hidden');
                runScoring();
            } else {
                body.classList.remove('mode-review');
                badge.innerText = '回答モード';
                badge.className = "mt-2 inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-blue-100 text-blue-700 uppercase tracking-widest";
                btnAns.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-blue-600";
                btnRev.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700";
                scoreDisplay.classList.add('hidden');
                clearScoringStyles();
            }
        }

        function runScoring() {
            const formData = new FormData(document.getElementById('answer-form'));
            const userAnswers = Object.fromEntries(formData.entries());
            let correctCount = 0;

            for (let i = 1; i <= totalQuestions; i++) {
                const row = document.getElementById(`q-row-${i}`);
                const label = document.getElementById(`correct-label-${i}`);
                const userAns = userAnswers[`q${i}`];
                const correctAns = correctAnswers[i];

                row.classList.remove('is-correct', 'is-wrong', 'is-missed');
                label.classList.add('hidden');

                if (!userAns) {
                    row.classList.add('is-missed');
                } else if (userAns === correctAnswers[i]) {
                    row.classList.add('is-correct');
                    correctCount++;
                } else {
                    row.classList.add('is-wrong');
                }
                label.classList.remove('hidden');
            }
            document.getElementById('correct-count').innerText = correctCount;
        }

        function clearScoringStyles() {
            for (let i = 1; i <= totalQuestions; i++) {
                const row = document.getElementById(`q-row-${i}`);
                const label = document.getElementById(`correct-label-${i}`);
                row.classList.remove('is-correct', 'is-wrong', 'is-missed');
                label.classList.add('hidden');
            }
        }

        function updateProgress() {
            const formData = new FormData(document.getElementById('answer-form'));
            const answeredCount = Array.from(formData.keys()).length;
            const percentage = (answeredCount / totalQuestions) * 100;
            
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${answeredCount} / ${totalQuestions}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function saveAnswers() {
            const formData = new FormData(document.getElementById('answer-form'));
            const userAnswers = Object.fromEntries(formData.entries());
            localStorage.setItem(STORAGE_ANSWERS, JSON.stringify(userAnswers));
            localStorage.setItem(STORAGE_FLAGS, JSON.stringify([...flaggedQuestions]));
            showToast("進捗を保存しました");
        }

        function downloadCSV() {
            const formData = new FormData(document.getElementById('answer-form'));
            const userAnswers = Object.fromEntries(formData.entries());
            
            let csvContent = "Question,Your Answer,Correct Answer,Result,Confidence\n";
            
            for (let i = 1; i <= totalQuestions; i++) {
                const userAns = userAnswers[`q${i}`] || "";
                const correctAns = correctAnswers[i];
                const isFlagged = flaggedQuestions.has(i) ? "Unsure" : "Confident";
                let result = "";
                
                if (!userAns) {
                    result = "Missed";
                } else if (userAns === correctAns) {
                    result = "Correct";
                } else {
                    result = "Wrong";
                }
                
                csvContent += `${i},${userAns},${correctAns},${result},${isFlagged}\n`;
            }

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `TOCFL_Mock1_Results_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast("CSVを出力しました");
        }

        function resetConfirm() {
            if (confirm('すべての回答とフラグを消去します。よろしいですか？')) {
                document.getElementById('answer-form').reset();
                localStorage.removeItem(STORAGE_ANSWERS);
                localStorage.removeItem(STORAGE_FLAGS);
                flaggedQuestions.clear();
                
                document.querySelectorAll('.question-row').forEach(row => row.classList.remove('is-flagged'));
                document.querySelectorAll('.btn-flag').forEach(btn => btn.classList.remove('active'));
                
                clearScoringStyles();
                updateProgress();
                setMode('answer');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
