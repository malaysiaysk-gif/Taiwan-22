                ],
                vocab: [
                { word: "約好", pinyin: "yuē hǎo", jp: "約束している", speak: "約好" },
                { word: "留下", pinyin: "liú xià", jp: "残す", speak: "留下" },
                { word: "電話", pinyin: "diàn huà", jp: "電話（番号）", speak: "電話" },
                { word: "請", pinyin: "qǐng", jp: "〜にお願いして…させる", speak: "請" }
                ],
                meta: "受付でのやり取りの状況把握です。女性が最後に「留下您的電話（あなたの電話番号を残して）」とお願いしています。電話番号を書いている、または伝えている様子の絵を選びます。",
                ans: "B"
            },
            {
                id: 37,
                script: [
                { speaker: "男", text: "小春的生日快到了，我們一起送他禮物，怎麼樣？", jp: "小春の誕生日がもうすぐ来るね、一緒にプレゼントを贈るのはどう？" },
                { speaker: "女", text: "好啊！他喜歡畫畫，我們可以送他畫畫用的筆。", jp: "いいわね！彼は絵を描くのが好きだから、絵を描くためのペンを贈ろう。" },
                { speaker: "男", text: "嗯，還可以送他放筆的袋子。", jp: "うん、さらにペンを入れる袋も贈れるね。" },
                { speaker: "女", text: "好啊，今天下課以後我們一起去買禮物吧。", jp: "いいわね、今日授業が終わったら一緒にプレゼントを買いに行きましょう。" },
                { speaker: "問", text: "請問他們決定送什麼？", jp: "質問：彼らは何を贈ることに決めましたか？" }
                ],
                vocab: [
                { word: "生日", pinyin: "shēng rì", jp: "誕生日", speak: "生日" },
                { word: "禮物", pinyin: "lǐ wù", jp: "プレゼント、贈り物", speak: "禮物" },
                { word: "畫畫", pinyin: "huà huà", jp: "絵を描く", speak: "畫畫" },
                { word: "筆", pinyin: "bǐ", jp: "ペン、筆記用具", speak: "筆" },
                { word: "袋子", pinyin: "dài zi", jp: "袋（放筆的袋子＝ペンケース）", speak: "袋子" },
                { word: "下課以後", pinyin: "xià kè yǐ hòu", jp: "授業が終わった後", speak: "下課以後" }
                ],
                meta: "女性が「畫畫用的筆（絵を描くためのペン）」を提案し、男性が「放筆的袋子（ペンを入れる袋＝ペンケース）」を追加提案し、女性も賛成しています。ペンとペンケース（袋）のセットの絵を選びます。",
                ans: "C"
            },
            {
                id: 38,
                script: [
                { speaker: "男", text: "妳看電視新聞了嗎？有一個很可怕的消息。", jp: "テレビのニュース見た？すごく恐ろしいニュースがあったよ。" },
                { speaker: "女", text: "什麼可怕的消息？", jp: "何の恐ろしいニュース？" },
                { speaker: "男", text: "妳快點開電視，我剛剛才看到的。", jp: "早くテレビをつけて、僕たった今見たばかりなんだ。" },
                { speaker: "女", text: "我上網看過新聞了，可是沒看到什麼可怕的消息。", jp: "ネットでニュースを見たけど、恐ろしいニュースなんて見なかったわ。" },
                { speaker: "問", text: "請問這位先生從哪裡知道可怕的消息？", jp: "質問：この男性はどこから恐ろしいニュースを知りましたか？" }
                ],
                vocab: [
                { word: "電視新聞", pinyin: "diàn shì xīn wén", jp: "テレビのニュース", speak: "電視新聞" },
                { word: "可怕", pinyin: "kě pà", jp: "恐ろしい、怖い", speak: "可怕" },
                { word: "消息", pinyin: "xiāo xí", jp: "知らせ、ニュース", speak: "消息" },
                { word: "快點", pinyin: "kuài diǎn", jp: "早く〜して", speak: "快點" },
                { word: "開", pinyin: "kāi", jp: "（電源を）つける", speak: "開電視" },
                { word: "剛剛", pinyin: "gāng gāng", jp: "たった今", speak: "剛剛" },
                { word: "上網", pinyin: "shàng wǎng", jp: "インターネットをする", speak: "上網" }
                ],
                meta: "メディアの手段を問う問題です。女性は「上網（ネット）」で見ましたが、質問は「這位先生（この男性）」の手段です。男性は最初に「看電視新聞了嗎（テレビのニュース見た？）」、次に「快點開電視（早くテレビをつけて）」と言っているので、テレビから情報を得ています。",
                ans: "A"
            },
            {
                id: 39,
                script: [
                { speaker: "男", text: "妳想吃什麼?", jp: "何食べたい？" },
                { speaker: "女", text: "聽說這裡的北京烤鴨很好吃。", jp: "ここの北京ダックはとても美味しいらしいわ。" },
                { speaker: "男", text: "我們點一隻烤鴨，一碗酸辣湯，怎麼樣？", jp: "じゃあ北京ダックを1羽と、サンラータンを1杯注文するのはどう？" },
                { speaker: "女", text: "再點一個糖醋魚吧！", jp: "さらに白身魚の甘酢あんかけも頼みましょう！" },
                { speaker: "問", text: "請問他們應該在什麼地方？", jp: "質問：彼らはどこにいると考えられますか？" }
                ],
                vocab: [
                { word: "聽說", pinyin: "tīng shuō", jp: "〜だそうだ、〜らしい", speak: "聽說" },
                { word: "北京烤鴨", pinyin: "běi jīng kǎo yā", jp: "北京ダック", speak: "北京烤鴨" },
                { word: "點", pinyin: "diǎn", jp: "注文する", speak: "點" },
                { word: "隻", pinyin: "zhī", jp: "匹、羽（動物を数える量詞）", speak: "一隻" },
                { word: "酸辣湯", pinyin: "suān là tāng", jp: "サンラータン", speak: "酸辣湯" },
                { word: "糖醋魚", pinyin: "táng cù yú", jp: "白身魚の甘酢あんかけ", speak: "糖醋魚" },
                { word: "應該", pinyin: "yīng gāi", jp: "〜のはずだ、〜であるべきだ", speak: "應該" },
                { word: "地方", pinyin: "dì fāng", jp: "場所", speak: "地方" }
                ],
                meta: "注文している料理の名前（北京烤鴨、酸辣湯、糖醋魚）と、「點（注文する）」という動詞から、彼らがレストラン（中餐廳）にいることが推測できます。",
                ans: "C"
            }
        ];

        // 状態管理
        let playingId = null;
        let playingType = null; // 'single' | 'vocab' | 'conversation'
        let isGlobalReveal = false;

        // すべて表示/隠す トグル処理
        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;
            } else {
                document.body.classList.remove('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i><span>すべての解答・スクリプトを表示</span>`;
            }
            lucide.createIcons({root: document.getElementById('global-reveal-btn')});
        }

        // 単一の問題を表示状態にする
        function revealQuestion(qId) {
            const el = document.getElementById(`question-${qId}`);
            if (el) {
                el.classList.remove('content-hidden');
            }
        }

        // UIをリセットする関数
        function resetActiveUI() {
            if (playingId) {
                const btn = document.getElementById(playingId);
                if (btn) {
                    if (playingType === 'vocab') {
                        // 単語ボタンのリセット
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('animate-pulse', 'text-blue-600');
                            icon.classList.add('text-blue-400');
                        }
                    } else if (playingType === 'single') {
                        // スクリプトボタンのリセット
                        btn.classList.remove('text-indigo-600', 'bg-indigo-100', 'text-emerald-600', 'bg-emerald-100');
                        btn.classList.add('text-slate-400');
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'none');
                        }
                    } else if (playingType === 'conversation') {
                        // 会話再生ボタンのリセット
                        btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                        btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                        lucide.createIcons({root: btn});
                    }
                }
            }
        }

        // 会話を2回再生してテキストを表示する関数
        function playConversation(qId, btnId) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。ChromeやSafariをご利用ください。");
                return;
            }

            // 既存の音声をキャンセルしてUIをリセット
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            // 2回分のテキストリストを作成（ポーズ時間を含むオブジェクトにする）
            const utterances = [];
            for(let i=0; i<2; i++) {
                q.script.forEach((line, index) => {
                    let delay = 600; // 基本のポーズ時間
                    
                    // 第3部(id>=29)で「問」の前のセリフの後は少し長めにする
                    if (q.id >= 29 && index === q.script.length - 2) {
                        delay = 1200;
                    }
                    
                    // 1回目の最後（＝2回目に入る前）は長めのポーズにする
                    if (i === 0 && index === q.script.length - 1) {
                        delay = 2000;
                    }

                    utterances.push({
                        text: line.text,
                        delayAfter: delay
                    });
                });
            }

            let currentIndex = 0;

            function speakNext() {
                if (playingId !== btnId) return; // 途中でキャンセルされた場合
                
                if (currentIndex >= utterances.length) {
                    // 全ての再生が完了したら、UIを戻してテキストを表示
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    revealQuestion(qId);
                    return;
                }

                const currentItem = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(currentItem.text);
                utterance.lang = 'zh-TW'; // 台湾華語
                utterance.rate = 0.85;

                utterance.onend = () => {
                    const delay = currentItem.delayAfter;
                    currentIndex++;
                    setTimeout(() => {
                        if (playingId === btnId) {
                            speakNext();
                        }
                    }, delay); // 設定した空白時間を入れる
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };

                window.speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        // 単一テキストの音声読み上げ関数
        function speakText(text, btnId, isVocab, speakerType) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。");
                return;
            }

            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;    

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (isVocab) {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('text-blue-400');
                            icon.classList.add('animate-pulse', 'text-blue-600');
                        }
                    } else {
                        btn.classList.remove('text-slate-400');
                        if (speakerType === '問') {
                            btn.classList.add('text-emerald-600', 'bg-emerald-100');
                        } else {
                            btn.classList.add('text-indigo-600', 'bg-indigo-100');
                        }
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'currentColor');
                        }
                    }
                }
            };

            utterance.onend = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };
            utterance.onerror = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };

            window.speechSynthesis.speak(utterance);
        }

        // テキストをルビ（下付きピンイン）付きのHTMLに変換する関数
        function getRubyText(text) {
            if (typeof pinyinPro === 'undefined') return text;
            try {
                // pinyin-proで文字ごとのピンイン配列を取得
                const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
                const charArr = Array.from(text);
                
                let html = '';
                for (let i = 0; i < charArr.length; i++) {
                    const char = charArr[i];
                    const py = pinyinArr[i];
                    
                    // 漢字の場合のみルビを振る
                    if (/[\u4e00-\u9fa5]/.test(char) && py !== char) {
                        html += `<ruby style="ruby-position: under;" class="mx-[1px]">${char}<rt class="text-[0.7rem] text-slate-400 font-sans tracking-tighter">${py}</rt></ruby>`;
                    } else {
                        html += `<span class="mx-[1px]">${char}</span>`;
                    }
                }
                return html;
            } catch (e) {
                console.error("ピンイン変換エラー:", e);
                return text;
            }
        }

        // DOMの生成
        function renderApp() {
            const container = document.getElementById('app-content');
            let html = '';

            let isPart2Inserted = false;
            let isPart3Inserted = false;

            questionsData.forEach(q => {
                // セクション見出しの挿入
                if (q.id >= 11 && q.id < 29 && !isPart2Inserted) {
                    html += `
                        <div class="py-4 mb-2">
                            <h2 class="text-2xl font-bold text-indigo-800 flex items-center justify-center gap-2">
                                <i data-lucide="headphones" class="w-6 h-6"></i>
                                第二部分 問答理解
                            </h2>
                            <p class="text-slate-500 mt-2 text-center text-sm">1往復の会話を聞いて、正解の絵を選びます。</p>
                        </div>
                    `;
                    isPart2Inserted = true;
                }
                if (q.id >= 29 && !isPart3Inserted) {
                    html += `
                        <div class="py-6 mt-12 mb-4 border-t-2 border-indigo-100 pt-10">
                            <h2 class="text-2xl font-bold text-indigo-800 flex items-center justify-center gap-2">
                                <i data-lucide="users" class="w-6 h-6"></i>
                                第三部分 對話理解
                            </h2>
                            <p class="text-slate-500 mt-2 text-center text-sm">複数回のやり取りの対話を聞いて、最後の質問に対する正解の絵を選びます。</p>
                        </div>
                    `;
                    isPart3Inserted = true;
                }


                let scriptHtml = q.script.map((line, idx) => {
                    const btnId = `btn-line-${q.id}-${idx}`;
                    
                    let speakerBg = 'bg-slate-100 text-slate-700'; // デフォルト
                    if (line.speaker === '男') speakerBg = 'bg-blue-100 text-blue-700';
                    else if (line.speaker === '女') speakerBg = 'bg-pink-100 text-pink-700';
                    else if (line.speaker === '問') speakerBg = 'bg-emerald-100 text-emerald-700';

                    // ピンイン付きHTMLを取得
                    const rubyText = getRubyText(line.text);

                    return `
                        <div class="flex flex-col sm:flex-row sm:items-start gap-2 bg-slate-50 p-3 rounded-lg">
                            <div class="flex items-center gap-2 sm:w-1/6">
                                <span class="font-bold px-2 py-1 rounded text-sm ${speakerBg}">
                                    ${line.speaker}
                                </span>
                                <button 
                                    id="${btnId}"
                                    onclick="speakText('${line.text}', '${btnId}', false, '${line.speaker}')"
                                    class="secret-target p-1.5 rounded-full hover:bg-slate-200 transition-colors text-slate-400"
                                    title="音声を再生"
                                >
                                    <i data-lucide="play" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="sm:w-5/6 secret-target transition-all duration-500 delay-100">
                                <p class="text-xl font-medium text-slate-800 mb-4 leading-relaxed">${rubyText}</p>
                                <p class="text-slate-600 text-sm">${line.jp}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                let vocabHtml = q.vocab.map((v, idx) => {
                    const btnId = `btn-vocab-${q.id}-${idx}`;
                    return `
                        <div class="flex items-center gap-3 border border-slate-100 bg-white p-2.5 rounded-lg hover:border-indigo-200 transition-colors shadow-sm secret-target transition-all duration-500 delay-200">
                            <button
                                id="${btnId}"
                                onclick="speakText('${v.speak}', '${btnId}', true)"
                                class="flex-shrink-0 flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-md font-mono text-sm transition-colors group"
                                title="発音を聞く"
                            >
                                <i data-lucide="volume-2" class="w-4 h-4 text-blue-400 group-hover:text-blue-600"></i>
                                ${v.pinyin}
                            </button>
                            <div class="flex flex-col justify-center">
                                <span class="font-bold text-slate-800">${v.word}</span>
                                <span class="text-xs text-slate-500">${v.jp}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                html += `
                    <article id="question-${q.id}" class="question-container content-hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <!-- Header -->
                        <div class="bg-indigo-50 border-b border-indigo-100 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div class="flex items-center gap-4">
                                <h2 class="text-xl font-bold text-indigo-800 shrink-0">第 ${q.id} 題</h2>
                                <button onclick="playConversation(${q.id}, 'btn-conv-${q.id}')" id="btn-conv-${q.id}" class="flex items-center gap-1.5 bg-white border border-indigo-200 text-indigo-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-indigo-50 transition-colors">
                                    <i data-lucide="play-circle" class="w-5 h-5"></i>
                                    2回再生して表示
                                </button>
                            </div>
                            <div class="secret-target flex items-center gap-2 bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold transition-all duration-500">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                <span>正解: ${q.ans}</span>
                            </div>
                        </div>

                        <div class="p-6 space-y-6">
                            <!-- Script Section -->
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">スクリプトと和訳</h3>
                                <div class="space-y-3">
                                    ${scriptHtml}
                                </div>
                            </section>

                            <!-- Vocabulary Section -->
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">重要単語</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    ${vocabHtml}
                                </div>
                            </section>

                            <!-- Meta Strategy Section -->
                            <section class="bg-amber-50 border border-amber-200 rounded-lg p-4 secret-target transition-all duration-500 delay-300">
                                <div class="flex items-center gap-2 text-amber-800 font-bold mb-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i>
                                    <h4>メタ解法ポイント</h4>
                                </div>
                                <p class="text-amber-900 text-sm leading-relaxed">
                                    ${q.meta}
                                </p>
                            </section>
                        </div>
                    </article>
                `;
            });

            container.innerHTML = html;
        }

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            // Lucideアイコンの初期化 (描画後に実行)
            lucide.createIcons();
        });
    </script>
</body>
</html>
