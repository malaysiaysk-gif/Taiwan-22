<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Pinyin Pro (自動ピンイン付与ライブラリ) -->

    <style>
        /* カスタムの微調整用スタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        
        /* 隠す（ぼかし）設定 */
        .content-hidden .secret-target {
            filter: blur(8px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
        }
        
        /* 表示時（ぼかし解除）の設定 */
        body.global-reveal .content-hidden .secret-target,
        .question-container:not(.content-hidden) .secret-target {
            filter: blur(0px);
            opacity: 1;
            pointer-events: auto;
            user-select: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-6 text-center">

    </header>

    <!-- タブナビゲーション -->
    <div class="max-w-4xl mx-auto mb-6 flex justify-center gap-4">
        <button onclick="switchTab('listening')" id="tab-listening" class="px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors">リスニング学習</button>
        <button onclick="switchTab('flashcard')" id="tab-flashcard" class="px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors">フラッシュカード</button>
    </div>

    <!-- リスニングビュー -->
    <div id="listening-view">
        <!-- グローバル表示切り替えボタン -->
        <div class="max-w-4xl mx-auto mb-6 flex justify-end">
            <button onclick="toggleGlobalReveal()" id="global-reveal-btn" class="flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg shadow-sm hover:bg-slate-50 transition-colors font-medium text-sm">
                <i data-lucide="eye" class="w-4 h-4"></i>
                <span>すべての解答・スクリプトを表示</span>
            </button>
        </div>

        <main id="app-content" class="max-w-4xl mx-auto space-y-8">
            <!-- JSでここにコンテンツが生成されます -->
        </main>
    </div>

    <!-- フラッシュカードビュー -->
    <div id="flashcard-view" class="hidden max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-10 flex flex-col items-center">
            <!-- モード切替 -->
            <div class="flex gap-2 mb-8 bg-slate-100 p-1 rounded-lg">
                <button onclick="setFlashcardMode('vocab')" id="fc-mode-vocab" class="px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all">重要単語</button>
                <button onclick="setFlashcardMode('sentence')" id="fc-mode-sentence" class="px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">センテンス</button>
            </div>

            <!-- カードエリア -->
            <div id="flashcard-container" class="w-full cursor-pointer" onclick="handleCardClick()">
                <!-- JSでカードを描画 -->
            </div>

            <!-- コントロール -->
            <div class="mt-8 flex justify-between items-center w-full">
                <button onclick="prevCard()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="前のカード (左矢印キー)"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                <div class="flex items-center gap-4">
                    <button onclick="reshuffleCards()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50" title="順番を新しくシャッフルする"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                    <span id="fc-counter" class="text-slate-500 font-mono font-medium"></span>
                </div>
                <button onclick="nextCard()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="次のカード (右矢印キー)"><i data-lucide="chevron-right" class="w-8 h-8"></i></button>
            </div>
            
            <p class="mt-4 text-xs text-slate-400 text-center">※キーボードの「スペースキー」でカードを裏返し、「左右の矢印キー」で移動できます。</p>
        </div>
    </div>

    </footer>

        // 状態管理
        let playingId = null;
        let playingType = null; // 'single' | 'vocab' | 'conversation'
        let isGlobalReveal = false;

        // すべて表示/隠す トグル処理
        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;

        // 単一の問題を表示状態にする
        function revealQuestion(qId) {
            const el = document.getElementById(`question-${qId}`);
            if (el) {
                el.classList.remove('content-hidden');
            }
        }

        // UIをリセットする関数
        function resetActiveUI() {
            if (playingId) {
                const btn = document.getElementById(playingId);
                if (btn) {
                    if (playingType === 'vocab') {
                        // 単語ボタンのリセット
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('animate-pulse', 'text-blue-600');
                            icon.classList.add('text-blue-400');
                        }
                    } else if (playingType === 'single') {
                        // スクリプトボタンのリセット
                        btn.classList.remove('text-indigo-600', 'bg-indigo-100', 'text-emerald-600', 'bg-emerald-100');
                        btn.classList.add('text-slate-400');
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'none');
                        }
                    } else if (playingType === 'conversation') {
                        // 会話再生ボタンのリセット
                        btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                        btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                        lucide.createIcons({root: btn});
                    }
                }
            }
        }

        // 会話を2回再生してテキストを表示する関数
        function playConversation(qId, btnId) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。ChromeやSafariをご利用ください。");
                return;
            }

            // 既存の音声をキャンセルしてUIをリセット
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            // 2回分のテキストリストを作成（ポーズ時間を含むオブジェクトにする）
            const utterances = [];
            for(let i=0; i<2; i++) {
                q.script.forEach((line, index) => {
                    let delay = 600; // 基本のポーズ時間
                    
                    // 第3部,第4部(id>=29)で「問」の前のセリフの後は少し長めにする
                    if (q.id >= 29 && index === q.script.length - 2) {
                        delay = 1200;
                    }
                    
                    // 1回目の最後（＝2回目に入る前）は長めのポーズにする
                    // ※第1部（id < 11）はセリフが1つしかないので、そのセリフの後に長めのポーズを入れる
                    if (i === 0 && index === q.script.length - 1) {
                        delay = 2000;
                    }

                    utterances.push({
                        text: line.text,
                        delayAfter: delay
                    });
                });
            }

            let currentIndex = 0;

            function speakNext() {
                if (playingId !== btnId) return; // 途中でキャンセルされた場合
                
                if (currentIndex >= utterances.length) {
                    // 全ての再生が完了したら、UIを戻してテキストを表示
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    revealQuestion(qId);
                    return;
                }

                const currentItem = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(currentItem.text);
                utterance.lang = 'zh-TW'; // 台湾華語
                utterance.rate = 0.85;

                utterance.onend = () => {
                    const delay = currentItem.delayAfter;
                    currentIndex++;
                    setTimeout(() => {
                        if (playingId === btnId) {
                            speakNext();
                        }
                    }, delay); // 設定した空白時間を入れる
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };

                window.speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        // 単一テキストの音声読み上げ関数
        function speakText(text, btnId, isVocab, speakerType) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。");
                return;
            }

            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;    

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (isVocab) {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('text-blue-400');
                            icon.classList.add('animate-pulse', 'text-blue-600');
                        }
                    } else {
                        btn.classList.remove('text-slate-400');
                        if (speakerType === '問') {
                            btn.classList.add('text-emerald-600', 'bg-emerald-100');
                        } else {
                            btn.classList.add('text-indigo-600', 'bg-indigo-100');
                        }
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'currentColor');
                        }
                    }
                }
            };

            utterance.onend = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };
            utterance.onerror = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };

            window.speechSynthesis.speak(utterance);
        }

        // テキストをルビ（下付きピンイン）付きのHTMLに変換する関数
        function getRubyText(text) {
            if (typeof pinyinPro === 'undefined') return text;
            try {
                // pinyin-proで文字ごとのピンイン配列を取得
                const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
                const charArr = Array.from(text);
                
                let html = '';
                for (let i = 0; i < charArr.length; i++) {
                    const char = charArr[i];
                    const py = pinyinArr[i];
                    
                    // 漢字の場合のみルビを振る
                    if (/[\u4e00-\u9fa5]/.test(char) && py !== char) {
                        html += `<ruby style="ruby-position: under;" class="mx-[1px]">${char}<rt class="text-[0.7rem] text-slate-400 font-sans tracking-tighter">${py}</rt></ruby>`;
                    } else {
                        html += `<span class="mx-[1px]">${char}</span>`;
                    }
                }
                return html;
            } catch (e) {
                console.error("ピンイン変換エラー:", e);
                return text;
            }
        }

        // データを抽出してシャッフル
        function initFlashcardsData() {
            const vocabMap = new Map();
            questionsData.forEach(q => {
                // 不正解の選択肢語彙（ダミー）などは混乱を防ぐため省く
                if (q.vocab) {
                    q.vocab.forEach(v => {
                        if (!vocabMap.has(v.word) && !v.jp.includes('不正解')) {
                            vocabMap.set(v.word, v);
                        }
                    });
                }
                if (q.script) {
                    q.script.forEach(s => {
                        // 質問文(問)は除外
                        if (s.speaker !== '問' && s.text) {
                            allSentences.push(s);
                        }
                    });
                }
            });
            allVocabs = Array.from(vocabMap.values());
        }

        function shuffle(array) {
            let currentIndex = array.length,  randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

            if (mode === 'vocab') {
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = shuffle([...allVocabs]);
            } else {
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = shuffle([...allSentences]);
            }
            currentCardIndex = 0;
            isCardFlipped = false;
            isFcTextRevealed = false;
            renderFlashcard();
        }

        function initFlashcards() {
            if (allVocabs.length === 0) {
                initFlashcardsData();
            }
            setFlashcardMode(fcMode);
        }

        function handleCardClick() {
            if (!isCardFlipped && !isFcTextRevealed) {
                revealFcText();
            } else {
                flipCard();
            }
        }

        function revealFcText(e) {
            if (e) e.stopPropagation();
            isFcTextRevealed = true;
            renderFlashcard();
        }

        function renderFlashcard() {
            const container = document.getElementById('flashcard-container');
            const counter = document.getElementById('fc-counter');
            
            if (flashcards.length === 0) return;
            
            counter.innerText = `${currentCardIndex + 1} / ${flashcards.length}`;
            
            const card = flashcards[currentCardIndex];
            let frontHtml = '';
            let backHtml = '';
            let btnId = `fc-btn-${currentCardIndex}`;
            
            // ぼかしクラスの適用
            const blurClass = !isFcTextRevealed ? 'filter blur-md select-none opacity-40' : '';

            if (fcMode === 'vocab') {
                frontHtml = `
                    <div class="text-center ${blurClass} transition-all duration-500">
                        <div class="text-4xl font-bold text-slate-800 mb-4">${card.word}</div>
                        <div class="text-xl text-slate-500 font-mono mb-4">${card.pinyin}</div>
                    </div>
                `;
                backHtml = `
                    <div class="text-center">
                        <div class="text-2xl font-bold text-emerald-700">${card.jp}</div>
                    </div>
                `;
            } else {
                const rubyText = getRubyText(card.text);
                frontHtml = `
                    <div class="text-center ${blurClass} transition-all duration-500">
                        <div class="text-2xl font-medium text-slate-800 mb-6 leading-relaxed">${rubyText}</div>
                    </div>
                `;
                backHtml = `
                    <div class="text-center">
                        <div class="text-xl font-bold text-emerald-700 leading-relaxed">${card.jp}</div>
                    </div>
                `;
            }

            const speakTextStr = fcMode === 'vocab' ? card.speak : card.text;
            const isVocab = fcMode === 'vocab';
            
            // 未表示時のオーバーレイ
            let overlayHtml = '';
            if (!isCardFlipped && !isFcTextRevealed) {
                overlayHtml = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/40 backdrop-blur-[1px] rounded-2xl">
                        <button 
                            id="fc-center-play-btn"
                            onclick="event.stopPropagation(); speakText('${speakTextStr.replace(/'/g, "\\'")}', 'fc-center-play-btn', ${isVocab})"
                            class="mb-4 bg-indigo-100 text-indigo-700 border border-indigo-300 font-bold py-3 px-8 rounded-full shadow-md hover:bg-indigo-200 transition-colors flex items-center gap-2"
                        >
                            <i data-lucide="volume-2" class="w-6 h-6"></i>
                            音声を聴く
                        </button>
                        <button 
                            onclick="event.stopPropagation(); revealFcText(event)" 
                            class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2"
                        >
                            <i data-lucide="eye" class="w-4 h-4"></i>
                            文字を表示 (Space)
                        </button>
                    </div>
                `;
            }

            let bottomHint = '';
            if (!isFcTextRevealed && !isCardFlipped) {
                bottomHint = 'クリック または Space で文字を表示';
            } else if (isCardFlipped) {
                bottomHint = 'クリック または Space で Question に戻る';
            } else {
                bottomHint = 'クリック または Space で裏返す (日本語訳)';
            }
            
            container.innerHTML = `
                <div class="relative w-full min-h-[300px] bg-slate-50 rounded-2xl border-2 border-slate-200 p-8 flex flex-col justify-center items-center transition-all duration-300 hover:border-indigo-200 group shadow-sm">
                    
                    ${overlayHtml}

                    <button 
                        id="${btnId}"
                        onclick="event.stopPropagation(); speakText('${speakTextStr.replace(/'/g, "\\'")}', '${btnId}', ${isVocab})"
                        class="absolute top-4 right-4 p-3 rounded-full bg-white border border-slate-200 text-indigo-500 hover:bg-indigo-50 hover:text-indigo-600 shadow-sm transition-colors z-20"
                        title="音声を再生"
                    >
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                    </button>
                    
                    <div class="absolute top-4 left-4 px-3 py-1 rounded bg-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest z-20">
                        ${isCardFlipped ? 'Answer' : 'Question'}
                    </div>

                    <div id="fc-content" class="w-full mt-4">
                        ${isCardFlipped ? backHtml : frontHtml}
                    </div>
                    
                    <div class="absolute bottom-4 text-sm text-slate-400 opacity-50 group-hover:opacity-100 transition-opacity flex items-center gap-1 z-20">
                        <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i>
                        ${bottomHint}
                    </div>
                </div>
            `;
            lucide.createIcons({root: container});
        }

        function flipCard() {
            isCardFlipped = !isCardFlipped;
            renderFlashcard();
        }

        function nextCard() {
            window.speechSynthesis.cancel();
            resetActiveUI();
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                isCardFlipped = false;
                isFcTextRevealed = false;
                renderFlashcard();
            }
        }

        function prevCard() {
            window.speechSynthesis.cancel();
            resetActiveUI();
            if (currentCardIndex > 0) {
                currentCardIndex--;
                isCardFlipped = false;
                isFcTextRevealed = false;
                renderFlashcard();
            }
        }

        function reshuffleCards() {
            window.speechSynthesis.cancel();
            resetActiveUI();
            flashcards = shuffle([...flashcards]);
            currentCardIndex = 0;
            isCardFlipped = false;
            isFcTextRevealed = false;
            renderFlashcard();
        }

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('flashcard-view').classList.contains('hidden')) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (!isCardFlipped && !isFcTextRevealed) {
                        revealFcText();
                    } else {
                        flipCard();
                    }
                } else if (e.code === 'ArrowRight') {
                    nextCard();
                } else if (e.code === 'ArrowLeft') {
                    prevCard();
                }
            }
        });

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            // Lucideアイコンの初期化 (描画後に実行)
            lucide.createIcons();
        });
    </script>
</body>
</html>
