                { word: "樓下", pinyin: "lóu xià", jp: "下の階、1階", speak: "樓下" },
                { word: "窗戶", pinyin: "chuāng hù", jp: "窓", speak: "窗戶" },
                { word: "海邊", pinyin: "hǎi biān", jp: "海辺 (不正解A,B)", speak: "海邊" }
                ],
                meta: "(A)は海辺/川、(B)も海辺/川ですが、「山上（山）」と言っているので背景が山の(C)が正解です。",
                ans: "C"
            },
            {
                id: 25,

                { speaker: "男", text: "美美，我的那件短袖襯衫呢？", jp: "メイメイ、俺のあの半袖シャツは？" },

                ],
                vocab: [
                { word: "短袖襯衫", pinyin: "duǎn xiù chèn shān", jp: "半袖シャツ", speak: "短袖襯衫" },
                { word: "剛〜好", pinyin: "gāng 〜 hǎo", jp: "〜し終わったばかり", speak: "剛好" },
                { word: "還沒", pinyin: "hái méi", jp: "まだ〜していない", speak: "還沒" },
                { word: "乾", pinyin: "gān", jp: "乾く", speak: "乾" },
                { word: "乾了", pinyin: "gān le", jp: "乾いた (不正解B)", speak: "乾了" },
                { word: "洗衣服", pinyin: "xǐ yī fú", jp: "服を洗う (不正解C)", speak: "洗衣服" }
                ],
                meta: "「洗（洗う）」という言葉で(C)の洗っている最中の絵を選ばないように注意。「洗好（洗い終わった）」状態で、「還沒乾（まだ乾いていない＝濡れている）」なので、干して水滴が落ちている(A)が正解です。",
                ans: "A"
            },
            {
                id: 26,
                script: [
                { speaker: "男", text: "聽說小明家附近的風景很漂亮，是嗎？", jp: "小明の家の近くの風景は綺麗らしいね、そうなの？" },
                { speaker: "女", text: "是啊！但是那裡冬天的溫度很低，你去找他要穿暖一點。", jp: "そうよ！でもあそこは冬の気温がとても低いから、会いに行くなら少し暖かく着たほうがいいわ。" }
                ],
                vocab: [
                { word: "風景", pinyin: "fēng jǐng", jp: "風景", speak: "風景" },
                { word: "冬天", pinyin: "dōng tiān", jp: "冬", speak: "冬天" },
                { word: "溫度", pinyin: "wēn dù", jp: "温度、気温", speak: "溫度" },
                { word: "很低", pinyin: "hěn dī", jp: "低い", speak: "很低" },
                { word: "穿暖一點", pinyin: "chuān nuǎn yì diǎn", jp: "少し暖かく着る", speak: "穿暖一點" },
                { word: "圍巾", pinyin: "wéi jīn", jp: "マフラー (絵C)", speak: "圍巾" },
                { word: "帽子", pinyin: "mào zi", jp: "帽子 (絵C)", speak: "帽子" }
                ],
                meta: "「冬天（冬）」「溫度很低（気温が低い）」「穿暖一點（暖かく着る）」というキーワードから、マフラーと帽子をしている(C)を選びます。",
                ans: "C"
            },
            {
                id: 27,
                script: [
                { speaker: "女", text: "你覺得認識臺灣最好的方法是什麼？", jp: "台湾を知るための最も良い方法は何だと思う？" },
                { speaker: "男", text: "看書、看電視介紹都不錯，但是最好的方法就是你自己去旅行。", jp: "本を読んだり、テレビの紹介を見たりするのも悪くないけど、最も良い方法は自分で旅行に行くことだよ。" }
                ],
                vocab: [
                { word: "認識", pinyin: "rèn shì", jp: "知る、認識する", speak: "認識" },
                { word: "最好", pinyin: "zuì hǎo", jp: "最も良い、一番良い", speak: "最好" },
                { word: "看書", pinyin: "kàn shū", jp: "本を読む", speak: "看書" },
                { word: "看電視", pinyin: "kàn diàn shì", jp: "テレビを見る", speak: "看電視" },
                { word: "旅行", pinyin: "lǚ xíng", jp: "旅行する", speak: "旅行" }
                ],
                meta: "第20題の進化版です。「看書(B)」「看電視(C)」とわざと言及して迷わせます。「但是(しかし)」の後の「最(一番)」が結論になります。結論は「旅行(A)」です。",
                ans: "A"
            },
            {
                id: 28,
                script: [
                { speaker: "男", text: "小美，你的新家怎麼樣？", jp: "小美、新しい家はどう？" },
                { speaker: "女", text: "別說了，我搬到公寓去，結果樓上的小孩經常往下丟垃圾，環境非常髒。", jp: "言わないで、マンションに引っ越したんだけど、上の階の子供がよく下に向かってゴミを投げるから、環境がすごく汚いの。" }
                ],
                vocab: [
                { word: "搬", pinyin: "bān", jp: "引っ越す", speak: "搬" },
                { word: "樓上", pinyin: "lóu shàng", jp: "上の階", speak: "樓上" },
                { word: "經常", pinyin: "jīng cháng", jp: "しょっちゅう、よく", speak: "經常" },
                { word: "往下", pinyin: "wǎng xià", jp: "下に向かって", speak: "往下" },
                { word: "丟垃圾", pinyin: "diū lè sè", jp: "ゴミを捨てる、投げる", speak: "丟垃圾" },
                { word: "髒", pinyin: "zāng", jp: "汚い", speak: "髒" },
                { word: "往上", pinyin: "wǎng shàng", jp: "上に向かって (不正解B)", speak: "往上" },
                { word: "澆水", pinyin: "jiāo shuǐ", jp: "水をやる (不正解A)", speak: "澆水" }
                ],
                meta: "「誰が」「どこから」「どこへ」動作をしているかを絵と一致させます。「樓上的小孩（上の階の子供）」が「往下丟（下に向かって投げる）」。この条件を満たしているのは(C)の絵だけです。",
                ans: "C"
            }
        ];

        // 状態管理
        let playingId = null;
        let playingType = null; // 'single' | 'vocab' | 'conversation'
        let isGlobalReveal = false;

        // すべて表示/隠す トグル処理
        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;
            } else {
                document.body.classList.remove('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i><span>すべての解答・スクリプトを表示</span>`;
            }
            lucide.createIcons({root: document.getElementById('global-reveal-btn')});
        }

        // 単一の問題を表示状態にする
        function revealQuestion(qId) {
            const el = document.getElementById(`question-${qId}`);
            if (el) {
                el.classList.remove('content-hidden');
            }
        }

        // UIをリセットする関数
        function resetActiveUI() {
            if (playingId) {
                const btn = document.getElementById(playingId);
                if (btn) {
                    if (playingType === 'vocab') {
                        // 単語ボタンのリセット
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('animate-pulse', 'text-blue-600');
                            icon.classList.add('text-blue-400');
                        }
                    } else if (playingType === 'single') {
                        // スクリプトボタンのリセット
                        btn.classList.remove('text-indigo-600', 'bg-indigo-100');
                        btn.classList.add('text-slate-400');
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'none');
                        }
                    } else if (playingType === 'conversation') {
                        // 会話再生ボタンのリセット
                        btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                        btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                        lucide.createIcons({root: btn});
                    }
                }
            }
        }

        // 会話を2回再生してテキストを表示する関数
        function playConversation(qId, btnId) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。ChromeやSafariをご利用ください。");
                return;
            }

            // 既存の音声をキャンセルしてUIをリセット
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            // 2回分のテキストリストを作成
            const utterances = [];
            for(let i=0; i<2; i++) {
                q.script.forEach(line => {
                    utterances.push(line.text);
                });
            }

            let currentIndex = 0;

            function speakNext() {
                if (playingId !== btnId) return; // 途中でキャンセルされた場合
                
                if (currentIndex >= utterances.length) {
                    // 全ての再生が完了したら、UIを戻してテキストを表示
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    revealQuestion(qId);
                    return;
                }

                const text = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW'; // 台湾華語
                utterance.rate = 0.85;

                utterance.onend = () => {
                    currentIndex++;
                    setTimeout(() => {
                        if (playingId === btnId) {
                            speakNext();
                        }
                    }, 600); // セリフの間に600msの空白を入れる
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };

                window.speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        // 単一テキストの音声読み上げ関数
        function speakText(text, btnId, isVocab) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。");
                return;
            }

            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;    

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (isVocab) {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('text-blue-400');
                            icon.classList.add('animate-pulse', 'text-blue-600');
                        }
                    } else {
                        btn.classList.remove('text-slate-400');
                        btn.classList.add('text-indigo-600', 'bg-indigo-100');
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) {
                            icon.setAttribute('fill', 'currentColor');
                        }
                    }
                }
            };

            utterance.onend = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };
            utterance.onerror = () => {
                resetActiveUI();
                playingId = null;
                playingType = null;
            };

            window.speechSynthesis.speak(utterance);
        }

        // DOMの生成
        function renderApp() {
            const container = document.getElementById('app-content');
            let html = '';

            questionsData.forEach(q => {
                let scriptHtml = q.script.map((line, idx) => {
                    const btnId = `btn-line-${q.id}-${idx}`;
                    const speakerBg = line.speaker === '男' ? 'bg-blue-100 text-blue-700' : 'bg-pink-100 text-pink-700';
                    return `
                        <div class="flex flex-col sm:flex-row sm:items-start gap-2 bg-slate-50 p-3 rounded-lg">
                            <div class="flex items-center gap-2 sm:w-1/6">
                                <span class="font-bold px-2 py-1 rounded text-sm ${speakerBg}">
                                    ${line.speaker}
                                </span>
                                <button 
                                    id="${btnId}"
                                    onclick="speakText('${line.text}', '${btnId}', false)"
                                    class="secret-target p-1.5 rounded-full hover:bg-slate-200 transition-colors text-slate-400"
                                    title="音声を再生"
                                >
                                    <i data-lucide="play" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="sm:w-5/6 secret-target transition-all duration-500 delay-100">
                                <p class="text-lg font-medium text-slate-800 mb-1">${line.text}</p>
                                <p class="text-slate-600 text-sm">${line.jp}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                let vocabHtml = q.vocab.map((v, idx) => {
                    const btnId = `btn-vocab-${q.id}-${idx}`;
                    return `
                        <div class="flex items-center gap-3 border border-slate-100 bg-white p-2.5 rounded-lg hover:border-indigo-200 transition-colors shadow-sm secret-target transition-all duration-500 delay-200">
                            <button
                                id="${btnId}"
                                onclick="speakText('${v.speak}', '${btnId}', true)"
                                class="flex-shrink-0 flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-md font-mono text-sm transition-colors group"
                                title="発音を聞く"
                            >
                                <i data-lucide="volume-2" class="w-4 h-4 text-blue-400 group-hover:text-blue-600"></i>
                                ${v.pinyin}
                            </button>
                            <div class="flex flex-col justify-center">
                                <span class="font-bold text-slate-800">${v.word}</span>
                                <span class="text-xs text-slate-500">${v.jp}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                html += `
                    <article id="question-${q.id}" class="question-container content-hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <!-- Header -->
                        <div class="bg-indigo-50 border-b border-indigo-100 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div class="flex items-center gap-4">
                                <h2 class="text-xl font-bold text-indigo-800 shrink-0">第 ${q.id} 題</h2>
                                <button onclick="playConversation(${q.id}, 'btn-conv-${q.id}')" id="btn-conv-${q.id}" class="flex items-center gap-1.5 bg-white border border-indigo-200 text-indigo-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-indigo-50 transition-colors">
                                    <i data-lucide="play-circle" class="w-5 h-5"></i>
                                    2回再生して表示
                                </button>
                            </div>
                            <div class="secret-target flex items-center gap-2 bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold transition-all duration-500">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                <span>正解: ${q.ans}</span>
                            </div>
                        </div>

                        <div class="p-6 space-y-6">
                            <!-- Script Section -->
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">スクリプトと和訳</h3>
                                <div class="space-y-3">
                                    ${scriptHtml}
                                </div>
                            </section>

                            <!-- Vocabulary Section -->
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">重要単語</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    ${vocabHtml}
                                </div>
                            </section>

                            <!-- Meta Strategy Section -->
                            <section class="bg-amber-50 border border-amber-200 rounded-lg p-4 secret-target transition-all duration-500 delay-300">
                                <div class="flex items-center gap-2 text-amber-800 font-bold mb-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i>
                                    <h4>メタ解法ポイント</h4>
                                </div>
                                <p class="text-amber-900 text-sm leading-relaxed">
                                    ${q.meta}
                                </p>
                            </section>
                        </div>
                    </article>
                `;
            });

            container.innerHTML = html;
        }

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            // Lucideアイコンの初期化 (描画後に実行)
            lucide.createIcons();
        });
    </script>
</body>
</html>
