<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOCFL 学習トラッカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration & Initialization
        let auth, db, userId;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const initFirebase = async () => {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            userId = user.uid;
                            setupRealtimeListener();
                        } else {
                            userId = null;
                        }
                    });
                } else {
                    console.warn("Firebase config not found. Running with local memory only.");
                    renderApp(); // Fallback to memory-only
                }
            } catch (error) {
                console.error("Firebase initialization error:", error);
                renderApp(); // Fallback
            }
        };

                   { id: 202606011, date: '2026-06-11', hours: 1.0 },
             { id: 202606010, date: '2026-06-10', hours: 2.0 },

            { id: 20260608, date: '2026-06-08', hours: 1.0 },

             { id: 20260603, date: '2026-06-03', hours: 2.0 },
           { id: 20260602, date: '2026-06-02', hours: 2.0 },
                 { id: 20260601, date: '2026-06-01', hours: 1.5 },
             { id: 20260531, date: '2026-05-31', hours: 5.0 },

              { id: 20260529, date: '2026-05-29', hours: 1.0 },

             { id: 20260527, date: '2026-05-27', hours: 1.0 },

             { id: 20260525, date: '2026-05-25', hours: 1.5 },
              { id: 20260524, date: '2026-05-24', hours: 5.0 },
              { id: 20260523, date: '2026-05-23', hours: 5.0 },
             { id: 20260522, date: '2026-05-22', hours: 1.5 },
            { id: 20260521, date: '2026-05-21', hours: 1.0 },
            { id: 20260520, date: '2026-05-20', hours: 2.0 },
            { id: 20260519, date: '2026-05-19', hours: 1.0 },
            { id: 20260518, date: '2026-05-18', hours: 1.5 }

        const targetDate = new Date(2026, 5, 28); // 6月28日

        const weekdayScheduleTTh = [

            { start: 6, end: 6.75, label: '起床', color: '#bfdbfe' },
            { start: 6.75, end: 7.25, label: '例文100(リス&暗唱)', color: '#fca5a5' },
            { start: 7.25, end: 17, label: '仕事/他', color: '#f3f4f6' },

        // --- Firebase Operations ---
        const setupRealtimeListener = () => {
            if (!userId || !db) return;
            const colRef = collection(db, 'artifacts', appId, 'users', userId, 'study_records');
            onSnapshot(colRef, (snapshot) => {
                if (!snapshot.empty) {
                    records = [];
                    snapshot.forEach(doc => {
                        records.push({ id: doc.id, ...doc.data() });
                    });
                    records.sort((a, b) => new Date(b.date) - new Date(a.date));
                } else {
                     if(records.length > 0){
                         records.forEach(record => saveRecordToCloud(record));
                     }
                }
                renderApp();
            }, (error) => {
                console.error("Error listening to records:", error);
                renderApp();
            });
        };

        window.saveRecordToCloud = async (record) => {
            if (!userId || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'study_records', record.id.toString());
                await setDoc(docRef, record);
            } catch (error) {
                console.error("Error saving record:", error);
            }
        };

        window.deleteRecordFromCloud = async (id) => {
            if (!userId || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'study_records', id.toString());
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Error deleting record:", error);
            }
        };

        // --- App State ---
        let activeTab = 'plan';
        let scheduleType = 'weekdayMWF';
        let newDate = getTodayLocalString();
        let newHours = '';

        const weekdayTasksMWF = [
            "朝: 例文100のリスニングと暗唱",
            "夜: 朝やった例文100のリスニングと暗唱の復習とまとめ集見直し"
        ];

        const weekdayTasksTTh = [
            "朝: 例文100のリスニングと暗唱"
        ];

        const weekendTasks1 = [
            "朝一時間目: TOCFL後半40代以降の演習（5問）",
            "朝二時間目: 例文100のリスニングと暗唱or単語集",
            "昼一時間目: TOCFL後半40代以降の演習続き（5問）",
            "昼二時間目: 例文100のリスニングと暗唱or単語集もしくは演習遅れのカバー",
            "夜: 一日の復習or例文100のリスニングと暗唱"
        ];

        const weekendTasks2 = [
            "朝一時間目: L5（最新）",
            "朝2時間目: L4（L5）",
            "昼1時間目: まとめ見直しorリスニング問題復習",
            "昼2時間目: まとめ見直しorリスニング問題復習",
            "夜: まとめ見直し"
        ];

        function getTodayLocalString() {
            const dateObj = new Date();
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // --- Logic Functions ---
        function calculateTotalGoals() {
            let totalWeekday = 0;
            let totalWeekend = 0;
            let current = new Date(startDate);
            const endCalcDate = new Date(targetDate);
            endCalcDate.setHours(23, 59, 59, 999);
            while (current <= endCalcDate) {
                const dateStr = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}-${String(current.getDate()).padStart(2, '0')}`;
                
                // 6/27(休息日) と 6/28(試験日) は目標時間計算から除外
                if (dateStr !== '2026-06-27' && dateStr !== '2026-06-28') {
                    const day = current.getDay();
                    if (day === 0 || day === 6) {
                        totalWeekend += 5;
                    } else if (day === 1 || day === 3 || day === 5) {
                        totalWeekday += 1.5;
                    } else if (day === 2 || day === 4) {
                        totalWeekday += 0.5;
                    }
                }
                current.setDate(current.getDate() + 1);
            }
            return { totalWeekday, totalWeekend, total: totalWeekday + totalWeekend };
        }

        function calculateStats() {
            const today = new Date();
            let expectedWeekdayHours = 0;
            let expectedWeekendHours = 0;
            
            if (today >= startDate) {
                let current = new Date(startDate);
                const endCalcDate = new Date(today);
                endCalcDate.setHours(23, 59, 59, 999);
                
                while (current <= endCalcDate && current <= targetDate) {
                    const dateStr = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}-${String(current.getDate()).padStart(2, '0')}`;
                    
                    // 6/27(休息日) と 6/28(試験日) は期待進捗の計算から除外
                    if (dateStr !== '2026-06-27' && dateStr !== '2026-06-28') {
                        const day = current.getDay();
                        if (day === 0 || day === 6) {
                            expectedWeekendHours += 5;
                        } else if (day === 1 || day === 3 || day === 5) {
                            expectedWeekdayHours += 1.5;
                        } else if (day === 2 || day === 4) {
                            expectedWeekdayHours += 0.5;
                        }
                    }
                    current.setDate(current.getDate() + 1);
                }
            }

            let totalWeekdayRecorded = 0;
            let totalWeekendRecorded = 0;

            records.forEach(r => {
                const [year, month, day] = r.date.split('-');
                const d = new Date(year, month - 1, day);
                const dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    totalWeekendRecorded += r.hours;
                } else {
                    totalWeekdayRecorded += r.hours;
                }
            });

            const expectedHours = expectedWeekdayHours + expectedWeekendHours;
            const totalRecorded = totalWeekdayRecorded + totalWeekendRecorded;
            const diff = totalRecorded - expectedHours;
            
            return {
                totalRecorded,
                expectedHours,
                totalWeekdayRecorded,
                expectedWeekdayHours,
                totalWeekendRecorded,
                expectedWeekendHours,
                diff,
                weekdayDiff: totalWeekdayRecorded - expectedWeekdayHours,
                weekendDiff: totalWeekendRecorded - expectedWeekendHours
            };
        }

        function calculateDaysLeft() {
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 0 ? diffDays : 0;
        }

        // --- UI Rendering ---
        function renderTabs() {
            document.getElementById('btn-plan').className = `flex-1 py-2 text-sm font-medium rounded-md flex items-center justify-center gap-2 transition-colors ${activeTab === 'plan' ? 'bg-teal-50 text-teal-700 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`;
            document.getElementById('btn-record').className = `flex-1 py-2 text-sm font-medium rounded-md flex items-center justify-center gap-2 transition-colors ${activeTab === 'record' ? 'bg-teal-50 text-teal-700 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`;
            
            document.getElementById('view-plan').style.display = activeTab === 'plan' ? 'block' : 'none';
            document.getElementById('view-record').style.display = activeTab === 'record' ? 'block' : 'none';
        }

        function renderPieChart() {
            let schedule;
            if (scheduleType.startsWith('weekend')) {
                schedule = weekendSchedule;
            } else if (scheduleType === 'weekdayMWF') {
                schedule = weekdayScheduleMWF;
            } else {
                schedule = weekdayScheduleTTh;
            }
            const svgSize = 160;
            const radius = 70;
            const center = svgSize / 2;
            
            let svgContentDay = `<circle cx="${center}" cy="${center}" r="${radius}" fill="#f9fafb" />`;
            let svgContentNight = `<circle cx="${center}" cy="${center}" r="${radius}" fill="#f9fafb" />`;

            const generatePieSlice = (start, end) => {
                if (start >= end) return '';
                let duration = end - start;
                if (duration >= 12) duration = 11.999;
                
                const startDeg = (start / 12) * 360 - 90;
                const endDeg = startDeg + (duration / 12) * 360;
                
                const startRad = (Math.PI / 180) * startDeg;
                const endRad = (Math.PI / 180) * endDeg;
                const x1 = center + radius * Math.cos(startRad);
                const y1 = center + radius * Math.sin(startRad);
                const x2 = center + radius * Math.cos(endRad);
                const y2 = center + radius * Math.sin(endRad);
                const largeArcFlag = duration > 6 ? 1 : 0;
                
                return `M ${center} ${center} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
            };

            schedule.forEach(item => {
                // 昼 (6:00 - 18:00)
                const sDay = Math.max(item.start, 6);
                const eDay = Math.min(item.end, 18);
                if (sDay < eDay) {
                    svgContentDay += `<path d="${generatePieSlice(sDay, eDay)}" fill="${item.color}" stroke="#ffffff" stroke-width="1.5" />`;
                }

                // 夜 (18:00 - 24:00)
                const sNight1 = Math.max(item.start, 18);
                const eNight1 = Math.min(item.end, 24);
                if (sNight1 < eNight1) {
                    svgContentNight += `<path d="${generatePieSlice(sNight1, eNight1)}" fill="${item.color}" stroke="#ffffff" stroke-width="1.5" />`;
                }
                
                // 夜 (0:00 - 6:00)
                const sNight2 = Math.max(item.start, 0);
                const eNight2 = Math.min(item.end, 6);
                if (sNight2 < eNight2) {
                    svgContentNight += `<path d="${generatePieSlice(sNight2, eNight2)}" fill="${item.color}" stroke="#ffffff" stroke-width="1.5" />`;
                }
            });

            let legendContent = '';
            const uniqueLabels = [...new Set(schedule.map(s => s.label))];
            uniqueLabels.forEach(label => {
                const color = schedule.find(s => s.label === label).color;
                legendContent += `
                    <div class="flex items-center text-xs text-gray-600 bg-white px-2 py-1 rounded-full shadow-sm border border-gray-100">
                        <span class="w-3 h-3 rounded-full mr-1.5" style="background-color: ${color}"></span>
                        ${label}
                    </div>
                `;
            });

            document.getElementById('pie-chart-day-svg').innerHTML = svgContentDay;
            document.getElementById('pie-chart-night-svg').innerHTML = svgContentNight;
            document.getElementById('pie-chart-legend').innerHTML = legendContent;
            
            document.getElementById('btn-type-weekdayMWF').className = `px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap ${scheduleType === 'weekdayMWF' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`;
            document.getElementById('btn-type-weekdayTTh').className = `px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap ${scheduleType === 'weekdayTTh' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`;
            document.getElementById('btn-type-weekend1').className = `px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap ${scheduleType === 'weekend1' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`;
            document.getElementById('btn-type-weekend2').className = `px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap ${scheduleType === 'weekend2' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`;
        }

        function renderChecklist() {

                subtitle = '<p class="text-[11px] font-bold text-teal-600 mb-3 bg-teal-50 inline-block px-2 py-1 rounded">☆ L5-L1リスニング解きなおし（順次）</p>';
            } else if (scheduleType === 'weekdayMWF') {
                tasks = weekdayTasksMWF;
                title = '平日プラン (月・水・金)';
                subtitle = '';
            } else {
                tasks = weekdayTasksTTh;
                title = '平日プラン (火・木)';
                subtitle = '';
            }
            
            const todayStr = getTodayLocalString();
            const key = `tocfl_tasks_${todayStr}_${scheduleType}`;
            let states = JSON.parse(localStorage.getItem(key) || '[]');

            let html = `
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 w-full mt-4">
                    <h3 class="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                        <i data-lucide="check-square" class="w-4 h-4 text-teal-600"></i> ${title}
                    </h3>
                    ${subtitle}
                    <div class="space-y-2">
            `;

            tasks.forEach((task, idx) => {
                const isChecked = !!states[idx];
                html += `
                    <label class="flex items-start gap-3 p-2.5 bg-white rounded-lg border border-gray-200 cursor-pointer hover:border-teal-400 transition-colors shadow-sm">
                        <div class="flex-shrink-0 mt-0.5">
                            <input type="checkbox" class="w-4 h-4 text-teal-600 rounded border-gray-300 focus:ring-teal-500" ${isChecked ? 'checked' : ''} onchange="toggleTask('${scheduleType}', ${idx})">
                        </div>
                        <span class="text-xs ${isChecked ? 'text-gray-400 line-through' : 'text-gray-700'} leading-relaxed font-medium">${task}</span>
                    </label>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function renderProgressBars(stats) {
            const goals = calculateTotalGoals();
            const renderBar = (idPrefix, expected, real, goal, diff) => {
                const planPct = Math.min((expected / goal) * 100, 100);
                const realPct = Math.min((real / goal) * 100, 100);
                const colorClass = diff >= 0 ? 'bg-teal-500' : 'bg-orange-400';
                const borderColorClass = diff >= 0 ? 'border-b-teal-500' : 'border-b-orange-400';
                const textColorClass = diff >= 0 ? 'text-teal-600' : 'text-orange-500';

                const html = `
                    <div>
                        <div class="flex justify-between text-xs mb-6 font-semibold text-gray-500">
                            <span class="flex items-center gap-1"><i data-lucide="trending-up" class="w-3.5 h-3.5 text-teal-600"></i> ${idPrefix === 'weekday' ? '平日 (Weekday)' : '週末 (Weekend)'}</span>
                            <span>Goal: ${goal}H</span>
                        </div>
                        <div class="px-6 relative">
                            <div class="relative h-6">
                                <div class="absolute flex flex-col items-center transform -translate-x-1/2" style="left: ${planPct}%">
                                    <span class="text-[10px] font-bold text-gray-500 whitespace-nowrap">Plan (${expected.toFixed(1)}H)</span>
                                    <div class="w-0 h-0 border-l-[6px] border-r-[6px] border-t-[6px] border-l-transparent border-r-transparent border-t-gray-400 mt-1"></div>
                                </div>
                            </div>
                            <div class="h-4 bg-gray-100 rounded-full relative w-full border border-gray-200">
                                <div class="absolute top-0 left-0 h-full bg-gray-200 rounded-full" style="width: ${planPct}%"></div>
                                <div class="absolute top-0 left-0 h-full rounded-full transition-all duration-500 ${colorClass}" style="width: ${realPct}%"></div>
                            </div>
                            <div class="relative h-8 mt-1">
                                <div class="absolute flex flex-col items-center transform -translate-x-1/2" style="left: ${realPct}%">
                                    <div class="w-0 h-0 border-l-[6px] border-r-[6px] border-b-[6px] border-l-transparent border-r-transparent mb-1 ${borderColorClass}"></div>
                                    <span class="text-[10px] font-bold whitespace-nowrap ${textColorClass}">Real (${real.toFixed(1)}H)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById(`${idPrefix}-bar-container`).innerHTML = html;
            };

            renderBar('weekday', stats.expectedWeekdayHours, stats.totalWeekdayRecorded, goals.totalWeekday, stats.weekdayDiff);
            renderBar('weekend', stats.expectedWeekendHours, stats.totalWeekendRecorded, goals.totalWeekend, stats.weekendDiff);
        }

        function renderOverallGauge(stats) {
            const baseHours = 180;
            const grandTotal = baseHours + stats.totalRecorded;
            const targetHours = 720;
            const percentage = Math.min((grandTotal / targetHours) * 100, 100);

            // 各レベルの開始ライン (中国語圏外の目安)
            const prepEndPct = (240 / targetHours) * 100; 
            const a1EndPct = (480 / targetHours) * 100; 

            const container = document.getElementById('overall-gauge-container');
            if (!container) return;

            container.innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i data-lucide="award" class="w-5 h-5 text-pink-500"></i> TOCFL レベル到達度 (非中国語圏外)
                    </h2>
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-[11px] text-gray-500 mb-1">これまでの学習 (<span class="font-semibold">180H</span>) + アプリ記録 (<span class="font-semibold">${stats.totalRecorded.toFixed(1)}H</span>)</p>
                            <p class="text-3xl font-black text-teal-700 leading-none">${grandTotal.toFixed(1)} <span class="text-sm font-bold text-gray-400">/ 720 H</span></p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold bg-pink-50 text-pink-600 px-2 py-1 rounded-full border border-pink-100">Target: Band A [A2]</span>
                        </div>
                    </div>
                    
                    <div class="relative pt-8 pb-2">
                        <!-- Marker Labels (改行して重なりを防止) -->
                        <div class="absolute top-0 w-full text-[9px] sm:text-[10px] font-bold text-gray-400">
                            <div class="absolute text-center -translate-x-1/2 leading-tight" style="left: ${prepEndPct}%;">準備級<br>(240h)</div>
                            <div class="absolute text-center -translate-x-1/2 leading-tight" style="left: ${a1EndPct}%;">入門級[A1]<br>(480h)</div>
                            <div class="absolute right-0 text-right text-pink-500 leading-tight">基礎級[A2]<br>Goal (720h)</div>
                        </div>
                        
                        <!-- Marker Lines -->
                        <div class="absolute top-6 w-full h-8 pointer-events-none z-10">
                            <div class="absolute h-full w-px bg-gray-300" style="left: ${prepEndPct}%;"></div>
                            <div class="absolute h-full w-px bg-gray-300" style="left: ${a1EndPct}%;"></div>
                            <div class="absolute h-full w-px bg-pink-300" style="right: 0;"></div>
                        </div>
                        
                        <!-- Progress Bar -->
                        <div class="h-5 mt-5 bg-gray-100 rounded-full w-full relative overflow-hidden border border-gray-200 shadow-inner">
                            <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-teal-400 to-emerald-400 rounded-full transition-all duration-1000 ease-out flex items-center justify-end px-2" style="width: ${percentage}%">
                                ${percentage > 10 ? `<span class="text-[10px] text-white font-bold opacity-90">${percentage.toFixed(1)}%</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCalendar() {
            const calendarContainer = document.getElementById('calendar-grid');
            let html = '';
            
            let d = new Date(2026, 4, 18);
            const endDate = new Date(2026, 5, 28);
            const emptySlots = d.getDay();
            
            for (let i = 0; i < emptySlots; i++) {
                html += `<div class="aspect-square"></div>`;
            }

            while (d <= endDate) {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                
                const record = records.find(r => r.date === dateStr);
                const isTarget = dateStr === '2026-06-28';
                const isMC = dateStr === '2026-06-24' || dateStr === '2026-06-05';
                const isRest = dateStr === '2026-06-27';
                const isSelected = dateStr === newDate;
                
                let btnClass = `aspect-square rounded-lg flex flex-col items-center justify-center relative border transition-all p-1 `;
                btnClass += isSelected ? 'ring-2 ring-teal-500 border-transparent z-10 ' : 'border-gray-100 ';
                
                // --- 優先度を考慮したスタイル適用 ---
                // 学習記録があるかどうかのフラグ
                const hasRecord = !!record;
                // 何かしらの特別な日（MC, 休息, 試験）であるかどうかのフラグ
                const isSpecialDay = isTarget || isRest || isMC;

                if (hasRecord && !isSpecialDay) {
                    // 通常の学習記録がある日（緑背景、白文字）
                    btnClass += 'bg-teal-500 text-white border-teal-600 shadow-sm';
                } else if (isTarget) {
                    btnClass += 'bg-red-50 border-red-200 text-red-600';
                } else if (isRest) {
                    btnClass += 'bg-green-50 border-green-200 text-green-700';
                } else if (isMC) {
                    btnClass += 'bg-blue-50 border-blue-200 text-blue-700';
                } else {
                    // 記録がない通常の日
                    btnClass += 'bg-gray-50 text-gray-500 hover:bg-gray-100';
                }

                // --- ラベルの作成 ---
                let extraLabel = '';
                if (isTarget) extraLabel = `<span class="text-[9px] font-bold mt-0.5 text-red-600">試験</span>`;
                else if (isRest) extraLabel = `<span class="text-[9px] font-bold mt-0.5 text-green-600">休息</span>`;
                else if (isMC) extraLabel = `<span class="text-[9px] font-bold mt-0.5 text-blue-600">MC</span>`;

                // --- テキストカラーの決定 ---
                // 特別な日（MC, 休息, 試験）の場合は、背景色に関わらず常に視認性の高い色（各テーマカラーか黒/濃いグレー）にする
                let textClassDate = 'text-xs font-semibold ';
                let textClassHours = 'text-[9px] mt-0.5 font-bold opacity-90 ';
                
                if (hasRecord && !isSpecialDay) {
                    // 通常記録日
                    textClassDate += 'text-white';
                    textClassHours += 'text-white';
                } else if (isSpecialDay) {
                    // 特別な日は黒色（ここでは tailwind の text-gray-800 を使用して統一感を出します）を強制
                     textClassDate += 'text-gray-800';
                     textClassHours += 'text-gray-800';
                }

                html += `
                    <button type="button" onclick="selectDate('${dateStr}')" class="${btnClass}">
                        <span class="${textClassDate}">${d.getDate()}</span>
                        ${record ? `<span class="${textClassHours}">${record.hours}h</span>` : ''}
                        ${extraLabel}
                    </button>
                `;
                d.setDate(d.getDate() + 1);
            }
            calendarContainer.innerHTML = html;
        }

        function renderRecordList() {
            const list = document.getElementById('record-list');
            if (records.length === 0) {
                list.innerHTML = `<li class="p-4 text-center text-sm text-gray-400">まだ記録がありません</li>`;
                return;
            }

            let html = '';
            records.forEach(record => {
                html += `
                    <li class="flex justify-between items-center p-4 hover:bg-gray-50 transition border-b border-gray-100 last:border-0">
                        <div class="flex items-center gap-3">
                            <div class="bg-teal-100 text-teal-700 rounded-md p-2">
                                <i data-lucide="check-square" class="w-4 h-4"></i>
                            </div>
                            <span class="font-medium text-gray-700">${record.date}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-gray-800">${parseFloat(record.hours).toFixed(1)} <span class="text-xs text-gray-500 font-normal">H</span></span>
                            <button onclick="handleDeleteRecord(${record.id})" class="text-xs text-red-400 hover:text-red-600">削除</button>
                        </div>
                    </li>
                `;
            });
            list.innerHTML = html;
            lucide.createIcons();
        }

        function renderStatsArea(stats) {
            document.getElementById('stat-expected').textContent = `${stats.expectedHours.toFixed(1)} H`;
            document.getElementById('stat-total').textContent = `${stats.totalRecorded.toFixed(1)} H`;
            
            const diffArea = document.getElementById('stat-diff-area');
            const diffValue = document.getElementById('stat-diff-value');
            const diffLabel = document.getElementById('stat-diff-label');
            const diffIcon = document.getElementById('stat-diff-icon');

            if (stats.diff >= 0) {
                diffArea.className = 'p-4 rounded-xl flex items-center justify-between border bg-green-50 border-green-200';
                diffValue.className = 'text-2xl font-black text-green-600';
                diffLabel.className = 'text-sm font-bold text-green-700';
                diffLabel.textContent = 'Advance (貯金)';
                diffIcon.innerHTML = `<div class="p-2 bg-green-100 text-green-600 rounded-full"><i data-lucide="trending-up" class="w-5 h-5"></i></div>`;
            } else {
                diffArea.className = 'p-4 rounded-xl flex items-center justify-between border bg-orange-50 border-orange-200';
                diffValue.className = 'text-2xl font-black text-orange-600';
                diffLabel.className = 'text-sm font-bold text-orange-700';
                diffLabel.textContent = 'Shortage (不足)';
                diffIcon.innerHTML = `<div class="p-2 bg-orange-100 text-orange-600 rounded-full"><i data-lucide="trending-down" class="w-5 h-5"></i></div>`;
            }
            diffValue.innerHTML = `${Math.abs(stats.diff).toFixed(1)} <span class="text-sm font-normal">H</span>`;
            lucide.createIcons();
        }

        window.renderApp = () => {
            const stats = calculateStats();
            const goals = calculateTotalGoals();
            document.getElementById('days-left').textContent = calculateDaysLeft();
            
            document.getElementById('goal-weekday').textContent = goals.totalWeekday;
            document.getElementById('goal-weekend').textContent = goals.totalWeekend;
            document.getElementById('goal-total').textContent = goals.total;
            
            renderTabs();
            renderPieChart();
            renderChecklist();
            renderProgressBars(stats);
            renderCalendar();
            renderRecordList();
            renderStatsArea(stats);
            renderOverallGauge(stats);
            
            document.getElementById('input-date').value = newDate;
            document.getElementById('input-hours').value = newHours;
            
            lucide.createIcons();
        };

        // --- Event Handlers ---
        window.switchTab = (tab) => {
            activeTab = tab;
            renderApp();
        };

        window.setScheduleType = (type) => {
            scheduleType = type;
            renderApp();
        };

        window.toggleTask = (type, index) => {
            const todayStr = getTodayLocalString();
            const key = `tocfl_tasks_${todayStr}_${type}`;
            let states = JSON.parse(localStorage.getItem(key) || '[]');
            states[index] = !states[index];
            localStorage.setItem(key, JSON.stringify(states));
            renderApp();
        };

        window.selectDate = (dateStr) => {
            newDate = dateStr;
            renderApp();
        };

        window.handleAddRecord = (e) => {
            e.preventDefault();
            const dateInput = document.getElementById('input-date').value;
            const hoursInput = document.getElementById('input-hours').value;
            
            if (!dateInput || !hoursInput) return;
            
            const newRecord = {
                id: parseInt(dateInput.replace(/-/g, '')), // 日付(YYYYMMDD)をIDとして使用
                date: dateInput,
                hours: parseFloat(hoursInput)
            };

            const existingIndex = records.findIndex(r => r.date === dateInput);
            if (existingIndex >= 0) {
                newRecord.id = records[existingIndex].id; // 既存IDを保持
                newRecord.hours += records[existingIndex].hours;
            }

            // Update local state optimistic UI
            if (existingIndex >= 0) {
                 records[existingIndex] = newRecord;
            } else {
                 records.push(newRecord);
                 records.sort((a, b) => new Date(b.date) - new Date(a.date));
            }

            newHours = '';
            document.getElementById('input-hours').value = '';
            renderApp();
            
            // Save to Cloud
            if(userId) saveRecordToCloud(newRecord);
        };

        window.handleDeleteRecord = (id) => {
            records = records.filter(r => r.id !== id);
            renderApp();
            // Delete from cloud
            if(userId) deleteRecordFromCloud(id);
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase(); // Starts the app and handles auth
        });
        
    </script>
</head>
<body class="min-h-screen bg-gray-50 font-sans text-gray-800 pb-20">

    <header class="bg-teal-600 text-white p-4 shadow-md rounded-b-xl">
        <h1 class="text-xl font-bold flex items-center justify-center gap-2">
            <i data-lucide="book-open"></i>
            TOCFL 学習トラッカー
        </h1>
    </header>

    <div class="flex justify-center mt-4 mx-4 bg-white rounded-lg shadow-sm p-1">
        <button id="btn-plan" onclick="switchTab('plan')" class="flex-1 py-2 text-sm font-medium rounded-md flex items-center justify-center gap-2 transition-colors">
            <i data-lucide="calendar" class="w-4 h-4"></i> Plan (計画)
        </button>
        <button id="btn-record" onclick="switchTab('record')" class="flex-1 py-2 text-sm font-medium rounded-md flex items-center justify-center gap-2 transition-colors">
            <i data-lucide="check-square" class="w-4 h-4"></i> Record (記録)
        </button>
    </div>

    <main class="p-4 max-w-md mx-auto">
        <div id="view-plan" class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-teal-500"></div>
                <p class="text-sm text-gray-500 mb-1 font-medium">次回 TOCFL (6/28) まで</p>
                <div class="flex items-end justify-center gap-1">
                    <span class="text-gray-400 text-lg mb-1">あと</span>
                    <span id="days-left" class="text-5xl font-extrabold text-teal-600">--</span>
                    <span class="text-gray-400 text-lg mb-1">日</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-teal-50 p-4 border-b border-teal-100 flex justify-between text-center">
                    <div class="flex-1">
                        <p class="text-xs text-teal-600 font-semibold">平日 (Weekday)</p>
                        <p class="text-lg font-bold text-teal-800"><span id="goal-weekday">--</span><span class="text-sm font-normal">H</span></p>
                    </div>
                    <div class="w-px bg-teal-200"></div>
                    <div class="flex-1">
                        <p class="text-xs text-teal-600 font-semibold">週末 (Weekend)</p>
                        <p class="text-lg font-bold text-teal-800"><span id="goal-weekend">--</span><span class="text-sm font-normal">H</span></p>
                    </div>
                    <div class="w-px bg-teal-200"></div>
                    <div class="flex-1">
                        <p class="text-xs text-teal-600 font-semibold">合計 (Total)</p>
                        <p class="text-lg font-bold text-teal-800"><span id="goal-total">--</span><span class="text-sm font-normal">H</span></p>
                    </div>
                </div>
                
                <div class="p-5 pt-6 space-y-6">
                    <div id="weekday-bar-container"></div>
                    <div class="border-b border-gray-100"></div>
                    <div id="weekend-bar-container"></div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-md font-bold flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-teal-600"></i>
                        学習時間割
                    </h2>
                    <div class="flex bg-gray-100 rounded-lg p-1 overflow-x-auto">
                        <button id="btn-type-weekdayMWF" onclick="setScheduleType('weekdayMWF')" class="px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap">月水金</button>
                        <button id="btn-type-weekdayTTh" onclick="setScheduleType('weekdayTTh')" class="px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap">火木</button>
                        <button id="btn-type-weekend1" onclick="setScheduleType('weekend1')" class="px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap">週末(前)</button>
                        <button id="btn-type-weekend2" onclick="setScheduleType('weekend2')" class="px-3 py-1 text-xs font-medium rounded-md whitespace-nowrap">週末(後)</button>
                    </div>
                </div>
                
                <div class="flex flex-col items-center">
                    <div class="flex flex-row justify-center items-center gap-4 mb-4">
                        <div class="relative w-40 h-40">
                            <svg id="pie-chart-day-svg" width="160" height="160"></svg>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <span class="absolute top-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">12:00</span>
                                <span class="absolute bottom-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">6:00</span>
                                <span class="absolute right-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">15:00</span>
                                <span class="absolute left-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">9:00</span>
                                <div class="w-8 h-8 bg-white rounded-full shadow-sm flex items-center justify-center z-10">
                                    <i data-lucide="sun" class="w-4 h-4 text-orange-400"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="relative w-40 h-40">
                            <svg id="pie-chart-night-svg" width="160" height="160"></svg>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <span class="absolute top-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">0:00</span>
                                <span class="absolute bottom-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">18:00</span>
                                <span class="absolute right-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">3:00</span>
                                <span class="absolute left-0 text-[10px] text-gray-500 font-medium bg-white/70 px-1 rounded">21:00</span>
                                <div class="w-8 h-8 bg-white rounded-full shadow-sm flex items-center justify-center z-10">
                                    <i data-lucide="moon" class="w-4 h-4 text-blue-500"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="pie-chart-legend" class="mt-2 flex flex-wrap justify-center gap-2 max-w-xs"></div>
                </div>
                
                <div id="plan-checklist-container" class="flex justify-center text-left"></div>
            </div>
        </div>

        <div id="view-record" class="space-y-6" style="display: none;">
            
            <!-- Overall TOCFL Level Gauge Container -->
            <div id="overall-gauge-container"></div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-600 mb-3 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> ペースチェック (as of today)
                </h2>
                
                <div class="flex items-center justify-between mb-4 bg-gray-50 p-3 rounded-lg">
                    <div>
                        <p class="text-xs text-gray-500">今日までの目標</p>
                        <p id="stat-expected" class="text-lg font-bold text-gray-700">-- H</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500">現在の累計</p>
                        <p id="stat-total" class="text-lg font-bold text-teal-600">-- H</p>
                    </div>
                </div>

                <div id="stat-diff-area" class="p-4 rounded-xl flex items-center justify-between border">
                    <div class="flex items-center gap-3">
                        <div id="stat-diff-icon"></div>
                        <div>
                            <p id="stat-diff-label" class="text-sm font-bold"></p>
                        </div>
                    </div>
                    <div id="stat-diff-value"></div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-600 mb-4 flex items-center gap-2">
                    <i data-lucide="calendar" class="w-4 h-4 text-teal-600"></i> 学習カレンダー (5/18 - 6/28)
                </h2>
                <div class="grid grid-cols-7 gap-1 mb-2 text-center">
                    <div class="text-[10px] font-bold text-gray-400">日</div>
                    <div class="text-[10px] font-bold text-gray-400">月</div>
                    <div class="text-[10px] font-bold text-gray-400">火</div>
                    <div class="text-[10px] font-bold text-gray-400">水</div>
                    <div class="text-[10px] font-bold text-gray-400">木</div>
                    <div class="text-[10px] font-bold text-gray-400">金</div>
                    <div class="text-[10px] font-bold text-gray-400">土</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>

            <form onsubmit="handleAddRecord(event)" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-600 mb-3">学習時間を入力</h2>
                <div class="flex gap-2">
                    <input type="date" id="input-date" required class="flex-1 bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block p-2.5">
                    <div class="relative flex-1">
                        <input type="number" step="0.1" min="0" id="input-hours" placeholder="時間 (H)" required class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block p-2.5 pr-8">
                        <span class="absolute right-3 top-2.5 text-gray-400 text-sm">H</span>
                    </div>
                    <button type="submit" class="bg-teal-600 text-white rounded-lg px-4 py-2 hover:bg-teal-700 transition flex items-center justify-center shadow-sm">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider">履歴</h3>
                </div>
                <ul id="record-list" class="divide-y divide-gray-100"></ul>
            </div>
        </div>
    </main>
</body>
</html>
