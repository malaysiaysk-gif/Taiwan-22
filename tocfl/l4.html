<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOCFL リスニング対策 - テンプレート</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Pinyin Pro (自動ピンイン付与ライブラリ) -->
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        
        /* 隠す（ぼかし）設定 */
        .content-hidden .secret-target {
            filter: blur(8px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
        }
        
        /* 表示時（ぼかし解除）の設定 */
        body.global-reveal .content-hidden .secret-target,
        .question-container:not(.content-hidden) .secret-target {
            filter: blur(0px);
            opacity: 1;
            pointer-events: auto;
            user-select: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-6 text-center">
        <h1 class="text-3xl font-bold text-indigo-700 mb-2">TOCFL リスニング対策アプリ</h1>
        <p class="text-slate-600">一覧学習・ランダムテスト・フラッシュカード</p>
        <p class="text-sm text-slate-500 mt-2">入門基礎級模擬試題聽力測驗</p>
    </header>

    <!-- タブナビゲーション -->
    <div class="max-w-4xl mx-auto mb-6 flex flex-wrap justify-center gap-3">
        <button onclick="switchTab('list')" id="tab-list" class="px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors">一覧学習</button>
        <button onclick="switchTab('flashcard')" id="tab-flashcard" class="px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors">フラッシュカード</button>
    </div>

    <!-- 1. 一覧学習ビュー -->
    <div id="list-view" class="max-w-4xl mx-auto">
        <div class="mb-6 flex justify-end">
            <button onclick="toggleGlobalReveal()" id="global-reveal-btn" class="flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg shadow-sm hover:bg-slate-50 transition-colors font-medium text-sm">
                <i data-lucide="eye" class="w-4 h-4"></i>
                <span>すべての解答・スクリプトを表示</span>
            </button>
        </div>
        <main id="list-content" class="space-y-8">
            <!-- JSでここにコンテンツが生成されます -->
        </main>
    </div>

    <!-- 3. フラッシュカードビュー -->
    <div id="flashcard-view" class="hidden max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-10 flex flex-col items-center">
            <div class="flex gap-2 mb-8 bg-slate-100 p-1 rounded-lg">
                <button onclick="setFlashcardMode('vocab')" id="fc-mode-vocab" class="px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all">重要単語</button>
                <button onclick="setFlashcardMode('sentence')" id="fc-mode-sentence" class="px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">センテンス</button>
            </div>

            <div id="flashcard-container" class="w-full cursor-pointer" onclick="handleCardClick()">
                <!-- JSでカードを描画 -->
            </div>

            <div class="mt-8 flex justify-between items-center w-full">
                <button onclick="prevCard()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="前のカード"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                <div class="flex items-center gap-4">
                    <button onclick="reshuffleCards()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50" title="シャッフル"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                    <span id="fc-counter" class="text-slate-500 font-mono font-medium"></span>
                </div>
                <button onclick="nextCard()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="次のカード"><i data-lucide="chevron-right" class="w-8 h-8"></i></button>
            </div>
        </div>
    </div>

        // ==========================================
        // 共通・状態管理
        // ==========================================
        let playingId = null;
        let playingType = null;
        let isGlobalReveal = false;

        // タブ切り替え
        function switchTab(tabId) {
            window.speechSynthesis.cancel();
            resetActiveUI();

            const views = ['list', 'flashcard'];
            views.forEach(v => {
                document.getElementById(`${v}-view`).classList.add('hidden');
                document.getElementById(`tab-${v}`).className = "px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors";
            });

            document.getElementById(`${tabId}-view`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors";

            if (tabId === 'flashcard') {
                setFlashcardMode(fcMode); // タブを開くたびに毎回シャッフルして初期化
            }
        }

        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;
            } else {
                document.body.classList.remove('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i><span>すべての解答・スクリプトを表示</span>`;
            }
            lucide.createIcons({root: document.getElementById('global-reveal-btn')});
        }

        // ==========================================
        // 音声再生ロジック
        // ==========================================
        function resetActiveUI() {
            if (!playingId) return;
            const btn = document.getElementById(playingId);
            if (!btn) return;

            if (playingType === 'vocab') {
                const icon = btn.querySelector('.lucide-volume-2');
                if (icon) {
                    icon.classList.remove('animate-pulse', 'text-blue-600');
                    icon.classList.add('text-blue-400');
                }
            } else if (playingType === 'single') {
                btn.classList.remove('text-indigo-600', 'bg-indigo-100', 'text-emerald-600', 'bg-emerald-100');
                btn.classList.add('text-slate-400');
                const icon = btn.querySelector('.lucide-play');
                if (icon) icon.setAttribute('fill', 'none');
            } else if (playingType === 'conversation') {
                btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                lucide.createIcons({root: btn});
            }
        }

        function playConversation(qId, btnId, callback = null) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。");
                return;
            }
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            const utterances = [];
            for(let i=0; i<2; i++) {
                q.script.forEach((line, index) => {
                    let delay = 600;
                    if (index === q.script.length - 2) delay = 1200; // 問の前のポーズ
                    if (i === 0 && index === q.script.length - 1) delay = 2000; // 1回目終了後のポーズ
                    utterances.push({ text: line.text, delayAfter: delay });
                });
            }

            let currentIndex = 0;
            function speakNext() {
                if (playingId !== btnId) return; 
                
                if (currentIndex >= utterances.length) {
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    if (callback) callback(); // 終了時のコールバック
                    return;
                }

                const currentItem = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(currentItem.text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.85;

                utterance.onend = () => {
                    const delay = currentItem.delayAfter;
                    currentIndex++;
                    setTimeout(() => { if (playingId === btnId) speakNext(); }, delay);
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }

        function speakText(text, btnId, isVocab, speakerType) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;  

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (!btn) return;
                if (isVocab) {
                    const icon = btn.querySelector('.lucide-volume-2');
                    if (icon) {
                        icon.classList.remove('text-blue-400');
                        icon.classList.add('animate-pulse', 'text-blue-600');
                    }
                } else {
                    btn.classList.remove('text-slate-400');
                    if (speakerType === '問') btn.classList.add('text-emerald-600', 'bg-emerald-100');
                    else btn.classList.add('text-indigo-600', 'bg-indigo-100');
                    const icon = btn.querySelector('.lucide-play');
                    if (icon) icon.setAttribute('fill', 'currentColor');
                }
            };

            utterance.onend = () => { resetActiveUI(); playingId = null; playingType = null; };
            utterance.onerror = () => { resetActiveUI(); playingId = null; playingType = null; };

            window.speechSynthesis.speak(utterance);
        }

        function getRubyText(text) {
            if (typeof pinyinPro === 'undefined') return text;
            try {
                const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
                const charArr = Array.from(text);
                let html = '';
                for (let i = 0; i < charArr.length; i++) {
                    const char = charArr[i];
                    const py = pinyinArr[i];
                    if (/[\u4e00-\u9fa5]/.test(char) && py !== char) {
                        html += `<ruby style="ruby-position: under;" class="mx-[1px]">${char}<rt class="text-[0.7rem] text-slate-400 font-sans tracking-tighter">${py}</rt></ruby>`;
                    } else {
                        html += `<span class="mx-[1px]">${char}</span>`;
                    }
                }
                return html;
            } catch (e) {
                return text;
            }
        }

        // HTMLジェネレーター（共通コンポーネント化）
        function generateScriptHtml(script, qId, prefix = "list") {
            return script.map((line, idx) => {
                const btnId = `btn-${prefix}-line-${qId}-${idx}`;
                let speakerBg = line.speaker === '男' ? 'bg-blue-100 text-blue-700' : 
                                line.speaker === '女' ? 'bg-pink-100 text-pink-700' : 
                                line.speaker === '問' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700';
                return `
                    <div class="flex flex-col sm:flex-row sm:items-start gap-2 bg-slate-50 p-3 rounded-lg">
                        <div class="flex items-center gap-2 sm:w-1/6">
                            <span class="font-bold px-2 py-1 rounded text-sm ${speakerBg}">${line.speaker}</span>
                            <button id="${btnId}" onclick="speakText('${line.text.replace(/'/g, "\\'")}', '${btnId}', false, '${line.speaker}')" class="p-1.5 rounded-full hover:bg-slate-200 transition-colors text-slate-400">
                                <i data-lucide="play" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="sm:w-5/6">
                            <p class="text-xl font-medium text-slate-800 mb-4 leading-relaxed">${getRubyText(line.text)}</p>
                            <p class="text-slate-600 text-sm">${line.jp}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateVocabHtml(vocab, qId, prefix = "list") {
            if (!vocab || vocab.length === 0) return '';
            return vocab.map((v, idx) => {
                const btnId = `btn-${prefix}-vocab-${qId}-${idx}`;
                return `
                    <div class="flex items-center gap-3 border border-slate-100 bg-white p-2.5 rounded-lg hover:border-indigo-200 transition-colors shadow-sm">
                        <button id="${btnId}" onclick="speakText('${v.speak.replace(/'/g, "\\'")}', '${btnId}', true)" class="flex-shrink-0 flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-md font-mono text-sm transition-colors group">
                            <i data-lucide="volume-2" class="w-4 h-4 text-blue-400 group-hover:text-blue-600"></i>
                            ${v.pinyin}
                        </button>
                        <div class="flex flex-col justify-center">
                            <span class="font-bold text-slate-800">${v.word}</span>
                            <span class="text-xs text-slate-500">${v.jp}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateChoicesHtml(choices, qId, ans, isSecret = false, prefix = "list") {
            if (!choices || choices.length === 0) return '';
            return choices.map((choice, cIdx) => {
                const optionLetter = (choice.match(/[A-D]/) || [])[0] || '';
                const isCorrect = optionLetter === ans;
                const btnId = `btn-${prefix}-choice-${qId}-${optionLetter || cIdx}`;
                const speakTextStr = choice.replace(/^[（(][A-D][）)]\s*/, '').replace(/'/g, "\\'");
                const secretClass = isSecret ? 'secret-target' : '';
                const ansHtml = isCorrect ? `<span class="${secretClass} flex-shrink-0 ml-2 text-emerald-600 font-bold text-xs bg-emerald-100 px-2 py-1 rounded">正解</span>` : '';
                
                return `
                    <div class="p-3 rounded-lg border border-slate-200 bg-white flex justify-between items-center shadow-sm gap-2">
                        <div class="flex items-start gap-2">
                            <button id="${btnId}" onclick="speakText('${speakTextStr}', '${btnId}', false)" class="${secretClass} flex-shrink-0 p-1 rounded-full hover:bg-slate-100 transition-colors text-slate-400 mt-0.5">
                                <i data-lucide="play" class="w-4 h-4"></i>
                            </button>
                            <span class="text-slate-800 leading-relaxed">${getRubyText(choice)}</span>
                        </div>
                        ${ansHtml}
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // 1. 一覧学習の描画
        // ==========================================
        function renderListView() {
            const container = document.getElementById('list-content');
            let html = '';

            questionsData.forEach(q => {
                if (q.sectionName) {
                    html += `
                        <div class="py-4 mt-8 mb-2 border-t-2 border-indigo-100 pt-8 first:mt-0 first:border-0 first:pt-0">
                            <h2 class="text-2xl font-bold text-indigo-800 flex items-center justify-center gap-2">
                                <i data-lucide="book-open" class="w-6 h-6"></i>
                                ${q.sectionName}
                            </h2>
                        </div>
                    `;
                }

                html += `
                    <article id="list-q-${q.id}" class="question-container content-hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-indigo-50 border-b border-indigo-100 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div class="flex items-center gap-4">
                                <h2 class="text-xl font-bold text-indigo-800 shrink-0">第 ${q.id} 題</h2>
                                <button onclick="playConversation(${q.id}, 'btn-list-conv-${q.id}', () => { document.getElementById('list-q-${q.id}').classList.remove('content-hidden'); })" id="btn-list-conv-${q.id}" class="flex items-center gap-1.5 bg-white border border-indigo-200 text-indigo-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-indigo-50 transition-colors">
                                    <i data-lucide="play-circle" class="w-5 h-5"></i>
                                    2回再生して表示
                                </button>
                            </div>
                            <div class="secret-target flex items-center gap-2 bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold transition-all duration-500 text-sm">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                <span>推測される正解: <br class="sm:hidden" />${q.ans}</span>
                            </div>
                        </div>

                        <div class="p-6 space-y-6">
                            ${q.choices && q.choices.length > 0 ? `<section><h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">選択肢</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${generateChoicesHtml(q.choices, q.id, q.ans, true, 'list')}</div></section>` : ''}
                            
                            <section class="secret-target transition-all duration-500 delay-100">
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">スクリプトと和訳</h3>
                                <div class="space-y-3">${generateScriptHtml(q.script, q.id, 'list')}</div>
                            </section>

                            ${q.vocab && q.vocab.length > 0 ? `<section class="secret-target transition-all duration-500 delay-200"><h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">重要単語</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-3">${generateVocabHtml(q.vocab, q.id, 'list')}</div></section>` : ''}

                            <section class="bg-amber-50 border border-amber-200 rounded-lg p-4 secret-target transition-all duration-500 delay-300">
                                <div class="flex items-center gap-2 text-amber-800 font-bold mb-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i><h4>メタ解法ポイント</h4>
                                </div>
                                <p class="text-amber-900 text-sm leading-relaxed">${q.meta}</p>
                            </section>
                        </div>
                    </article>
                `;
            });
            container.innerHTML = html;
        }

        // ==========================================
        // 3. フラッシュカードのロジック
        // ==========================================
        let allVocabs = [];
        let allSentences = [];
        let flashcards = [];
        let fcMode = 'vocab';
        let currentCardIndex = 0;
        let isCardFlipped = false;
        let isFcTextRevealed = false;

        function initFlashcardsData() {
            const vocabMap = new Map();
            questionsData.forEach(q => {
                if (q.vocab) {
                    q.vocab.forEach(v => {
                        if (!vocabMap.has(v.word) && (!v.jp || !v.jp.includes('不正解'))) {
                            vocabMap.set(v.word, v);
                        }
                    });
                }
                if (q.script) {
                    q.script.forEach(s => {
                        if (s.speaker !== '問' && s.text) allSentences.push(s);
                    });
                }
            });
            allVocabs = Array.from(vocabMap.values());
        }

        function setFlashcardMode(mode) {
            if (allVocabs.length === 0 && allSentences.length === 0) initFlashcardsData();
            fcMode = mode;
            if (mode === 'vocab') {
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = [...allVocabs].sort(() => Math.random() - 0.5);
            } else {
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = [...allSentences].sort(() => Math.random() - 0.5);
            }
            currentCardIndex = 0;
            isCardFlipped = false;
            isFcTextRevealed = false;
            renderFlashcard();
        }

        function handleCardClick() {
            if (!isCardFlipped && !isFcTextRevealed) revealFcText();
            else flipCard();
        }

        function revealFcText(e) {
            if (e) e.stopPropagation();
            isFcTextRevealed = true;
            renderFlashcard();
        }

        function flipCard() {
            isCardFlipped = !isCardFlipped;
            renderFlashcard();
        }

        function nextCard() {
            window.speechSynthesis.cancel();
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                isCardFlipped = false;
                isFcTextRevealed = false;
                renderFlashcard();
            }
        }

        function prevCard() {
            window.speechSynthesis.cancel();
            if (currentCardIndex > 0) {
                currentCardIndex--;
                isCardFlipped = false;
                isFcTextRevealed = false;
                renderFlashcard();
            }
        }

        function reshuffleCards() {
            window.speechSynthesis.cancel();
            flashcards = [...flashcards].sort(() => Math.random() - 0.5);
            currentCardIndex = 0;
            isCardFlipped = false;
            isFcTextRevealed = false;
            renderFlashcard();
        }

        function renderFlashcard() {
            const container = document.getElementById('flashcard-container');
            if (flashcards.length === 0) {
                 container.innerHTML = '<div class="text-center p-8 text-slate-500">沒有資料。</div>';
                 return;
            }

            document.getElementById('fc-counter').innerText = `${currentCardIndex + 1} / ${flashcards.length}`;
            const card = flashcards[currentCardIndex];
            const blurClass = !isFcTextRevealed ? 'filter blur-md select-none opacity-40' : '';
            
            let frontHtml, backHtml;
            if (fcMode === 'vocab') {
                frontHtml = `<div class="text-center ${blurClass} transition-all"><div class="text-4xl font-bold text-slate-800 mb-4">${card.word}</div><div class="text-xl text-slate-500 font-mono">${card.pinyin}</div></div>`;
                backHtml = `<div class="text-center"><div class="text-2xl font-bold text-emerald-700">${card.jp || '無'}</div></div>`;
            } else {
                frontHtml = `<div class="text-center ${blurClass} transition-all"><div class="text-2xl font-medium text-slate-800 leading-relaxed">${getRubyText(card.text)}</div></div>`;
                backHtml = `<div class="text-center"><div class="text-xl font-bold text-emerald-700 leading-relaxed">${card.jp || '無'}</div></div>`;
            }

            const speakStr = (fcMode === 'vocab' ? card.speak : card.text).replace(/'/g, "\\'");
            const isVocab = fcMode === 'vocab';

            let overlayHtml = '';
            if (!isCardFlipped && !isFcTextRevealed) {
                overlayHtml = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/40 backdrop-blur-[1px] rounded-2xl">
                        <button id="fc-center-play-btn" onclick="event.stopPropagation(); speakText('${speakStr}', 'fc-center-play-btn', ${isVocab})" class="mb-4 bg-indigo-100 text-indigo-700 border border-indigo-300 font-bold py-3 px-8 rounded-full shadow-md hover:bg-indigo-200 transition-colors flex items-center gap-2">
                            <i data-lucide="volume-2" class="w-6 h-6"></i> 音声を聴く
                        </button>
                        <button onclick="event.stopPropagation(); revealFcText(event)" class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                            <i data-lucide="eye" class="w-4 h-4"></i> 文字を表示 (Space)
                        </button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="relative w-full min-h-[300px] bg-slate-50 rounded-2xl border-2 border-slate-200 p-8 flex flex-col justify-center items-center hover:border-indigo-200 transition-all shadow-sm group">
                    ${overlayHtml}
                    <button id="fc-play-top" onclick="event.stopPropagation(); speakText('${speakStr}', 'fc-play-top', ${isVocab})" class="absolute top-4 right-4 p-3 rounded-full bg-white border border-slate-200 text-indigo-500 hover:bg-indigo-50 hover:text-indigo-600 shadow-sm transition-colors z-20">
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                    </button>
                    <div class="absolute top-4 left-4 px-3 py-1 rounded bg-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest z-20">${isCardFlipped ? 'Answer' : 'Question'}</div>
                    <div class="w-full mt-4">${isCardFlipped ? backHtml : frontHtml}</div>
                    <div class="absolute bottom-4 text-sm text-slate-400 opacity-50 group-hover:opacity-100 transition-opacity flex items-center gap-1 z-20">
                        <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i>
                        ${!isFcTextRevealed && !isCardFlipped ? 'クリック/Spaceで文字を表示' : isCardFlipped ? 'クリック/SpaceでQuestionに戻る' : 'クリック/Spaceで裏返す(日本語訳)'}
                    </div>
                </div>
            `;
            lucide.createIcons({root: container});
        }

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('flashcard-view').classList.contains('hidden')) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (!isCardFlipped && !isFcTextRevealed) revealFcText();
                    else flipCard();
                } else if (e.code === 'ArrowRight') nextCard();
                else if (e.code === 'ArrowLeft') prevCard();
            }
        });

        // ==========================================
        // 初期化
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderListView();
            lucide.createIcons();
        });
    </script>
</body>
</html>
