        // 状態管理
        let playingId = null;
        let playingType = null;
        let isGlobalReveal = false;

        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;
            } else {
                document.body.classList.remove('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i><span>すべての解答・スクリプトを表示</span>`;
            }
            lucide.createIcons({root: document.getElementById('global-reveal-btn')});
        }

        function revealQuestion(qId) {
            const el = document.getElementById(`question-${qId}`);
            if (el) {
                el.classList.remove('content-hidden');
            }
        }

        function resetActiveUI() {
            if (playingId) {
                const btn = document.getElementById(playingId);
                if (btn) {
                    if (btn.id === 'fc-center-play-btn') {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) icon.classList.remove('animate-pulse');
                    } else if (playingType === 'vocab') {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('animate-pulse', 'text-blue-600');
                            icon.classList.add('text-blue-400');
                        }
                    } else if (playingType === 'single') {
                        btn.classList.remove('text-indigo-600', 'bg-indigo-100', 'text-emerald-600', 'bg-emerald-100');
                        btn.classList.add('text-slate-400');
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) icon.setAttribute('fill', 'none');
                    } else if (playingType === 'conversation') {
                        btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                        btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                        lucide.createIcons({root: btn});
                    } else if (playingType === 'fc-conv') {
                        btn.classList.remove('animate-pulse', 'text-blue-600', 'bg-indigo-200');
                    }
                }
            }
        }

        function playConversation(qId, btnId) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声再生に対応していません。");
                return;
            }
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            const utterances = [];
            for(let i=0; i<2; i++) {
                q.script.forEach((line, index) => {
                    let delay = 600;
                    if (q.id >= 26 && index === q.script.length - 2) delay = 1200;
                    if (i === 0 && index === q.script.length - 1) delay = 2000;
                    utterances.push({ text: line.text, delayAfter: delay });
                });
            }

            let currentIndex = 0;
            function speakNext() {
                if (playingId !== btnId) return;
                if (currentIndex >= utterances.length) {
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    revealQuestion(qId);
                    return;
                }

                const currentItem = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(currentItem.text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.85;

                utterance.onend = () => {
                    const delay = currentItem.delayAfter;
                    currentIndex++;
                    setTimeout(() => { if (playingId === btnId) speakNext(); }, delay);
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }

        function speakText(text, btnId, isVocab, speakerType) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85;    

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (btnId === 'fc-center-play-btn') {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) icon.classList.add('animate-pulse');
                    } else if (isVocab) {
                        const icon = btn.querySelector('.lucide-volume-2');
                        if (icon) {
                            icon.classList.remove('text-blue-400');
                            icon.classList.add('animate-pulse', 'text-blue-600');
                        }
                    } else {
                        btn.classList.remove('text-slate-400');
                        if (speakerType === '問') {
                            btn.classList.add('text-emerald-600', 'bg-emerald-100');
                        } else {
                            btn.classList.add('text-indigo-600', 'bg-indigo-100');
                        }
                        const icon = btn.querySelector('.lucide-play');
                        if (icon) icon.setAttribute('fill', 'currentColor');
                    }
                }
            };

            utterance.onend = () => { resetActiveUI(); playingId = null; playingType = null; };
            utterance.onerror = () => { resetActiveUI(); playingId = null; playingType = null; };

            window.speechSynthesis.speak(utterance);
        }

        function playFlashcardConversation(cardIndex, btnId) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'fc-conv';

            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('animate-pulse', 'text-blue-600', 'bg-indigo-200');

            const card = flashcards[cardIndex];
            if (!card || !card.utterances) return;

            let currentIndex = 0;
            function speakNext() {
                if (playingId !== btnId) return;
                if (currentIndex >= card.utterances.length) {
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(card.utterances[currentIndex].text);
                utterance.lang = 'zh-TW'; 
                utterance.rate = 0.85;

                utterance.onend = () => {
                    currentIndex++;
                    setTimeout(() => { if (playingId === btnId) speakNext(); }, 600);
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }

        function getRubyText(text) {
            if (typeof pinyinPro === 'undefined') return text;
            try {
                const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
                const charArr = Array.from(text);
                let html = '';
                for (let i = 0; i < charArr.length; i++) {
                    const char = charArr[i];
                    const py = pinyinArr[i];
                    if (/[\u4e00-\u9fa5]/.test(char) && py !== char) {
                        html += `<ruby style="ruby-position: under;" class="mx-[1px]">${char}<rt class="text-[0.7rem] text-slate-400 font-sans tracking-tighter">${py}</rt></ruby>`;
                    } else {
                        html += `<span class="mx-[1px]">${char}</span>`;
                    }
                }
                return html;
            } catch (e) {
                return text;
            }
        }

                                <i data-lucide="check-circle" class="w-4 h-4"></i><span>正解: ${q.ans}</span>
                            </div>
                        </div>
                        <div class="p-6 space-y-6">
                            ${choicesHtml}
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">スクリプトと和訳</h3>
                                <div class="space-y-3">${scriptHtml}</div>
                            </section>
                            <section>
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">重要単語</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${vocabHtml}</div>
                            </section>
                            <section class="bg-amber-50 border border-amber-200 rounded-lg p-4 secret-target transition-all duration-500 delay-300">
                                <div class="flex items-center gap-2 text-amber-800 font-bold mb-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i><h4>メタ解法ポイント</h4>
                                </div>
                                <p class="text-amber-900 text-sm leading-relaxed">${q.meta}</p>
                            </section>
                        </div>
                    </article>`;
            });
            container.innerHTML = html;
        }

        // --- フラッシュカード機能 ---
        let allVocabs = [], allSentences = [], flashcards = [], fcMode = 'vocab';
        let currentCardIndex = 0, isCardFlipped = false, isFcTextRevealed = false, isAnswered = false, selectedOptionIndex = -1;
        let autoPlayTimeout = null;

        function switchTab(tabId) {
            window.speechSynthesis.cancel();
            resetActiveUI();
            if (tabId === 'listening') {
                document.getElementById('listening-view').classList.remove('hidden');
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('tab-listening').className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors";
                document.getElementById('tab-flashcard').className = "px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors";
            } else {
                document.getElementById('listening-view').classList.add('hidden');
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('tab-flashcard').className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors";
                document.getElementById('tab-listening').className = "px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors";
                initFlashcards();
            }
        }

        function initFlashcardsData() {
            const vocabMap = new Map();
            allSentences = [];
            questionsData.forEach(q => {
                if (q.vocab) q.vocab.forEach(v => { if (!vocabMap.has(v.word) && !v.jp.includes('不正解')) vocabMap.set(v.word, v); });
                if (q.script && q.script.length > 0) {
                    let combinedText = '', combinedJp = '', utterances = [];
                    q.script.forEach(s => {
                        if (s.speaker !== '問' && s.text) {
                            combinedText += `${s.speaker}: ${s.text}\n`;
                            combinedJp += `${s.speaker}: ${s.jp}\n`;
                            utterances.push({text: s.text, speaker: s.speaker});
                        }
                    });
                    if (combinedText.trim()) allSentences.push({ text: combinedText.trim(), jp: combinedJp.trim(), meta: q.meta, qId: q.id, utterances: utterances });
                }
            });
            allVocabs = Array.from(vocabMap.values());
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function setFlashcardMode(mode) {
            clearTimeout(autoPlayTimeout);
            fcMode = mode;
            if (mode === 'vocab') {
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = shuffle([...allVocabs]);
                flashcards.forEach(c => delete c.quizOptions);
            } else {
                document.getElementById('fc-mode-sentence').className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-vocab').className = "px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                flashcards = shuffle([...allSentences]);
            }
            currentCardIndex = 0; isCardFlipped = false; isFcTextRevealed = false; isAnswered = false; selectedOptionIndex = -1;
            renderFlashcard();
        }

        function initFlashcards() {
            if (allVocabs.length === 0) initFlashcardsData();
            setFlashcardMode(fcMode);
        }

        function handleCardClick() {
            if (!isCardFlipped && !isFcTextRevealed) revealFcText();
            else flipCard();
        }

        function revealFcText(e) {
            if (e) e.stopPropagation();
            isFcTextRevealed = true;
            renderFlashcard();
        }

        function renderFlashcard() {
            const container = document.getElementById('flashcard-container');
            const counter = document.getElementById('fc-counter');
            if (flashcards.length === 0) return;
            counter.innerText = `${currentCardIndex + 1} / ${flashcards.length}`;
            const card = flashcards[currentCardIndex];
            let frontHtml = '', backHtml = '', btnId = `fc-btn-${currentCardIndex}`;

            if (fcMode === 'vocab') {
                if (!card.quizOptions) {
                    const options = [card];
                    const others = allVocabs.filter(v => v.word !== card.word);
                    const shuffledOthers = shuffle([...others]);
                    options.push(shuffledOthers[0], shuffledOthers[1], shuffledOthers[2]);
                    card.quizOptions = shuffle(options);
                }
                let optionsHtml = '<div class="w-full flex flex-col gap-3 mt-6">';
                card.quizOptions.forEach((opt, idx) => {
                    let btnClass = "w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-400 bg-white shadow-sm transition-all text-slate-700 font-medium flex items-center justify-between";
                    let iconHtml = '';
                    if (isAnswered) {
                        if (opt.word === card.word) {
                            btnClass = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-800 font-bold flex items-center justify-between shadow-md";
                            iconHtml = '<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 ml-auto"></i>';
                        } else if (idx === selectedOptionIndex) {
                            btnClass = "w-full text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-800 font-medium flex items-center justify-between";
                            iconHtml = '<i data-lucide="x-circle" class="w-6 h-6 text-rose-500 ml-auto"></i>';
                        } else {
                            btnClass = "w-full text-left p-4 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-400 opacity-60 flex items-center justify-between";
                        }
                    }
                    optionsHtml += `
                        <button onclick="handleQuizAnswer(${idx})" class="${btnClass}" ${isAnswered ? 'disabled' : ''}>
                            <div class="flex items-center gap-3">
                                <span class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 text-slate-500 text-xs font-bold border border-slate-300 shadow-sm">${idx + 1}</span>
                                <span>${opt.jp}</span>
                            </div>
                            ${iconHtml}
                        </button>`;
                });
                optionsHtml += '</div>';

                let resultHtml = '';
                if (isAnswered) {
                    const isCorrect = card.quizOptions[selectedOptionIndex].word === card.word;
                    resultHtml = `
                        <div class="mt-8 p-6 bg-indigo-50 border border-indigo-100 rounded-xl text-center w-full animate-fade-in relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1 ${isCorrect ? 'bg-emerald-400' : 'bg-rose-400'}"></div>
                            <div class="text-sm font-bold ${isCorrect ? 'text-emerald-600' : 'text-rose-600'} mb-2 uppercase tracking-widest">${isCorrect ? '正解！' : '残念...'}</div>
                            <div class="text-4xl font-bold text-slate-800 mb-3">${card.word}</div>
                            <div class="text-xl text-slate-500 font-mono mb-3">${card.pinyin}</div>
                            <div class="text-lg text-indigo-700 font-bold">${card.jp}</div>
                        </div>`;
                }

                const speakCall = `speakText('${card.speak.replace(/'/g, "\\'")}', 'fc-center-play-btn', true)`;
                let playBtnClass = isAnswered 
                    ? "absolute top-4 right-4 p-3 rounded-full bg-white border border-slate-200 text-indigo-500 hover:bg-indigo-50 hover:text-indigo-600 shadow-sm transition-colors z-20" 
                    : "bg-indigo-100 text-indigo-700 border border-indigo-300 font-bold py-4 px-10 rounded-full shadow-md hover:bg-indigo-200 hover:scale-105 active:scale-95 transition-all flex items-center gap-3 text-lg w-full max-w-xs justify-center mx-auto";
                let playBtnContent = isAnswered ? '<i data-lucide="volume-2" class="w-6 h-6"></i>' : '<i data-lucide="volume-2" class="w-6 h-6"></i><span>音声を聴く</span>';

                container.innerHTML = `
                    <div class="relative w-full min-h-[400px] bg-slate-50 rounded-2xl border-2 border-slate-200 p-6 sm:p-8 flex flex-col items-center transition-all duration-300 shadow-sm w-full max-w-lg mx-auto">
                        <div class="absolute top-4 left-4 px-3 py-1 rounded bg-indigo-100 text-xs font-bold text-indigo-700 uppercase tracking-widest z-20 shadow-sm">Vocabulary Quiz</div>
                        <div class="${isAnswered ? 'hidden' : 'w-full flex flex-col items-center justify-center mt-12 mb-6 z-10 relative'}">
                            <button id="fc-center-play-btn" onclick="event.stopPropagation(); ${speakCall}" class="${playBtnClass}">${playBtnContent}</button>
                            <p class="text-slate-400 text-sm mt-4 text-center">音声を聞いて、正しい意味を選んでください</p>
                        </div>
                        ${isAnswered ? `<button id="fc-center-play-btn" onclick="event.stopPropagation(); ${speakCall}" class="${playBtnClass}" title="音声を再生">${playBtnContent}</button>` : ''}
                        ${optionsHtml}
                        ${resultHtml}
                    </div>`;
                lucide.createIcons({root: container});
                if (!isAnswered && !window.speechSynthesis.speaking) {
                    autoPlayTimeout = setTimeout(() => {
                        const btn = document.getElementById('fc-center-play-btn');
                        if (btn && !isAnswered) btn.click();
                    }, 500);
                }
                return;
            }

            const blurClass = !isFcTextRevealed ? 'filter blur-md select-none opacity-40' : '';
            const frontTextHtml = card.text.split('\n').map(line => {
                if (!line) return '';
                const parts = line.split(': ');
                return `<div class="mb-3 text-left"><span class="font-bold text-sm text-indigo-400 mr-2">${parts[0]}</span>${getRubyText(parts.slice(1).join(': '))}</div>`;
            }).join('');
            frontHtml = `<div class="${blurClass} transition-all duration-500 w-full max-w-lg mx-auto"><div class="text-xl font-medium text-slate-800 leading-relaxed">${frontTextHtml}</div></div>`;
            
            const backTextHtml = card.jp.split('\n').map(line => {
                if (!line) return '';
                const parts = line.split(': ');
                return `<div class="mb-3 text-left"><span class="font-bold text-sm text-emerald-600 mr-2">${parts[0]}</span>${parts.slice(1).join(': ')}</div>`;
            }).join('');
            backHtml = `<div class="text-center w-full max-w-lg mx-auto"><div class="text-lg font-bold text-emerald-800 leading-relaxed">${backTextHtml}</div>${card.meta ? `<div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-left mt-6 shadow-sm"><div class="flex items-center gap-2 text-amber-800 font-bold mb-2 text-sm"><i data-lucide="lightbulb" class="w-4 h-4 text-amber-500"></i><span>問題 (第${card.qId}題) のメタ解法ポイント</span></div><p class="text-amber-900 text-sm leading-relaxed">${card.meta}</p></div>` : ''}</div>`;

            let overlayHtml = '';
            if (!isCardFlipped && !isFcTextRevealed) {
                const playCall = `playFlashcardConversation(${currentCardIndex}, 'fc-center-play-btn')`;
                overlayHtml = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/40 backdrop-blur-[1px] rounded-2xl">
                        <button id="fc-center-play-btn" onclick="event.stopPropagation(); ${playCall}" class="mb-4 bg-indigo-100 text-indigo-700 border border-indigo-300 font-bold py-3 px-8 rounded-full shadow-md hover:bg-indigo-200 transition-colors flex items-center gap-2"><i data-lucide="volume-2" class="w-6 h-6"></i>音声を聴く</button>
                        <button onclick="event.stopPropagation(); revealFcText(event)" class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2"><i data-lucide="eye" class="w-4 h-4"></i>文字を表示 (Space)</button>
                    </div>`;
            }

            let bottomHint = (!isFcTextRevealed && !isCardFlipped) ? 'クリック または Space で文字を表示' : isCardFlipped ? 'クリック または Space で Question に戻る' : 'クリック または Space で裏返す (日本語訳)';
            
            container.innerHTML = `
                <div class="cursor-pointer relative w-full min-h-[300px] bg-slate-50 rounded-2xl border-2 border-slate-200 p-8 flex flex-col justify-center items-center transition-all duration-300 hover:border-indigo-200 group shadow-sm" onclick="handleCardClick()">
                    ${overlayHtml}
                    <button id="${btnId}" onclick="event.stopPropagation(); playFlashcardConversation(${currentCardIndex}, '${btnId}')" class="absolute top-4 right-4 p-3 rounded-full bg-white border border-slate-200 text-indigo-500 hover:bg-indigo-50 hover:text-indigo-600 shadow-sm transition-colors z-20" title="音声を再生"><i data-lucide="volume-2" class="w-6 h-6"></i></button>
                    <div class="absolute top-4 left-4 px-3 py-1 rounded bg-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest z-20">${isCardFlipped ? 'Answer' : 'Question'}</div>
                    <div id="fc-content" class="w-full mt-4">${isCardFlipped ? backHtml : frontHtml}</div>
                    <div class="absolute bottom-4 text-sm text-slate-400 opacity-50 group-hover:opacity-100 transition-opacity flex items-center gap-1 z-20"><i data-lucide="mouse-pointer-click" class="w-4 h-4"></i>${bottomHint}</div>
                </div>`;
            lucide.createIcons({root: container});
        }

        function handleQuizAnswer(idx) {
            if (isAnswered) return;
            isAnswered = true; selectedOptionIndex = idx; renderFlashcard();
            setTimeout(() => { const btn = document.getElementById('fc-center-play-btn'); if (btn) btn.click(); }, 300);
        }
        function flipCard() { isCardFlipped = !isCardFlipped; renderFlashcard(); }
        function nextCard() {
            window.speechSynthesis.cancel(); clearTimeout(autoPlayTimeout); resetActiveUI();
            if (currentCardIndex < flashcards.length - 1) { currentCardIndex++; isCardFlipped = false; isFcTextRevealed = false; isAnswered = false; selectedOptionIndex = -1; renderFlashcard(); }
        }
        function prevCard() {
            window.speechSynthesis.cancel(); clearTimeout(autoPlayTimeout); resetActiveUI();
            if (currentCardIndex > 0) { currentCardIndex--; isCardFlipped = false; isFcTextRevealed = false; isAnswered = false; selectedOptionIndex = -1; renderFlashcard(); }
        }
        function reshuffleCards() {
            window.speechSynthesis.cancel(); clearTimeout(autoPlayTimeout); resetActiveUI();
            flashcards.forEach(c => delete c.quizOptions); flashcards = shuffle([...flashcards]);
            currentCardIndex = 0; isCardFlipped = false; isFcTextRevealed = false; isAnswered = false; selectedOptionIndex = -1; renderFlashcard();
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('flashcard-view').classList.contains('hidden')) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (fcMode === 'vocab') {
                        const playBtn = document.getElementById('fc-center-play-btn'); if (playBtn) playBtn.click();
                    } else {
                        if (!isCardFlipped && !isFcTextRevealed) revealFcText(); else flipCard();
                    }
                } else if (e.code === 'ArrowRight') nextCard();
                else if (e.code === 'ArrowLeft') prevCard();
                else if (fcMode === 'vocab' && !isAnswered && ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Numpad1', 'Numpad2', 'Numpad3', 'Numpad4'].includes(e.code)) {
                    const idx = parseInt(e.code.replace(/\D/g, '')) - 1;
                    if (idx >= 0 && idx < 4) handleQuizAnswer(idx);
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => { renderApp(); lucide.createIcons(); });
    </script>
</body>
</html>
