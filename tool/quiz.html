<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語クイズ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
    .quiz-card { border-radius: 2.5rem; }
    .option-btn { border-radius: 1.25rem; text-align: left; padding: 1.25rem 1.5rem; font-weight: 600; font-size: 1.25rem; border-width: 2px; transition: all 0.2s; }
  </style>
</head>
<body class="bg-[#f0f2f5]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Star = ({ fill = "none" }) => (
      <svg width="32" height="32" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" className={fill !== "none" ? "text-yellow-400" : "text-gray-200"}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
    );

    function App() {
      const [wordData, setWordData] = useState([]);
      const [gameState, setGameState] = useState('quiz'); 
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid');
        fetch(`https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=${gid}`)
          .then(res => res.text())
          .then(csvText => {
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              // A:繁体字, B:ピンイン, C:意味, D:解説
              return { word: clean[0], pinyin: clean[1], meaning: clean[2], hint: clean[3] };
            });
            const valid = parsed.filter(item => item.word && item.meaning);
            setWordData(valid);
            const stats = {};
            valid.forEach(w => stats[w.word] = 0);
            setWordStats(stats);
            generateQuestion(valid, stats);
          });
      }, []);

      const generateQuestion = (data, stats) => {
        const activeWords = data.filter(w => stats[w.word] < 3);
        if (activeWords.length === 0) { setGameState('completed'); return; }
        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        const others = data.filter(w => w.word !== target.word).map(w => w.meaning);
        const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
        const newOptions = [target.meaning, ...shuffledOthers].sort(() => 0.5 - Math.random());
        setCurrentWord(target);
        setOptions(newOptions);
        setSelectedOption(null);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return;
        setSelectedOption(option);
        if (option === currentWord.meaning) {
          setWordStats(prev => {
            const newStats = { ...prev, [currentWord.word]: prev[currentWord.word] + 1 };
            return newStats;
          });
        }
      };

      if (!currentWord) return null;

      if (gameState === 'completed') {
        return <div className="min-h-screen flex items-center justify-center font-bold text-2xl">全問クリア！</div>;
      }

      const totalCorrect = Object.values(wordStats).reduce((a, b) => a + b, 0);
      const progress = (totalCorrect / (wordData.length * 3)) * 100;

      return (
        <div className="min-h-screen flex flex-col items-center py-6 px-4 max-w-md mx-auto">
          <div className="w-full flex justify-between text-xs text-gray-400 font-bold mb-2"><span>進捗</span><span>{totalCorrect} / {wordData.length * 3}</span></div>
          <div className="w-full bg-gray-200 h-2 rounded-full mb-8 overflow-hidden"><div className="bg-blue-400 h-full transition-all duration-500" style={{ width: `${progress}%` }}></div></div>

          <div className="quiz-card bg-white w-full p-10 mb-6 text-center shadow-sm border border-gray-100 relative">
            <span className="text-blue-500 text-sm font-bold tracking-widest mb-4 block">問題</span>
            <h2 className="text-6xl font-bold text-slate-800 mb-4">{currentWord.word}</h2>
            <p className="text-gray-400 text-lg mb-6">{currentWord.pinyin}</p>
            
            <button className="bg-orange-50 text-orange-500 px-6 py-2 rounded-full font-bold text-sm flex items-center mx-auto space-x-2 active:scale-90 transition-all">
              <span>🔊 発音を聞く</span>
            </button>

            <div className="flex justify-center mt-6 space-x-2">
              {[1, 2, 3].map(i => <Star key={i} fill={i <= wordStats[currentWord.word] ? "currentColor" : "none"} />)}
            </div>
          </div>

          <div className="w-full space-y-3">
            {options.map((opt, i) => (
              <button key={i} onClick={() => handleOptionClick(opt)} className={`option-btn w-full ${!selectedOption ? 'bg-white border-gray-100 text-slate-700 hover:border-blue-300' : opt === currentWord.meaning ? 'bg-green-50 border-green-500 text-green-700' : opt === selectedOption ? 'bg-red-50 border-red-500 text-red-700' : 'bg-gray-50 border-gray-100 text-gray-300'}`}>{opt}</button>
            ))}
          </div>

          {selectedOption && (
            <div className="w-full mt-6 animate-in slide-in-from-bottom-4 duration-300">
              <div className="bg-white p-6 rounded-3xl mb-4 shadow-sm border border-gray-100">
                <p className="text-gray-700 text-sm leading-relaxed">💡 {currentWord.hint}</p>
              </div>
              <button onClick={() => generateQuestion(wordData, wordStats)} className="w-full bg-slate-800 text-white font-bold py-5 rounded-2xl active:scale-95 transition-all text-lg">次の問題へ</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
