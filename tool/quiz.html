<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語フラッシュカード</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    .bg-dots { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
  </style>
</head>
<body class="bg-slate-100 bg-dots">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント ---
    const Play = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const RefreshCw = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
    const Trophy = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>;
    const Star = ({ size = 24, className = "", fill = "none" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const Volume2 = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
    const Headphones = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>;
    const CheckCircle = ({ size = 32 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const XCircle = ({ size = 32 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const ArrowRight = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;

    const TARGET_SCORE = 3;

    function App() {
      const [wordData, setWordData] = useState([]);
      const [testTitle, setTestTitle] = useState("単語テスト");
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);

      const [gameState, setGameState] = useState('start'); 
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid') || "1162710921"; // URLにない場合の予備
        const title = params.get('title') || "時間表現テスト";
        setTestTitle(title);

        // ★★★ スプレッドシート読み込み用URL (ここが重要) ★★★
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=${gid}`;
        
        fetch(SPREADSHEET_URL)
          .then(res => {
            if (!res.ok) throw new Error("アクセスエラー");
            return res.text();
          })
          .then(csvText => {
            // CSVを解析 (カンマ区切り、改行対応)
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // 特殊なカンマ分割
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              return { word: clean[0], pinyin: clean[1], katakana: clean[2], meaning: clean[3], hint: clean[4] };
            });

            const finalData = parsed.filter(item => item.word && item.meaning);
            if (finalData.length === 0) throw new Error("データが見つかりません");
            
            setWordData(finalData);
            setIsLoading(false);
          })
          .catch(err => {
            console.error(err);
            setError("データの読み込みに失敗しました。スプレッドシートの「ウェブに公開」設定を確認してください。");
            setIsLoading(false);
          });
      }, []);

      const playAudio = (text) => {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "zh-TW";
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
      };

      useEffect(() => {
        if (gameState === 'quiz' && currentWord && !selectedOption && gameMode === 'listening') {
          playAudio(currentWord.word);
        }
      }, [currentWord, gameState, gameMode, selectedOption]);

      const startGame = (mode) => {
        setGameMode(mode);
        const initialStats = {};
        wordData.forEach(w => { initialStats[w.word] = 0; });
        setWordStats(initialStats);
        setGameState('quiz');
        generateQuestion(initialStats, null);
      };

      const generateQuestion = (stats, previousWord) => {
        let activeWords = wordData.filter(w => stats[w.word] < TARGET_SCORE);
        if (activeWords.length === 0) { setGameState('completed'); return; }
        
        if (activeWords.length > 1 && previousWord) {
          activeWords = activeWords.filter(w => w.word !== previousWord);
        }

        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        const otherMeanings = wordData.filter(w => w.word !== target.word).map(w => w.meaning);
        const shuffledOthers = [...otherMeanings].sort(() => 0.5 - Math.random());
        const dummies = shuffledOthers.slice(0, 3);
        const newOptions = [...dummies, target.meaning].sort(() => 0.5 - Math.random());
        
        setCurrentWord(target);
        setOptions(newOptions);
        setSelectedOption(null);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return; 
        setSelectedOption(option);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (option === currentWord.meaning) {
          setWordStats(prev => ({ ...prev, [currentWord.word]: prev[currentWord.word] + 1 }));
        }
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center text-slate-400 font-bold">データを読み込み中...</div>;
      if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold p-8 text-center">{error}</div>;

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center border border-slate-200">
              <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6"><RefreshCw size={40} /></div>
              <h1 className="text-2xl font-bold text-slate-800 mb-6">{testTitle}</h1>
              <div className="space-y-3">
                <button onClick={() => startGame('standard')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 transition-all active:scale-95 shadow-lg shadow-blue-200"><Play size={20} /><span>通常モード</span></button>
                <button onClick={() => startGame('listening')} className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 transition-all active:scale-95 shadow-lg shadow-orange-200"><Headphones size={20} /><span>リスニングモード</span></button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center border border-slate-200">
              <div className="w-24 h-24 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6"><Trophy size={48} /></div>
              <h1 className="text-3xl font-bold text-slate-800 mb-4">完全制覇！</h1>
              <p className="text-slate-500 mb-8">おめでとうございます！<br/>すべてクリアしました。</p>
              <button onClick={() => setGameState('start')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">トップに戻る</button>
            </div>
          </div>
        );
      }

      const isHidden = gameMode === 'listening' && !selectedOption;
      const currentTotal = Object.values(wordStats).reduce((a, b) => a + b, 0);
      const progress = (currentTotal / (wordData.length * TARGET_SCORE)) * 100;

      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4 font-sans select-none">
          <div className="w-full max-w-md mb-6">
            <div className="w-full bg-slate-200 rounded-full h-2">
              <div className="bg-blue-500 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
            </div>
          </div>

          <div className="w-full max-w-md flex-1 flex flex-col">
            <div className="bg-white rounded-3xl shadow-lg p-8 mb-4 text-center relative min-h-[240px] flex flex-col justify-center border border-slate-200">
              {isHidden ? (
                <button onClick={() => playAudio(currentWord.word)} className="w-24 h-24 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto active:scale-90 transition-all"><Volume2 size={48} /></button>
              ) : (
                <div>
                  <h2 className="text-5xl font-bold text-slate-800 mb-4">{currentWord.word}</h2>
                  <p className="text-slate-400 font-medium">{currentWord.pinyin} | {currentWord.katakana}</p>
                </div>
              )}
              {selectedOption && (
                <div className={`absolute top-6 right-6 ${selectedOption === currentWord.meaning ? 'text-green-500' : 'text-red-500'}`}>
                  {selectedOption === currentWord.meaning ? <CheckCircle /> : <XCircle />}
                </div>
              )}
            </div>

            <div className="space-y-3 mb-6">
              {options.map((opt, i) => (
                <button key={i} onClick={() => handleOptionClick(opt)} disabled={!!selectedOption} className={`w-full p-4 rounded-2xl text-lg font-bold border-2 transition-all ${!selectedOption ? 'bg-white border-slate-200 hover:border-blue-400 text-slate-700' : opt === currentWord.meaning ? 'bg-green-50 border-green-500 text-green-700' : opt === selectedOption ? 'bg-red-50 border-red-500 text-red-700' : 'bg-slate-50 border-slate-100 text-slate-300'}`}>{opt}</button>
              ))}
            </div>

            {selectedOption && (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                <div className="bg-blue-50 rounded-2xl p-4 mb-4 border border-blue-100">
                  <p className="text-blue-800 text-sm leading-relaxed"><span className="font-bold mr-2">ヒント:</span>{currentWord.hint}</p>
                </div>
                <button onClick={() => generateQuestion(wordStats, currentWord.word)} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 active:scale-95 transition-all"><span>次の問題へ</span><ArrowRight size={20} /></button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
