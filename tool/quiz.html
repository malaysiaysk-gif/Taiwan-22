<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語クイズ（スプシ連動版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコン ---
    const Play = ({ size = 24, fill = "none" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
    const RefreshCw = ({ size = 24 }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>);
    const Trophy = ({ size = 24 }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>);
    const Star = ({ size = 24, className = "", fill = "none" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);
    const CheckCircle = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
    const XCircle = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>);
    const ArrowRight = ({ size = 24 }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>);
    const Volume2 = ({ size = 24 }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>);
    const Headphones = ({ size = 24 }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>);

    const TARGET_SCORE = 3;

    function App() {
      const [wordData, setWordData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [gameState, setGameState] = useState('start'); 
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid');
        fetch(`https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=${gid}`)
          .then(res => res.text())
          .then(csvText => {
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              return { word: clean[0], pinyin: clean[1], katakana: clean[2], meaning: clean[3], hint: clean[4] };
            });
            setWordData(parsed.filter(item => item.word && item.meaning));
            setIsLoading(false);
          });
      }, []);

      const playAudio = (text) => {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "zh-TW";
        window.speechSynthesis.speak(utter);
      };

      const generateQuestion = (stats) => {
        let activeWords = wordData.filter(w => stats[w.word] < TARGET_SCORE);
        if (activeWords.length === 0) { setGameState('completed'); return; }
        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        const otherMeanings = wordData.filter(w => w.word !== target.word).map(w => w.meaning);
        const dummies = [...otherMeanings].sort(() => 0.5 - Math.random()).slice(0, 3);
        const newOptions = [target.meaning, ...dummies].sort(() => 0.5 - Math.random());
        setCurrentWord(target);
        setOptions(newOptions);
        setSelectedOption(null);
        if (gameMode === 'listening') playAudio(target.word);
      };

      const startGame = (mode) => {
        setGameMode(mode);
        const stats = {};
        wordData.forEach(w => stats[w.word] = 0);
        setWordStats(stats);
        setGameState('quiz');
        generateQuestion(stats);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return;
        setSelectedOption(option);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (option === currentWord.meaning) {
          setWordStats(prev => ({ ...prev, [currentWord.word]: prev[currentWord.word] + 1 }));
        }
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center">読み込み中...</div>;

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <h1 className="text-2xl font-bold mb-8 text-gray-800">台湾華語クイズ</h1>
              <div className="space-y-4">
                <button onClick={() => startGame('standard')} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2"><Play size={24} fill="currentColor" /><span>通常モード</span></button>
                <button onClick={() => startGame('listening')} className="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2"><Headphones size={24} /><span>リスニング</span></button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 text-center">
            <div className="bg-white p-8 rounded-3xl shadow-xl"><Trophy size={60} className="mx-auto text-yellow-500 mb-4"/><h1 className="text-3xl font-bold mb-6">全問マスター！</h1><button onClick={() => setGameState('start')} className="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold">トップに戻る</button></div>
          </div>
        );
      }

      const totalRequired = wordData.length * TARGET_SCORE;
      const currentTotal = Object.values(wordStats).reduce((a, b) => a + b, 0);
      const progress = (currentTotal / totalRequired) * 100;
      const isHidden = gameMode === 'listening' && !selectedOption;

      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4 font-sans">
          <div className="w-full max-w-md mb-6"><div className="w-full bg-gray-200 h-3 rounded-full overflow-hidden"><div className="bg-blue-500 h-full transition-all duration-500" style={{ width: `${progress}%` }}></div></div></div>
          
          <div className="w-full max-w-md flex-1 flex flex-col">
            <div className="bg-white rounded-3xl shadow-lg p-6 mb-4 text-center min-h-[220px] flex flex-col justify-center border relative">
              {isHidden ? (
                <button onClick={() => playAudio(currentWord.word)} className="w-20 h-20 bg-orange-100 text-orange-600 rounded-full mx-auto flex items-center justify-center active:scale-95"><Volume2 size={44} /></button>
              ) : (
                <div className="animate-in fade-in duration-500">
                  <h2 className="text-5xl font-bold mb-3 text-gray-800">{currentWord.word}</h2>
                  <div className="flex justify-center mt-4 space-x-1">
                    {[1, 2, 3].map(i => <Star key={i} size={28} fill={i <= wordStats[currentWord.word] ? "currentColor" : "none"} className={i <= wordStats[currentWord.word] ? "text-yellow-400" : "text-gray-200"} />)}
                  </div>
                </div>
              )}
              {selectedOption && <div className={`absolute top-4 right-4 ${selectedOption === currentWord.meaning ? 'text-green-500' : 'text-red-500'}`}>{selectedOption === currentWord.meaning ? <CheckCircle size={36} /> : <XCircle size={36} />}</div>}
            </div>

            <div className="space-y-3 mb-6">
              {options.map((opt, i) => (
                <button key={i} onClick={() => handleOptionClick(opt)} className={`w-full text-left p-4 rounded-xl text-lg font-bold border-2 transition-all ${!selectedOption ? 'bg-white border-gray-200 text-gray-700 hover:border-blue-400' : opt === currentWord.meaning ? 'bg-green-50 border-green-500 text-green-800 shadow-sm' : opt === selectedOption ? 'bg-red-50 border-red-400 text-red-700' : 'bg-gray-50 border-gray-100 text-gray-300'}`}>{opt}</button>
              ))}
            </div>

            {selectedOption && (
              <div className="animate-in slide-in-from-bottom-4 duration-300">
                <div className="bg-blue-50 p-6 rounded-2xl mb-4 border border-blue-100 shadow-sm">
                  <p className="text-blue-900 font-bold text-lg mb-2 text-center">{currentWord.pinyin} | {currentWord.katakana}</p>
                  <p className="text-gray-700 text-sm leading-relaxed border-t border-blue-200 pt-3 italic">💡 {currentWord.hint}</p>
                </div>
                <button onClick={() => generateQuestion(wordStats)} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex justify-center items-center space-x-2 active:scale-95 transition-transform"><span>次の問題へ</span><ArrowRight size={20} /></button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
