<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語クイズ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
    .bg-dots { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
  </style>
</head>
<body class="bg-slate-100 bg-dots">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコン ---
    const Play = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const Headphones = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>;
    const Volume2 = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
    const Star = ({ size = 24, fill = "none" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;

    const TARGET_SCORE = 3;

    function App() {
      const [wordData, setWordData] = useState([]);
      const [testTitle, setTestTitle] = useState("");
      const [isLoading, setIsLoading] = useState(true);
      const [gameState, setGameState] = useState('start'); 
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid');
        setTestTitle(params.get('title') || "単語テスト");

        // メインのスプレッドシートIDを使用
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=${gid}`;
        
        fetch(SPREADSHEET_URL)
          .then(res => res.text())
          .then(csvText => {
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              // カンマ分割（引用符考慮）
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              
              // ★ 列の割り当てを厳密に定義 ★
              return { 
                word: clean[0],     // A列：単語
                pinyin: clean[1],   // B列：ピンイン
                katakana: clean[2], // C列：カタカナ
                meaning: clean[3],  // D列：意味
                hint: clean[4]      // E列：ヒント
              };
            });

            const finalData = parsed.filter(item => item.word && item.meaning);
            setWordData(finalData);
            setIsLoading(false);
          })
          .catch(() => setIsLoading(false));
      }, []);

      const playAudio = (text) => {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "zh-TW";
        window.speechSynthesis.speak(utter);
      };

      const startGame = (mode) => {
        setGameMode(mode);
        const stats = {};
        wordData.forEach(w => stats[w.word] = 0);
        setWordStats(stats);
        setGameState('quiz');
        generateQuestion(stats);
      };

      const generateQuestion = (stats) => {
        const activeWords = wordData.filter(w => stats[w.word] < TARGET_SCORE);
        if (activeWords.length === 0) { setGameState('completed'); return; }

        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        const otherMeanings = wordData.filter(w => w.word !== target.word).map(w => w.meaning);
        const shuffledOthers = otherMeanings.sort(() => 0.5 - Math.random()).slice(0, 3);
        const newOptions = [...shuffledOthers, target.meaning].sort(() => 0.5 - Math.random());
        
        setCurrentWord(target);
        setOptions(newOptions);
        setSelectedOption(null);
        if (gameMode === 'listening') playAudio(target.word);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return;
        setSelectedOption(option);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (option === currentWord.meaning) {
          setWordStats(prev => ({ ...prev, [currentWord.word]: prev[currentWord.word] + 1 }));
        }
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center">読み込み中...</div>;

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <h1 className="text-2xl font-bold mb-6">{testTitle}</h1>
              <div className="space-y-3">
                <button onClick={() => startGame('standard')} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2"><Play size={20} /><span>通常モード</span></button>
                <button onClick={() => startGame('listening')} className="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2"><Headphones size={20} /><span>リスニング</span></button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 text-center">
              <h1 className="text-3xl font-bold mb-4 text-green-600">制覇！</h1>
              <button onClick={() => setGameState('start')} className="bg-slate-800 text-white px-8 py-3 rounded-xl">戻る</button>
            </div>
          </div>
        );
      }

      const isHidden = gameMode === 'listening' && !selectedOption;
      const progress = (Object.values(wordStats).reduce((a, b) => a + b, 0) / (wordData.length * TARGET_SCORE)) * 100;

      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4">
          <div className="w-full max-w-md bg-slate-200 h-2 rounded-full mb-6">
            <div className="bg-blue-500 h-2 rounded-full transition-all" style={{ width: `${progress}%` }}></div>
          </div>
          <div className="w-full max-w-md bg-white rounded-3xl shadow-lg p-6 mb-4 text-center min-h-[200px] flex flex-col justify-center border relative">
            {isHidden ? (
              <button onClick={() => playAudio(currentWord.word)} className="w-20 h-20 bg-orange-100 text-orange-600 rounded-full mx-auto flex items-center justify-center"><Volume2 size={40} /></button>
            ) : (
              <div>
                <h2 className="text-5xl font-bold mb-2">{currentWord.word}</h2>
                <p className="text-slate-400">{currentWord.pinyin} | {currentWord.katakana}</p>
              </div>
            )}
            <div className="flex justify-center mt-4 space-x-1">
              {[1, 2, 3].map(i => <Star key={i} size={20} fill={i <= wordStats[currentWord.word] ? "#facc15" : "none"} className={i <= wordStats[currentWord.word] ? "text-yellow-400" : "text-slate-200"} />)}
            </div>
          </div>
          <div className="w-full max-w-md space-y-3">
            {options.map((opt, i) => (
              <button key={i} onClick={() => handleOptionClick(opt)} className={`w-full p-4 rounded-xl text-lg font-bold border-2 transition-all ${!selectedOption ? 'bg-white border-slate-200 text-slate-700' : opt === currentWord.meaning ? 'bg-green-100 border-green-500 text-green-700' : opt === selectedOption ? 'bg-red-100 border-red-500 text-red-700' : 'bg-slate-50 text-slate-300'}`}>{opt}</button>
            ))}
          </div>
          {selectedOption && (
            <div className="w-full max-w-md mt-4">
              <div className="bg-blue-50 p-4 rounded-xl mb-3 text-sm text-blue-800 font-medium border border-blue-100">💡 {currentWord.hint}</div>
              <button onClick={() => generateQuestion(wordStats)} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">次の問題へ</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
