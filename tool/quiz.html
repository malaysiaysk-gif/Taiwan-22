<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語クイズ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; }
    .card { border-radius: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Star = ({ fill = "none" }) => (
      <svg width="28" height="28" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" className={fill !== "none" ? "text-yellow-400" : "text-gray-200"}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
    );

    function App() {
      const [wordData, setWordData] = useState([]);
      const [gameState, setGameState] = useState('quiz'); 
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid');
        fetch(`https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=${gid}`)
          .then(res => res.text())
          .then(csvText => {
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              // A:漢字, B:ピンイン, C:カタカナ, D:意味, E:ヒント
              return { word: clean[0], pinyin: clean[1], katakana: clean[2], meaning: clean[3], hint: clean[4] };
            });
            const valid = parsed.filter(item => item.word && item.meaning);
            setWordData(valid);
            const stats = {};
            valid.forEach(w => stats[w.word] = 0);
            setWordStats(stats);
            generateQuestion(valid, stats);
          });
      }, []);

      const generateQuestion = (data, stats) => {
        const activeWords = data.filter(w => stats[w.word] < 3);
        if (activeWords.length === 0) { setGameState('completed'); return; }
        
        // 正解を決定
        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        
        // 【重要】ダミー選択肢の作成ロジック
        // 全データの中から、正解以外の「意味(meaning)」をすべて抜き出す
        const allOtherMeanings = data
          .filter(w => w.word !== target.word)
          .map(w => w.meaning);
        
        // シャッフルして先頭3つをダミーにする
        const dummies = [...new Set(allOtherMeanings)] // 重複を削除
          .sort(() => 0.5 - Math.random())
          .slice(0, 3);
        
        // 正解とダミーを混ぜてシャッフル
        const finalOptions = [target.meaning, ...dummies].sort(() => 0.5 - Math.random());
        
        setCurrentWord(target);
        setOptions(finalOptions);
        setSelectedOption(null);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return;
        setSelectedOption(option);
        if (option === currentWord.meaning) {
          setWordStats(prev => ({ ...prev, [currentWord.word]: prev[currentWord.word] + 1 }));
        }
      };

      if (!currentWord) return null;
      if (gameState === 'completed') return <div className="min-h-screen flex items-center justify-center font-bold">全問クリア！</div>;

      return (
        <div className="min-h-screen flex flex-col items-center py-6 px-4 max-w-md mx-auto">
          <div className="bg-white card w-full p-8 mb-6 text-center border border-gray-100 relative">
            <h2 className="text-5xl font-bold text-slate-800 mb-2">{currentWord.word}</h2>
            {selectedOption && <p className="text-gray-400 mb-4">{currentWord.pinyin} | {currentWord.katakana}</p>}
            <div className="flex justify-center space-x-1 mt-4">
              {[1, 2, 3].map(i => <Star key={i} fill={i <= wordStats[currentWord.word] ? "currentColor" : "none"} />)}
            </div>
          </div>

          <div className="w-full space-y-3">
            {options.map((opt, i) => (
              <button key={i} onClick={() => handleOptionClick(opt)} className={`w-full p-4 rounded-2xl text-lg font-bold border-2 text-left px-6 transition-all ${!selectedOption ? 'bg-white border-gray-100 text-slate-700 hover:border-blue-300' : opt === currentWord.meaning ? 'bg-green-50 border-green-500 text-green-700' : opt === selectedOption ? 'bg-red-50 border-red-500 text-red-700' : 'bg-gray-50 text-gray-300 opacity-60'}`}>{opt}</button>
            ))}
          </div>

          {selectedOption && (
            <div className="w-full mt-6">
              <div className="bg-blue-50 p-5 rounded-2xl mb-4 border border-blue-100 text-sm text-gray-700">💡 {currentWord.hint}</div>
              <button onClick={() => generateQuestion(wordData, wordStats)} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-lg active:scale-95">次の問題へ</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
