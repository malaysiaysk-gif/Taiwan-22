<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台湾華語 単語クイズ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント ---
    const Play = ({ size = 24, fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    );
    const RefreshCw = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    );
    const Trophy = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>
    );
    const Star = ({ size = 24, className = "", fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
    );
    const CheckCircle = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    );
    const XCircle = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
    );
    const ArrowRight = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    );
    const Volume2 = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    );
    const Headphones = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
    );

    const TARGET_SCORE = 3;

    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    function App() {
      const [wordData, setWordData] = useState([]);
      const [testTitle, setTestTitle] = useState("単語テスト");
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);

      const [gameState, setGameState] = useState('start'); 
      const [gameMode, setGameMode] = useState('standard');
      const [wordStats, setWordStats] = useState({});
      const [currentWord, setCurrentWord] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);

      // ★ スプレッドシートからデータを取得 ★
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const gid = params.get('gid');
        const title = params.get('title') || "単語テスト";
        setTestTitle(title);

        const SPREADSHEET_BASE = "https://docs.google.com/spreadsheets/d/1x0RwS9AiIvDpSOL_yICRb68seT6Q2Hd619nzKjcgk3U/export?format=csv&gid=";
        
        fetch(SPREADSHEET_BASE + gid)
          .then(res => res.text())
          .then(csvText => {
            const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const parsed = rows.slice(1).map(r => {
              const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
              const clean = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
              
              // スプレッドシートの列定義: A:単語, B:ピンイン, C:カタカナ, D:意味, E:ヒント
              return { 
                word: clean[0], 
                pinyin: clean[1], 
                katakana: clean[2], 
                meaning: clean[3], 
                hint: clean[4] 
              };
            });
            const finalData = parsed.filter(item => item.word && item.meaning);
            setWordData(finalData);
            setIsLoading(false);
          })
          .catch(err => {
            setError("データの読み込みに失敗しました。");
            setIsLoading(false);
          });
      }, []);

      const playAudio = (text) => {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "zh-TW";
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
      };

      useEffect(() => {
        if (gameState === 'quiz' && currentWord && !selectedOption && gameMode === 'listening') {
          playAudio(currentWord.word);
        }
      }, [currentWord, gameState, gameMode, selectedOption]);

      const startGame = (mode) => {
        setGameMode(mode);
        const initialStats = {};
        wordData.forEach(w => { initialStats[w.word] = 0; });
        setWordStats(initialStats);
        setGameState('quiz');
        generateQuestion(initialStats, null);
      };

      const generateQuestion = (stats, previousWord) => {
        let activeWords = wordData.filter(w => stats[w.word] < TARGET_SCORE);
        if (activeWords.length === 0) { setGameState('completed'); return; }
        
        const target = activeWords[Math.floor(Math.random() * activeWords.length)];
        
        // 正解の「意味(meaning)」を選択肢に含める
        const otherMeanings = wordData.filter(w => w.word !== target.word).map(w => w.meaning);
        const dummies = shuffleArray(otherMeanings).slice(0, 3);
        const newOptions = shuffleArray([target.meaning, ...dummies]);
        
        setCurrentWord(target);
        setOptions(newOptions);
        setSelectedOption(null);
      };

      const handleOptionClick = (option) => {
        if (selectedOption) return;
        setSelectedOption(option);
        if (gameMode === 'standard') playAudio(currentWord.word);
        if (option === currentWord.meaning) {
          setWordStats(prev => ({ ...prev, [currentWord.word]: prev[currentWord.word] + 1 }));
        }
      };

      const totalRequired = wordData.length * TARGET_SCORE;
      const currentTotal = Object.values(wordStats).reduce((a, b) => a + b, 0);
      const progressPercent = totalRequired === 0 ? 0 : (currentTotal / totalRequired) * 100;

      const getButtonClass = (option) => {
        const baseClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 text-lg font-medium outline-none ";
        if (!selectedOption) return baseClass + "bg-white border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700";
        if (option === currentWord.meaning) return baseClass + "bg-green-100 border-green-500 text-green-800";
        if (option === selectedOption) return baseClass + "bg-red-50 border-red-400 text-red-700";
        return baseClass + "bg-gray-50 border-gray-200 text-gray-400 opacity-60";
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center">読み込み中...</div>;
      if (error) return <div className="min-h-screen flex items-center justify-center text-red-500">{error}</div>;

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <h1 className="text-2xl font-bold mb-6">{testTitle}</h1>
              <div className="space-y-3">
                <button onClick={() => startGame('standard')} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 active:scale-95"><Play size={24} fill="currentColor" /><span>通常モード</span></button>
                <button onClick={() => startGame('listening')} className="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 active:scale-95"><Headphones size={24} /><span>リスニング</span></button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'completed') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full text-center">
              <Trophy size={48} className="mx-auto mb-4 text-yellow-500" />
              <h1 className="text-3xl font-bold mb-8">完全制覇！</h1>
              <button onClick={() => setGameState('start')} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">戻る</button>
            </div>
          </div>
        );
      }

      const isHidden = gameMode === 'listening' && !selectedOption;

      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4 select-none">
          <div className="w-full max-w-md mb-6">
            <div className="flex justify-between text-xs text-gray-500 mb-2"><span>進捗</span><span>{currentTotal}/{totalRequired}</span></div>
            <div className="w-full bg-gray-200 rounded-full h-3"><div className="bg-blue-500 h-3 rounded-full transition-all" style={{ width: `${progressPercent}%` }}></div></div>
          </div>

          <div className="w-full max-w-md flex-1">
            <div className="bg-white rounded-3xl shadow-lg p-6 mb-4 text-center relative min-h-[200px] flex flex-col justify-center border">
              {isHidden ? (
                <button onClick={() => playAudio(currentWord.word)} className="w-20 h-20 bg-orange-100 text-orange-600 rounded-full mx-auto flex items-center justify-center"><Volume2 size={40} /></button>
              ) : (
                <div>
                  <h2 className="text-5xl font-bold mb-2">{currentWord.word}</h2>
                  <p className="text-gray-500">{currentWord.pinyin} | {currentWord.katakana}</p>
                </div>
              )}
              {selectedOption && (
                <div className={`absolute top-4 right-4 ${selectedOption === currentWord.meaning ? 'text-green-500' : 'text-red-500'}`}>
                  {selectedOption === currentWord.meaning ? <CheckCircle size={32} /> : <XCircle size={32} />}
                </div>
              )}
            </div>

            <div className="space-y-3 mb-6">
              {options.map((opt, i) => <button key={i} onClick={() => handleOptionClick(opt)} disabled={!!selectedOption} className={getButtonClass(opt)}>{opt}</button>)}
            </div>

            {selectedOption && (
              <div className="animate-in fade-in duration-300">
                <div className="bg-blue-50 p-5 rounded-2xl mb-4 text-sm text-gray-700 leading-relaxed border border-blue-100">💡 {currentWord.hint}</div>
                <button onClick={() => generateQuestion(wordStats, currentWord.word)} className="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl flex justify-center items-center space-x-2 active:scale-95 shadow-md"><span>次へ</span><ArrowRight size={20} /></button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
