    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Pinyin Pro (自動ピンイン付与ライブラリ) -->

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        
        /* 隠す（ぼかし）設定 */
        .content-hidden .secret-target {
            filter: blur(8px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
        }
        
        /* 表示時（ぼかし解除）の設定 */
        body.global-reveal .content-hidden .secret-target,
        .question-container:not(.content-hidden) .secret-target {
            filter: blur(0px);
            opacity: 1;
            pointer-events: auto;
            user-select: auto;
        }
    </style>
</head>

        <button onclick="switchTab('flashcard')" id="tab-flashcard" class="px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors">フラッシュカードテスト</button>
    </div>

    <!-- 音声スピード設定 -->
    <div class="max-w-4xl mx-auto mb-6 flex justify-center items-center gap-4 bg-white p-3 rounded-xl shadow-sm border border-slate-200">
        <label for="speed-slider" class="text-sm font-bold text-slate-600 flex items-center gap-2">
            <i data-lucide="gauge" class="w-4 h-4"></i>
            音声スピード: <span id="speed-display" class="text-indigo-600 w-11 text-right font-mono">0.95x</span>
        </label>
        <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.05" value="0.95" class="w-32 md:w-48 accent-indigo-600 cursor-pointer">
    </div>

    <!-- 1. 一覧学習ビュー -->
    <div id="list-view" class="max-w-4xl mx-auto">
        <div class="mb-6 flex justify-end">
            <button onclick="toggleGlobalReveal()" id="global-reveal-btn" class="flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg shadow-sm hover:bg-slate-50 transition-colors font-medium text-sm">
                <i data-lucide="eye" class="w-4 h-4"></i>
                <span>すべての解答・スクリプトを表示</span>
            </button>
        </div>
        <main id="list-content" class="space-y-8">
            <!-- JSでここにコンテンツが生成されます -->
        </main>
    </div>

    <!-- 2. フラッシュカードビュー -->
    <div id="flashcard-view" class="hidden max-w-3xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-10 flex flex-col items-center">
            
            <div class="text-center mb-6 w-full">

                <div class="flex justify-center gap-2 bg-slate-100 p-1 rounded-lg inline-flex flex-wrap">
                    <button onclick="setFlashcardMode('vocab')" id="fc-mode-vocab" class="px-6 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all">聽力選意 (4選1)</button>
                    <button onclick="setFlashcardMode('sentence')" id="fc-mode-sentence" class="px-6 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">聽力測驗 (全出題)</button>
                </div>
            </div>

            <div id="flashcard-container" class="w-full cursor-pointer transition-all" onclick="handleCardClick()">
                <!-- JSでカードを描画 -->
            </div>

            <div class="mt-8 flex justify-between items-center w-full">
                <button onclick="prevCard()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="前のカード"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                <div class="flex items-center gap-4">
                    <button onclick="reshuffleCards()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50" title="シャッフル"><i data-lucide="shuffle" class="w-5 h-5"></i></button>

            </div>

        // ==========================================
        // 共通・状態管理
        // ==========================================
        let playingId = null;
        let playingType = null;
        let isGlobalReveal = false;
        let currentSpeechRate = 0.95;

        // タブ切り替え
        function switchTab(tabId) {
            window.speechSynthesis.cancel();
            resetActiveUI();

            const views = ['list', 'flashcard'];
            views.forEach(v => {
                document.getElementById(`${v}-view`).classList.add('hidden');
                document.getElementById(`tab-${v}`).className = "px-6 py-2 rounded-full font-bold bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors";
            });

            document.getElementById(`${tabId}-view`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-md transition-colors";

            if (tabId === 'flashcard') {
                setFlashcardMode(fcMode); // タブを開くたびに毎回シャッフルして初期化
            }
        }

        function toggleGlobalReveal() {
            isGlobalReveal = !isGlobalReveal;
            if (isGlobalReveal) {
                document.body.classList.add('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i><span>すべて隠す</span>`;
            } else {
                document.body.classList.remove('global-reveal');
                document.getElementById('global-reveal-btn').innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i><span>すべての解答・スクリプトを表示</span>`;
            }
            lucide.createIcons({root: document.getElementById('global-reveal-btn')});
        }

        // ==========================================
        // 音声再生ロジック
        // ==========================================
        function resetActiveUI() {
            if (!playingId) return;
            const btn = document.getElementById(playingId);
            if (!btn) return;

            if (playingType === 'vocab') {
                const icon = btn.querySelector('.lucide-volume-2');
                if (icon) {
                    icon.classList.remove('animate-pulse', 'text-blue-600');
                    icon.classList.add('text-blue-400');
                }
            } else if (playingType === 'single') {
                btn.classList.remove('text-indigo-600', 'bg-indigo-100', 'text-emerald-600', 'bg-emerald-100');
                btn.classList.add('text-slate-400');
                const icon = btn.querySelector('.lucide-play');
                if (icon) icon.setAttribute('fill', 'none');
            } else if (playingType === 'conversation') {
                btn.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                if(btn.id.includes('fc-sent-play-after')) {
                    btn.innerHTML = `<i data-lucide="play-circle" class="w-6 h-6"></i>`;
                } else if(btn.id.includes('btn-list-conv')) {
                    btn.innerHTML = `<i data-lucide="play-circle" class="w-5 h-5"></i> 2回再生して表示`;
                } else if (btn.id.includes('fc-sent-play-')) {
                    const count = btn.id.replace('fc-sent-play-', '');
                    btn.innerHTML = `<i data-lucide="play-circle" class="w-6 h-6"></i> ${count}回再生`;
                } else {
                    btn.innerHTML = `<i data-lucide="play-circle" class="w-8 h-8"></i> 音声を再生`;
                }
                lucide.createIcons({root: btn});
            }
        }

        function playConversation(qId, btnId, loopCount = 1, callback = null) {
            if (!('speechSynthesis' in window)) {
                showToast("お使いのブラウザは音声再生に対応していません。");
                return;
            }
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = 'conversation';

            const btn = document.getElementById(btnId);
            if(btn) {
                btn.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
                if(btnId.includes('fc-sent-play-after') || btnId.includes('btn-list-conv')) {
                     btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 再生中...`;
                } else {
                     btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> 再生中...`;
                }
                lucide.createIcons({root: btn});
            }

            const q = questionsData.find(x => x.id === qId);
            if (!q) return;

            const utterances = [];

            for(let i=0; i<loopCount; i++) {
                // 会話・質問の読み上げ
                q.script.forEach((line, index) => {
                    let delay = 600;
                    if (index === q.script.length - 2) delay = 1200; // 問の前のポーズ
                    
                    // 選択肢がない場合、1回目終了後に長めのポーズ
                    if (i === 0 && index === q.script.length - 1 && (!q.choices || q.choices.length === 0)) delay = 2000; 
                    utterances.push({ text: line.text, delayAfter: delay });
                });

                // 選択肢の読み上げを追加
                if (q.choices && q.choices.length > 0) {
                    q.choices.forEach((choice, index) => {
                        let delay = 1000; // 選択肢間のポーズ
                        // TTSが綺麗に「A因為...」と読めるように整形
                        const cleanChoice = choice.replace(/^[（(]([A-D])[）)]\s*/, '$1 '); 
                        
                        // 1回目終了後に長めのポーズ
                        if (i === 0 && index === q.choices.length - 1) delay = 2000;
                        utterances.push({ text: cleanChoice, delayAfter: delay });
                    });
                }
            }

            let currentIndex = 0;
            function speakNext() {
                if (playingId !== btnId) return; 
                
                if (currentIndex >= utterances.length) {
                    resetActiveUI();
                    playingId = null;
                    playingType = null;
                    if (callback) callback(); // 終了時のコールバック
                    return;
                }

                const currentItem = utterances[currentIndex];
                const utterance = new SpeechSynthesisUtterance(currentItem.text);
                utterance.lang = 'zh-TW';
                utterance.rate = currentSpeechRate;

                utterance.onend = () => {
                    const delay = currentItem.delayAfter;
                    currentIndex++;
                    setTimeout(() => { if (playingId === btnId) speakNext(); }, delay);
                };
                utterance.onerror = () => {
                    currentIndex++;
                    if (playingId === btnId) speakNext();
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }

        function speakText(text, btnId, isVocab, speakerType) {
            if (!('speechSynthesis' in window)) {
                showToast("お使いのブラウザは音声再生に対応していません。");
                return;
            }
            window.speechSynthesis.cancel();
            resetActiveUI();

            playingId = btnId;
            playingType = isVocab ? 'vocab' : 'single';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = currentSpeechRate;  

            utterance.onstart = () => {
                const btn = document.getElementById(btnId);
                if (!btn) return;
                if (isVocab) {
                    const icon = btn.querySelector('.lucide-volume-2');
                    if (icon) {
                        icon.classList.remove('text-blue-400');
                        icon.classList.add('animate-pulse', 'text-blue-600');
                    }
                } else {
                    btn.classList.remove('text-slate-400');
                    if (speakerType === '問') btn.classList.add('text-emerald-600', 'bg-emerald-100');
                    else btn.classList.add('text-indigo-600', 'bg-indigo-100');
                    const icon = btn.querySelector('.lucide-play');
                    if (icon) icon.setAttribute('fill', 'currentColor');
                }
            };

            utterance.onend = () => { resetActiveUI(); playingId = null; playingType = null; };
            utterance.onerror = () => { resetActiveUI(); playingId = null; playingType = null; };

            window.speechSynthesis.speak(utterance);
        }

        // カスタム通知 (alertの代わり)
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed top-4 left-1/2 transform -translate-x-1/2 bg-rose-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 font-bold transition-opacity duration-300";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getRubyText(text, makePinyinMain = false) {
            if (typeof pinyinPro === 'undefined') return text;
            try {
                const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
                const charArr = Array.from(text);
                let html = '';
                for (let i = 0; i < charArr.length; i++) {
                    const char = charArr[i];
                    const py = pinyinArr[i];
                    if (/[\u4e00-\u9fa5]/.test(char) && py !== char) {
                        if (makePinyinMain) {
                            // ピンインをメイン（大きく赤く）、漢字をルビ（上に小さく）
                            // 画面サイズに応じて文字の大きさを段階的(xl -> 2xl -> 3xl)に調整
                            html += `<ruby style="ruby-position: over;" class="mx-1 text-xl sm:text-2xl md:text-3xl text-red-600 font-bold tracking-wider">${py}<rt class="text-xs sm:text-sm text-slate-600 font-sans tracking-normal font-bold">${char}</rt></ruby>`;
                        } else {
                            // 通常の表示（漢字メイン、ピンイン下ルビ）
                            html += `<ruby style="ruby-position: under;" class="mx-[1px]">${char}<rt class="text-[0.7rem] text-slate-400 font-sans tracking-tighter">${py}</rt></ruby>`;
                        }
                    } else {
                        if (makePinyinMain) {
                            html += `<span class="mx-0.5 text-xl sm:text-2xl md:text-3xl text-slate-400">${char}</span>`;
                        } else {
                            html += `<span class="mx-[1px]">${char}</span>`;
                        }
                    }
                }
                return html;
            } catch (e) {
                return text;
            }
        }

        // HTMLジェネレーター（共通コンポーネント化）
        function generateScriptHtml(script, qId, prefix = "list") {
            return script.map((line, idx) => {

                // フレーズに分割（カンマやピリオド等の句読点で区切る）
                const phrases = line.text.match(/[^，。！？、,.\!\?]+[，。！？、,.\!\?]*/g) || [line.text];

                // 縦積み(flex-col)に変更し、テキストに幅を最大化
                return `
                    <div class="flex flex-col gap-3 bg-slate-50 p-4 sm:p-5 rounded-xl border border-slate-200 shadow-sm w-full">
                        <div class="flex items-center gap-3 border-b border-slate-200 pb-3 w-full">
                            <span class="font-bold px-3 py-1.5 rounded-md text-sm ${speakerBg} shrink-0 shadow-sm">${line.speaker}</span>
                            <button id="${btnId}" onclick="speakText('${line.text.replace(/'/g, "\\'")}', '${btnId}', false, '${line.speaker}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full hover:bg-slate-200 transition-colors text-slate-500 bg-white border border-slate-200 shadow-sm shrink-0 text-sm font-bold" title="全文を再生">
                                <i data-lucide="play" class="w-4 h-4 fill-current text-slate-400"></i> 全文再生
                            </button>
                        </div>
                        <div class="w-full text-left pt-2">
                            <p class="break-all whitespace-normal">
                                ${phrases.map((phrase, pIdx) => {
                                    const phraseBtnId = `${btnId}-p${pIdx}`;
                                    // 途中から最後まで再生するためのテキストを生成
                                    const textToSpeak = phrases.slice(pIdx).join('').replace(/'/g, "\\'");
                                    
                                    // 2つ目以降のフレーズの先頭に「ここから再生」ボタンを配置
                                    const playBtn = pIdx > 0 ? `
                                        <button id="${phraseBtnId}" onclick="speakText('${textToSpeak}', '${phraseBtnId}', false, '${line.speaker}')" class="inline-flex items-center justify-center align-middle mx-1.5 p-1.5 rounded-full hover:bg-indigo-100 hover:text-indigo-600 transition-colors text-slate-400 border border-slate-200 bg-white shadow-sm shrink-0" title="ここから再生">
                                            <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i>
                                        </button>
                                    ` : '';
                                    
                                    return `
                                        <span class="leading-[3.5rem] sm:leading-[4.5rem] align-middle inline">
                                            ${playBtn}${getRubyText(phrase, true)}
                                        </span>
                                    `;
                                }).join('')}
                            </p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateVocabHtml(vocab, qId, prefix = "list") {
            if (!vocab || vocab.length === 0) return '';
            return vocab.map((v, idx) => {
                const btnId = `btn-${prefix}-vocab-${qId}-${idx}`;
                return `
                    <div class="flex items-center gap-3 border border-slate-100 bg-white p-2.5 rounded-lg hover:border-indigo-200 transition-colors shadow-sm col-span-1 md:col-span-2">
                        <button id="${btnId}" onclick="speakText('${v.speak.replace(/'/g, "\\'")}', '${btnId}', true)" class="flex-shrink-0 flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-md font-mono text-sm transition-colors group">
                            <i data-lucide="volume-2" class="w-4 h-4 text-blue-400 group-hover:text-blue-600"></i>
                            朗讀
                        </button>
                        <div class="flex flex-col justify-center overflow-hidden">
                            <span class="font-bold text-slate-800 truncate" title="${v.word}">${v.word}</span>
                            <span class="text-xs text-slate-500 truncate" title="${v.jp}">${v.jp}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateChoicesHtml(choices, qId, ans, isSecret = false, prefix = "list") {
            if (!choices || choices.length === 0) return '';
            return choices.map((choice, cIdx) => {
                const optionLetter = (choice.match(/[A-D]/) || [])[0] || '';
                const isCorrect = optionLetter === ans;
                const btnId = `btn-${prefix}-choice-${qId}-${optionLetter || cIdx}`;
                
                // TTSできれいに「A 因為...」と読ませるための処理
                const speakTextStr = choice.replace(/^[（(][A-D][）)]\s*/, optionLetter ? `${optionLetter} ` : '').replace(/'/g, "\\'");
                
                const secretClass = isSecret ? 'secret-target' : '';
                const ansHtml = isCorrect ? `<span class="${secretClass} flex-shrink-0 ml-2 text-emerald-600 font-bold text-xs bg-emerald-100 px-2 py-1 rounded">正解</span>` : '';
                
                return `
                    <div class="p-3 rounded-lg border border-slate-200 bg-white flex justify-between items-center shadow-sm gap-2">
                        <div class="flex items-start gap-2">
                            <button id="${btnId}" onclick="event.stopPropagation(); speakText('${speakTextStr}', '${btnId}', false)" class="${secretClass} flex-shrink-0 p-1 rounded-full hover:bg-slate-100 transition-colors text-slate-400 mt-0.5">
                                <i data-lucide="play" class="w-4 h-4"></i>
                            </button>
                            <span class="text-slate-800 leading-relaxed">${getRubyText(choice)}</span>
                        </div>
                        ${ansHtml}
                    </div>
                `;
            }).join('');
        }

        function generateExplanationsHtml(explanations) {
            if (!explanations || explanations.length === 0) return '';
            return `
                <div class="mt-3 pt-3 border-t border-amber-200/60">
                    <strong class="block mb-2 text-amber-800 flex items-center gap-1.5"><i data-lucide="book-open" class="w-4 h-4"></i>語彙・文法解説</strong>
                    <ul class="space-y-1.5 text-sm">
                        ${explanations.map(ex => `
                            <li class="flex items-start gap-2">
                                <span class="text-amber-500 mt-0.5 font-bold">•</span>
                                <div>
                                    <span class="font-bold text-amber-900">${ex.word}</span>
                                    ${ex.pinyin ? `<span class="text-amber-700 font-mono text-xs mx-1">(${ex.pinyin})</span>` : ''}
                                    <span class="text-amber-800">：${ex.meaning}</span>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        // ==========================================
        // 1. 一覧学習の描画
        // ==========================================
        function renderListView() {
            const container = document.getElementById('list-content');
            let html = '';

            questionsData.forEach(q => {
                if (q.sectionName) {
                    html += `
                        <div class="py-4 mt-8 mb-2 border-t-2 border-indigo-100 pt-8 first:mt-0 first:border-0 first:pt-0">
                            <h2 class="text-2xl font-bold text-indigo-800 flex items-center justify-center gap-2">
                                <i data-lucide="book-open" class="w-6 h-6"></i>
                                ${q.sectionName}
                            </h2>
                        </div>
                    `;
                }

                html += `
                    <article id="list-q-${q.id}" class="question-container content-hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-indigo-50 border-b border-indigo-100 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div class="flex items-center gap-4">
                                <h2 class="text-xl font-bold text-indigo-800 shrink-0">第 ${q.id} 題</h2>
                                <button onclick="playConversation(${q.id}, 'btn-list-conv-${q.id}', 2, () => { document.getElementById('list-q-${q.id}').classList.remove('content-hidden'); })" id="btn-list-conv-${q.id}" class="flex items-center gap-1.5 bg-white border border-indigo-200 text-indigo-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-indigo-50 transition-colors">
                                    <i data-lucide="play-circle" class="w-5 h-5"></i>
                                    2回再生して表示
                                </button>
                            </div>
                            <div class="secret-target flex items-center gap-2 bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold transition-all duration-500 text-sm">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                <span>測驗重點: <br class="sm:hidden" />${q.ans || "未輸入"}</span>
                            </div>
                        </div>

                        <div class="p-6 space-y-6">
                            ${q.choices && q.choices.length > 0 ? `<section><h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">選擇題</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${generateChoicesHtml(q.choices, q.id, q.ans, true, 'list')}</div></section>` : ''}
                            
                            <section class="secret-target transition-all duration-500 delay-100">
                                <h3 class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wider">聽力內容</h3>
                                <div class="space-y-3">${generateScriptHtml(q.script, q.id, 'list')}</div>
                            </section>

                            <section class="bg-amber-50 border border-amber-200 rounded-lg p-4 secret-target transition-all duration-500 delay-300">
                                <div class="flex items-center gap-2 text-amber-800 font-bold mb-2">
                                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i><h4>解析</h4>
                                </div>
                                <div class="text-amber-900 text-sm leading-relaxed">
                                    ${q.meta}
                                    ${generateExplanationsHtml(q.explanations)}
                                </div>
                            </section>
                        </div>
                    </article>
                `;
            });
            container.innerHTML = html;
        }

        // ==========================================
        // 2. フラッシュカードのロジック (アップデート版)
        // ==========================================
        let fcTargetQuestions = [];
        let allVocabs = [];
        
        let vocabTestQueue = [];
        let sentenceTestQueue = [];
        
        let fcMode = 'vocab';
        let currentCardIndex = 0;
        
        let isVocabAnswered = false;
        let lastVocabAnswer = null;
        
        let isSentenceRevealed = false;

        function initFlashcardsData() {
            fcTargetQuestions = questionsData; 
            
            const vocabMap = new Map();
            fcTargetQuestions.forEach(q => {
                if (q.vocab) {
                    q.vocab.forEach(v => {
                        // 不正解の選択肢を作るため、日本語訳が存在するものだけを抽出
                        if (!vocabMap.has(v.word) && v.jp && !v.jp.includes('不正解')) {
                            vocabMap.set(v.word, v);
                        }
                    });
                }
            });
            allVocabs = Array.from(vocabMap.values());
        }

        function generateVocabChoices(correctVocab) {
            const allJps = allVocabs.map(v => v.jp).filter(jp => jp !== correctVocab.jp);
            const shuffledJps = allJps.sort(() => Math.random() - 0.5);
            const choices = [correctVocab.jp];
            for (let i = 0; i < 3 && i < shuffledJps.length; i++) {
                choices.push(shuffledJps[i]);
            }
            return choices.sort(() => Math.random() - 0.5);
        }

        function setFlashcardMode(mode) {
            if (fcTargetQuestions.length === 0) initFlashcardsData();
            fcMode = mode;
            currentCardIndex = 0;

            if (mode === 'vocab') {
                document.getElementById('fc-mode-vocab').className = "px-6 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-sentence').className = "px-6 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                
                // 4択問題用のキューを作成
                vocabTestQueue = [...allVocabs].sort(() => Math.random() - 0.5).map(v => ({
                    ...v,
                    choices: generateVocabChoices(v)
                }));
                isVocabAnswered = false;
                lastVocabAnswer = null;
            } else {
                document.getElementById('fc-mode-sentence').className = "px-6 py-2 rounded-md text-sm font-bold bg-white text-indigo-700 shadow-sm transition-all";
                document.getElementById('fc-mode-vocab').className = "px-6 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                
                // 問題まるっと出題(会話)用のキューを作成
                sentenceTestQueue = [...fcTargetQuestions].sort(() => Math.random() - 0.5);
                isSentenceRevealed = false;
            }
            renderFlashcard();
        }

        function handleCardClick() {
            if (fcMode === 'sentence' && !isSentenceRevealed) {
                isSentenceRevealed = true;
                renderFlashcard();
            }
        }

        function answerVocab(choice) {
            if (isVocabAnswered) return;
            lastVocabAnswer = choice;
            isVocabAnswered = true;
            renderFlashcard();
        }

        function nextCard() {
            window.speechSynthesis.cancel();
            const maxLen = fcMode === 'vocab' ? vocabTestQueue.length : sentenceTestQueue.length;
            if (currentCardIndex < maxLen - 1) {
                currentCardIndex++;
                isVocabAnswered = false;
                lastVocabAnswer = null;
                isSentenceRevealed = false;
                renderFlashcard();
            }
        }

        function prevCard() {
            window.speechSynthesis.cancel();
            if (currentCardIndex > 0) {
                currentCardIndex--;
                isVocabAnswered = false;
                lastVocabAnswer = null;
                isSentenceRevealed = false;
                renderFlashcard();
            }
        }

        function reshuffleCards() {
            window.speechSynthesis.cancel();
            setFlashcardMode(fcMode);
        }

        function renderFlashcard() {
            const container = document.getElementById('flashcard-container');
            const maxLen = fcMode === 'vocab' ? vocabTestQueue.length : sentenceTestQueue.length;
            
            if (maxLen === 0) {
                 container.innerHTML = '<div class="text-center p-8 text-slate-500">沒有資料。</div>';
                 return;
            }

            document.getElementById('fc-counter').innerText = `${currentCardIndex + 1} / ${maxLen}`;
            
            let contentHtml = '';

            if (fcMode === 'vocab') {
                const item = vocabTestQueue[currentCardIndex];
                
                if (!isVocabAnswered) {
                    contentHtml = `
                        <div class="text-center mb-10 mt-4">
                            <p class="text-slate-500 mb-6 font-bold tracking-wide">音声を聽いて、正しい意味を選んでください</p>
                            <button id="fc-vocab-play" onclick="event.stopPropagation(); speakText('${item.speak.replace(/'/g, "\\'")}', 'fc-vocab-play', true)" class="bg-indigo-100 text-indigo-700 border-2 border-indigo-300 font-bold py-5 px-10 rounded-full shadow-md hover:bg-indigo-200 transition-colors inline-flex items-center gap-3 text-xl">
                                <i data-lucide="volume-2" class="w-8 h-8"></i> 音声を聽く
                            </button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-xl mx-auto">
                            ${item.choices.map((choice, idx) => `
                                <button onclick="event.stopPropagation(); answerVocab('${choice.replace(/'/g, "\\'")}')" class="p-4 bg-white border-2 border-slate-200 rounded-xl shadow-sm hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 transition-all text-slate-700 font-bold text-center h-full flex items-center justify-center min-h-[6rem] leading-relaxed text-sm sm:text-base">
                                    ${choice}
                                </button>
                            `).join('')}
                        </div>
                    `;
                } else {
                    const isCorrect = lastVocabAnswer === item.jp;
                    contentHtml = `
                        <div class="text-center mb-8 mt-4 animate-fade-in">
                            <div class="inline-flex items-center justify-center p-4 rounded-full ${isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} mb-6 shadow-inner">
                                <i data-lucide="${isCorrect ? 'check-circle' : 'x-circle'}" class="w-12 h-12"></i>
                            </div>
                            <div class="text-3xl sm:text-4xl font-bold text-slate-800 mb-4 tracking-wide leading-snug">${item.word}</div>
                            <div class="text-lg sm:text-xl text-slate-500 font-mono mb-6 bg-slate-100 inline-block px-4 py-2 rounded-md leading-relaxed break-all max-w-full">${item.pinyin}</div>
                            <div class="text-xl font-bold text-indigo-700 leading-relaxed">${item.jp}</div>
                        </div>
                        <div class="flex justify-center gap-4 mt-10">
                            <button onclick="event.stopPropagation(); speakText('${item.speak.replace(/'/g, "\\'")}', 'fc-vocab-play-after', true)" id="fc-vocab-play-after" class="p-4 rounded-full bg-slate-100 text-slate-500 hover:bg-indigo-100 hover:text-indigo-600 transition-colors border border-slate-200">
                                <i data-lucide="volume-2" class="w-6 h-6"></i>
                            </button>
                            <button onclick="event.stopPropagation(); nextCard()" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-full shadow hover:bg-indigo-700 transition-colors flex items-center gap-2 text-lg">
                                次の問題 <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                }
            } else {
                // 問題まるっと出題 (会話)
                const item = sentenceTestQueue[currentCardIndex];
                
                if (!isSentenceRevealed) {
                    contentHtml = `
                        <div class="text-center mb-10 mt-8">
                            <div class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">${item.sectionName || '聽力測驗'}</div>
                            <h3 class="text-3xl font-bold text-slate-800 mb-8">第 ${item.id} 題</h3>
                            <div class="flex flex-wrap justify-center gap-3 sm:gap-4 mb-12">
                                <button id="fc-sent-play-1" onclick="event.stopPropagation(); playConversation(${item.id}, 'fc-sent-play-1', 1)" class="bg-indigo-100 text-indigo-700 border-2 border-indigo-300 font-bold py-3 px-5 sm:px-6 rounded-full shadow-md hover:bg-indigo-200 transition-colors inline-flex items-center gap-2 text-base sm:text-lg">
                                    <i data-lucide="play-circle" class="w-6 h-6"></i> 1回再生
                                </button>
                                <button id="fc-sent-play-2" onclick="event.stopPropagation(); playConversation(${item.id}, 'fc-sent-play-2', 2)" class="bg-indigo-100 text-indigo-700 border-2 border-indigo-300 font-bold py-3 px-5 sm:px-6 rounded-full shadow-md hover:bg-indigo-200 transition-colors inline-flex items-center gap-2 text-base sm:text-lg">
                                    <i data-lucide="play-circle" class="w-6 h-6"></i> 2回再生
                                </button>
                                <button id="fc-sent-play-3" onclick="event.stopPropagation(); playConversation(${item.id}, 'fc-sent-play-3', 3)" class="bg-indigo-100 text-indigo-700 border-2 border-indigo-300 font-bold py-3 px-5 sm:px-6 rounded-full shadow-md hover:bg-indigo-200 transition-colors inline-flex items-center gap-2 text-base sm:text-lg">
                                    <i data-lucide="play-circle" class="w-6 h-6"></i> 3回再生
                                </button>
                                <button id="fc-sent-play-4" onclick="event.stopPropagation(); playConversation(${item.id}, 'fc-sent-play-4', 4)" class="bg-indigo-100 text-indigo-700 border-2 border-indigo-300 font-bold py-3 px-5 sm:px-6 rounded-full shadow-md hover:bg-indigo-200 transition-colors inline-flex items-center gap-2 text-base sm:text-lg">
                                    <i data-lucide="play-circle" class="w-6 h-6"></i> 4回再生
                                </button>
                            </div>
                            <p class="text-slate-500 font-medium bg-slate-100 inline-block px-6 py-3 rounded-lg"><i data-lucide="mouse-pointer-click" class="w-5 h-5 inline-block align-text-bottom mr-1 text-slate-400"></i> カードをクリック、またはSpaceキーで解答・解説を表示</p>
                        </div>
                    `;
                } else {
                    contentHtml = `
                        <div class="w-full text-left animate-fade-in">
                            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 border-b border-slate-200 pb-4 gap-4">
                                <div>
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1">${item.sectionName || '聽力測驗'}</span>
                                    <h3 class="text-2xl font-bold text-slate-800">第 ${item.id} 題 解答・解析</h3>
                                </div>
                                <button onclick="event.stopPropagation(); playConversation(${item.id}, 'fc-sent-play-after', 1)" id="fc-sent-play-after" class="p-3 rounded-full bg-slate-100 text-slate-500 hover:bg-indigo-100 hover:text-indigo-600 transition-colors shrink-0">
                                    <i data-lucide="play-circle" class="w-6 h-6"></i>
                                </button>
                            </div>
                            
                            <div class="bg-emerald-50 text-emerald-800 px-5 py-4 rounded-xl font-bold mb-8 flex items-center gap-3 text-lg border border-emerald-100 shadow-sm">
                                <i data-lucide="check-circle" class="w-6 h-6 text-emerald-600 shrink-0"></i> 重點: ${item.ans || "句子理解"}
                            </div>

                            ${item.choices && item.choices.length > 0 ? `
                            <div class="space-y-4 mb-8">
                                <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"><i data-lucide="list" class="w-4 h-4"></i> 選擇題</h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                    ${generateChoicesHtml(item.choices, item.id, item.ans, false, 'fc')}
                                </div>
                            </div>
                            ` : ''}

                            <div class="space-y-4 mb-8">
                                <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> 聽力內容</h4>
                                <div class="space-y-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                    ${generateScriptHtml(item.script, `fc-sent-${item.id}`, 'fc')}
                                </div>
                            </div>
                            
                            <div class="space-y-4 mb-8">
                                <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"><i data-lucide="lightbulb" class="w-4 h-4 text-amber-500"></i> 解析</h4>
                                <div class="bg-amber-50 border border-amber-200 rounded-xl p-5 text-amber-900 text-sm leading-relaxed shadow-sm font-medium">
                                    ${item.meta}
                                    ${generateExplanationsHtml(item.explanations)}
                                </div>
                            </div>

                            <div class="flex justify-end pt-4 border-t border-slate-100">
                                <button onclick="event.stopPropagation(); nextCard()" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg shadow hover:bg-indigo-700 transition-colors flex items-center gap-2">
                                    下一題 <i data-lucide="arrow-right" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = `
                <div class="relative w-full min-h-[300px] bg-slate-50 rounded-2xl border-2 border-slate-200 p-6 md:p-10 flex flex-col justify-center items-center hover:border-indigo-200 transition-all shadow-sm">
                    <div class="absolute top-4 left-4 px-3 py-1 rounded bg-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest z-20">${(fcMode === 'vocab' && isVocabAnswered) || (fcMode === 'sentence' && isSentenceRevealed) ? 'Answer / Explanation' : 'Question'}</div>
                    <div class="w-full mt-6">${contentHtml}</div>
                </div>
            `;
            lucide.createIcons({root: container});
        }

        // キーボードショートカット
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('flashcard-view').classList.contains('hidden')) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (fcMode === 'sentence' && !isSentenceRevealed) {
                        isSentenceRevealed = true;
                        renderFlashcard();
                    }
                } else if (e.code === 'ArrowRight') nextCard();
                else if (e.code === 'ArrowLeft') prevCard();
            }
        });

        // ==========================================
        // 初期化
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderListView();
            lucide.createIcons();

            // 音声スピードスライダーのイベントリスナー設定
            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.getElementById('speed-display');
            speedSlider.addEventListener('input', (e) => {
                currentSpeechRate = parseFloat(e.target.value);
                speedDisplay.innerText = currentSpeechRate.toFixed(2) + 'x';
            });
        });
    </script>
</body>
</html>
