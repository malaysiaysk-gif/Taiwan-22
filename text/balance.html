<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退職カウントダウン - 12月8日へ向けて</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }
        .pulse-text {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-4xl">
        
        <!-- カウントダウン セクション -->
        <section class="bg-white rounded-2xl shadow-lg p-6 md:p-10 text-center border-t-4 border-indigo-500">
            <h2 class="text-xl md:text-2xl font-bold text-gray-700 mb-6">12月8日まで、あと...</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-indigo-50 py-4 rounded-xl shadow-sm">
                    <div id="cd-days" class="text-4xl md:text-5xl font-black text-indigo-600">--</div>
                    <div class="text-sm font-bold text-indigo-400 mt-1">出勤日</div>
                </div>
                <div class="bg-indigo-50 py-4 rounded-xl shadow-sm">
                    <div id="cd-hours" class="text-4xl md:text-5xl font-black text-indigo-600">--</div>
                    <div class="text-sm font-bold text-indigo-400 mt-1">時間</div>
                </div>
                <div class="bg-indigo-50 py-4 rounded-xl shadow-sm">
                    <div id="cd-mins" class="text-4xl md:text-5xl font-black text-indigo-600">--</div>
                    <div class="text-sm font-bold text-indigo-400 mt-1">分</div>
                </div>
                <div class="bg-indigo-50 py-4 rounded-xl shadow-sm">
                    <div id="cd-secs" class="text-4xl md:text-5xl font-black text-indigo-600">--</div>
                    <div class="text-sm font-bold text-indigo-400 mt-1">秒</div>
                </div>
            </div>

            <div class="bg-gray-900 rounded-xl p-6 shadow-inner">
                <p class="text-gray-400 text-sm font-bold mb-2 tracking-widest">総残り秒数 (リアルタイム更新)</p>
                <div id="cd-total-secs" class="text-5xl md:text-7xl font-mono font-black text-red-500 pulse-text tracking-tighter">
                    --
                </div>
            </div>
            
            <!-- 退職届提出 カウントダウン -->
            <div class="mt-6 bg-red-50 border border-red-200 rounded-xl p-4 flex flex-col md:flex-row items-center justify-center shadow-sm">
                <i class="fa-solid fa-envelope-open-text text-red-500 text-2xl mb-2 md:mb-0 md:mr-3"></i>
                <div class="text-gray-700 font-bold text-center md:text-left">
                    退職届の提出期限 (9月18日) まで、あと <span id="notice-days" class="text-3xl font-black text-red-600 mx-1">--</span> 日
                </div>
            </div>

            <!-- プログレスバー -->
            <div class="mt-8">
                <div class="flex justify-between text-xs font-bold text-gray-500 mb-1">
                    <span>5月1日 8:00</span>
                    <span id="progress-text">--% | 状態確認中</span>
                    <span>12月8日 17:00</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4 shadow-inner">
                    <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- おもしろスケール表示 -->
            <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 text-left">
                <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 shadow-sm">
                    <div class="text-xs text-indigo-400 font-bold mb-2">👶 人生 (80年) で例えると...</div>
                    <div id="scale-life" class="font-bold text-gray-700 text-sm leading-tight">--</div>
                </div>
                <div class="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100 shadow-sm">
                    <div class="text-xs text-yellow-500 font-bold mb-2">🛕 ピラミッド (全210段) なら...</div>
                    <div id="scale-pyramid" class="font-bold text-gray-700 text-sm leading-tight">--</div>
                </div>
                <div class="bg-red-50/50 p-4 rounded-xl border border-red-100 shadow-sm">
                    <div class="text-xs text-red-400 font-bold mb-2">🏛️ ローマの歴史 で言うと...</div>
                    <div id="scale-rome" class="font-bold text-gray-700 text-sm leading-tight">--</div>
                </div>
            </div>

            <!-- カレンダー セクション -->
            <div class="mt-12 text-left">
                <div class="flex flex-col md:flex-row items-center justify-between mb-4 border-t border-gray-100 pt-8">
                    <h3 class="text-xl font-bold text-gray-700 mb-3 md:mb-0">
                        <i class="fa-regular fa-calendar-days text-indigo-500 mr-2"></i> 2026年12月 スケジュール
                    </h3>
                    <div class="flex items-center space-x-4 text-xs font-bold text-gray-500 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                        <span class="flex items-center"><span class="w-3 h-3 bg-sky-500 rounded-sm mr-1.5 shadow-sm"></span>有給・代休等</span>
                        <span class="flex items-center"><span class="w-3 h-3 bg-emerald-600 rounded-sm mr-1.5 shadow-sm"></span>祝日・イベント</span>
                    </div>
                </div>
                
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden text-sm">
                    <!-- 曜日ヘッダー -->
                    <div class="grid grid-cols-7 border-b border-gray-200 bg-gray-50 text-center text-xs font-bold text-gray-500">
                        <div class="py-2 text-red-400">日</div>
                        <div class="py-2">月</div>
                        <div class="py-2">火</div>
                        <div class="py-2">水</div>
                        <div class="py-2">木</div>
                        <div class="py-2">金</div>
                        <div class="py-2 text-blue-400">土</div>
                    </div>
                    
                    <!-- カレンダーグリッド -->
                    <div id="calendar-grid" class="grid grid-cols-7 auto-rows-[minmax(80px,auto)] md:auto-rows-[minmax(100px,auto)] bg-gray-200 gap-px">
                        <!-- JSで生成されます -->
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        // 目標日時: 2026年12月8日 00:00:00
        const targetDate = new Date('2026-12-08T00:00:00').getTime();
        const startDate = new Date('2026-05-01T00:00:00').getTime();
        // 退職届提出日: 2026年9月18日 00:00:00
        const noticeDate = new Date('2026-09-18T00:00:00').getTime();
        
        // 2026年の日本の祝日（5月〜12月）
        const holidays2026 = [
            '2026-05-03', // 憲法記念日
            '2026-05-04', // みどりの日
            '2026-05-05', // こどもの日
            '2026-05-06', // 振替休日
            '2026-07-20', // 海の日
            '2026-08-11', // 山の日
            '2026-09-21', // 敬老の日
            '2026-09-22', // 国民の休日 (シルバーウィーク連休)
            '2026-09-23', // 秋分の日
            '2026-10-12', // スポーツの日
            '2026-11-03', // 文化の日
            '2026-11-23', // 勤労感謝の日
        ];

        // 業務時間（平日 8:00〜17:00、祝日除く）のミリ秒を計算する関数
        function calculateWorkingTimeMs(startTimestamp, endTimestamp) {
            if (startTimestamp >= endTimestamp) return 0;
            
            let totalMs = 0;
            let current = new Date(startTimestamp);
            
            while (current.getTime() < endTimestamp) {
                const year = current.getFullYear();
                const month = String(current.getMonth() + 1).padStart(2, '0');
                const date = String(current.getDate()).padStart(2, '0');
                const dateString = `${year}-${month}-${date}`;
                
                const dayOfWeek = current.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isHoliday = holidays2026.includes(dateString);
                
                // 営業日の場合
                if (!isWeekend && !isHoliday) {
                    const workStart = new Date(current);
                    workStart.setHours(8, 0, 0, 0);
                    const workEnd = new Date(current);
                    workEnd.setHours(17, 0, 0, 0);
                    
                    const calcStart = Math.max(current.getTime(), workStart.getTime());
                    const calcEnd = Math.min(endTimestamp, workEnd.getTime());
                    
                    if (calcStart < calcEnd) {
                        totalMs += (calcEnd - calcStart);
                    }
                }
                
                // 翌日の 00:00:00 に進める
                current.setDate(current.getDate() + 1);
                current.setHours(0, 0, 0, 0);
            }
            
            return totalMs;
        }

        // 現在日時からの残り出勤日数を計算する関数
        function getRemainingWorkingDays() {
            const end = new Date('2026-12-08T00:00:00'); 
            let workingDays = 0;
            let current = new Date();
            current.setHours(0,0,0,0);

            // 5月1日より前なら、5月1日を起点とする
            const minStart = new Date('2026-05-01T00:00:00');
            if (current < minStart) {
                current = new Date(minStart);
            }

            while (current < end) {
                const dayOfWeek = current.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                
                const year = current.getFullYear();
                const month = String(current.getMonth() + 1).padStart(2, '0');
                const date = String(current.getDate()).padStart(2, '0');
                const dateString = `${year}-${month}-${date}`;

                const isHoliday = holidays2026.includes(dateString);

                if (!isWeekend && !isHoliday) {
                    workingDays++;
                }
                current.setDate(current.getDate() + 1);
            }
            // 有給(8)と病欠(10)を引く
            return Math.max(0, workingDays - 18);
        }

        // カウントダウン更新関数
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                // 退職日を過ぎた場合
                document.getElementById('cd-days').innerText = "0";
                document.getElementById('cd-hours').innerText = "0";
                document.getElementById('cd-mins').innerText = "0";
                document.getElementById('cd-secs').innerText = "0";
                document.getElementById('cd-total-secs').innerText = "0";
                document.getElementById('progress-bar').style.width = "100%";
                document.getElementById('progress-text').innerText = "100% 完了 - 自由です！";
                return;
            }

            // 出勤日、時間、分、秒の計算
            const workingDaysLeft = getRemainingWorkingDays();
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // 総残り秒数の計算
            const totalSeconds = Math.floor(distance / 1000);

            // 退職届提出までの日数計算 (暦上の日数)
            const noticeDistance = noticeDate - now;
            let noticeDays = 0;
            if (noticeDistance > 0) {
                noticeDays = Math.floor(noticeDistance / (1000 * 60 * 60 * 24));
            } else if (noticeDistance <= 0 && distance > 0) {
                noticeDays = "提出済！"; 
            }

            // DOMへ反映
            document.getElementById('cd-days').innerText = workingDaysLeft;
            document.getElementById('cd-hours').innerText = hours;
            document.getElementById('cd-mins').innerText = minutes;
            document.getElementById('cd-secs').innerText = seconds;
            document.getElementById('cd-total-secs').innerText = totalSeconds.toLocaleString('en-US');
            
            const noticeDaysElement = document.getElementById('notice-days');
            if (typeof noticeDays === "number") {
                noticeDaysElement.innerText = noticeDays;
            } else {
                noticeDaysElement.innerText = noticeDays;
                noticeDaysElement.classList.remove('text-3xl');
                noticeDaysElement.classList.add('text-xl');
            }

            // プログレスバーの計算 (業務時間ベース: 5/1 8:00 〜 12/8 17:00)
            const targetWorkEnd = new Date('2026-12-08T17:00:00').getTime();
            const startWorkBegin = new Date('2026-05-01T08:00:00').getTime();
            
            const totalWorkMs = calculateWorkingTimeMs(startWorkBegin, targetWorkEnd);
            const passedWorkMs = calculateWorkingTimeMs(startWorkBegin, now);
            
            let progressPercentage = 0;
            if (totalWorkMs > 0) {
                progressPercentage = (passedWorkMs / totalWorkMs) * 100;
            }
            // 0%〜100%の間に収める
            progressPercentage = Math.max(0, Math.min(100, progressPercentage));
            
            document.getElementById('progress-bar').style.width = progressPercentage + "%";
            
            // 現在が業務時間内かどうか判定してステータス表示
            const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
            const isWeekendNow = (new Date().getDay() === 0 || new Date().getDay() === 6);
            const isHolidayNow = holidays2026.includes(todayStr);
            const hourNow = new Date().getHours();
            const isWorkingHoursNow = (!isWeekendNow && !isHolidayNow && hourNow >= 8 && hourNow < 17);

            if (isWorkingHoursNow) {
                document.getElementById('progress-text').innerHTML = `<span class="text-green-600 font-black">▶ 業務中 (現在: ${progressPercentage.toFixed(5)}%)</span>`;
            } else {
                document.getElementById('progress-text').innerHTML = `<span class="text-orange-500 font-bold">⏸ 業務外 (現在の進捗 ${progressPercentage.toFixed(5)}% を保持中)</span>`;
            }

            // --- おもしろスケール表示の計算 ---
            
            // 1. 人生スケール (80歳換算)
            const lifeAge = Math.floor((progressPercentage / 100) * 80);
            let lifeText = `${lifeAge}歳 `;
            if (progressPercentage === 0) lifeText = "0歳<br><span class='text-xs text-gray-500'>(オギャー！産まれたて)</span>";
            else if (progressPercentage >= 100) lifeText = "80歳<br><span class='text-xs text-gray-500'>(大往生・新たな来世へ！)</span>";
            else if (lifeAge < 10) lifeText += "<br><span class='text-xs text-gray-500'>(まだまだこれから！)</span>";
            else if (lifeAge < 20) lifeText += "<br><span class='text-xs text-gray-500'>(青春真っ只中！一番楽しい時期)</span>";
            else if (lifeAge < 30) lifeText += "<br><span class='text-xs text-gray-500'>(社会の荒波に揉まれ中...)</span>";
            else if (lifeAge < 40) lifeText += "<br><span class='text-xs text-gray-500'>(働き盛り・中間管理職の悲哀)</span>";
            else if (lifeAge < 50) lifeText += "<br><span class='text-xs text-gray-500'>(人生の折り返し地点)</span>";
            else if (lifeAge < 60) lifeText += "<br><span class='text-xs text-gray-500'>(酸いも甘いも噛み分けた)</span>";
            else if (lifeAge < 70) lifeText += "<br><span class='text-xs text-gray-500'>(悠々自適の準備中)</span>";
            else lifeText += "<br><span class='text-xs text-gray-500'>(悟りの境地・もうすぐゴール！)</span>";

            // 2. ピラミッドスケール (約210段換算)
            const pyramidSteps = Math.floor((progressPercentage / 100) * 210);
            let pyramidText = `第${pyramidSteps}段目 `;
            if (progressPercentage === 0) pyramidText = "0段目<br><span class='text-xs text-gray-500'>(更地の測量中・先は長い)</span>";
            else if (progressPercentage >= 100) pyramidText = "210段目<br><span class='text-xs text-gray-500'>(キャップストーン設置！歴史に名を刻む)</span>";
            else if (pyramidSteps < 50) pyramidText += "<br><span class='text-xs text-gray-500'>(土台作りが一番しんどい)</span>";
            else if (pyramidSteps < 100) pyramidText += "<br><span class='text-xs text-gray-500'>(形が見えてきて少し楽しい)</span>";
            else if (pyramidSteps < 150) pyramidText += "<br><span class='text-xs text-gray-500'>(高所作業で足がすくむ)</span>";
            else pyramidText += "<br><span class='text-xs text-gray-500'>(頂上はもうすぐそこ！)</span>";

            // 3. ローマの歴史スケール (約1200年の歴史)
            let romeText = "";
            if (progressPercentage === 0) romeText = "ロムルスによるローマ建国<br><span class='text-xs text-gray-500'>(伝説の始まり・まだ小さな集落)</span>";
            else if (progressPercentage >= 100) romeText = "西ローマ帝国滅亡<br><span class='text-xs text-gray-500'>(古代の終わり・全ての軛から解き放たれた！)</span>";
            else if (progressPercentage < 10) romeText = "王政ローマ時代<br><span class='text-xs text-gray-500'>(7人の王の時代・基礎固め)</span>";
            else if (progressPercentage < 20) romeText = "共和政初期・十二表法制定<br><span class='text-xs text-gray-500'>(法律ができて社会が整い始める)</span>";
            else if (progressPercentage < 30) romeText = "ポエニ戦争・ハンニバル戦<br><span class='text-xs text-gray-500'>(最大の危機・カルタゴとの死闘)</span>";
            else if (progressPercentage < 45) romeText = "内乱の一世紀・カエサル暗殺<br><span class='text-xs text-gray-500'>(ブルータスお前もか・大激動期)</span>";
            else if (progressPercentage < 60) romeText = "アウグストゥス・帝政移行<br><span class='text-xs text-gray-500'>(初代皇帝・平和の始まり)</span>";
            else if (progressPercentage < 75) romeText = "五賢帝時代<br><span class='text-xs text-gray-500'>(パクス・ロマーナ・一番安定して平和)</span>";
            else if (progressPercentage < 85) romeText = "軍人皇帝時代<br><span class='text-xs text-gray-500'>(大混乱期・毎日がサバイバル)</span>";
            else if (progressPercentage < 95) romeText = "コンスタンティヌス・キリスト教公認<br><span class='text-xs text-gray-500'>(新体制構築・時代の転換点)</span>";
            else romeText = "東西ローマ分裂<br><span class='text-xs text-gray-500'>(帝国は真っ二つ・ラストスパート)</span>";

            // DOMへ反映
            document.getElementById('scale-life').innerHTML = lifeText;
            document.getElementById('scale-pyramid').innerHTML = pyramidText;
            document.getElementById('scale-rome').innerHTML = romeText;
        }

        // --- 12月カレンダーの描画関数 ---
        function renderCalendar() {
            // カレンダーのデータ定義
            const calendarDays = [
                // 1週目
                { date: 29, currentMonth: false, events: [] },
                { date: 30, currentMonth: false, events: [] },
                { date: 1, currentMonth: true, events: [] },
                { date: 2, currentMonth: true, events: [] },
                { date: 3, currentMonth: true, events: [] },
                { date: 4, currentMonth: true, events: [ { text: 'LAST DAY', type: 'blue', start: true, end: true } ] },
                { date: 5, currentMonth: true, events: [] },
                // 2週目
                { date: 6, currentMonth: true, events: [] },
                { date: 7, currentMonth: true, events: [ { text: '10 CO 11th Nov.', type: 'blue', start: true, end: true } ] },
                { date: 8, currentMonth: true, events: [ { text: 'AL 1st Dec. + 4.5', type: 'blue', start: true, end: false }, { text: '9', type: 'blue', start: true, end: false } ] },
                { date: 9, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: false }, { text: '8', type: 'blue', start: false, end: false } ] },
                { date: 10, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: false }, { text: '7', type: 'blue', start: false, end: false } ] },
                { date: 11, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: true }, { text: '6', type: 'blue', start: false, end: true } ] },
                { date: 12, currentMonth: true, events: [] },
                // 3週目
                { date: 13, currentMonth: true, events: [] },
                { date: 14, currentMonth: true, events: [ { text: 'AL 1st Oct. 4.5+1st Dec.0.5', type: 'blue', start: true, end: false }, { text: '5', type: 'blue', start: true, end: false } ] },
                { date: 15, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: false }, { text: '4', type: 'blue', start: false, end: false } ] },
                { date: 16, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: false }, { text: '3', type: 'blue', start: false, end: false } ] },
                { date: 17, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: false }, { text: '2', type: 'blue', start: false, end: false } ] },
                { date: 18, currentMonth: true, events: [ { text: '&nbsp;', type: 'blue', start: false, end: true }, { text: '1', type: 'blue', start: false, end: true } ] },
                { date: 19, currentMonth: true, events: [] },
                // 4週目
                { date: 20, currentMonth: true, events: [] },
                { date: 21, currentMonth: true, events: [] },
                { date: 22, currentMonth: true, events: [] },
                { date: 23, currentMonth: true, events: [] },
                { date: 24, currentMonth: true, events: [ { text: 'Christmas Eve', type: 'green', start: true, end: true } ] },
                { date: 25, currentMonth: true, events: [ { text: 'COが貰える日', type: 'blue', start: true, end: true }, { text: 'Christmas Day', type: 'green', start: true, end: true } ] },
                { date: 26, currentMonth: true, events: [] },
                // 5週目
                { date: 27, currentMonth: true, events: [] },
                { date: 28, currentMonth: true, events: [] },
                { date: 29, currentMonth: true, events: [] },
                { date: 30, currentMonth: true, events: [] },
                { date: 31, currentMonth: true, events: [ { text: "New Year's Eve", type: 'green', start: true, end: true } ] },
                { date: 1, currentMonth: false, monthText: '1月', events: [ { text: "New Year's Day (regional holiday)", type: 'green', start: true, end: true } ] },
                { date: 2, currentMonth: false, events: [] }
            ];

            const grid = document.getElementById('calendar-grid');
            if (!grid) return;

            let html = '';
            calendarDays.forEach(day => {
                const bgClass = day.currentMonth ? 'bg-white' : 'bg-gray-50';
                const textClass = day.currentMonth ? 'text-gray-700' : 'text-gray-400';
                const dateText = day.monthText ? `${day.monthText} ${day.date}日` : day.date;

                html += `<div class="${bgClass} py-1 flex flex-col min-h-[80px] md:min-h-[100px] hover:bg-gray-100 transition-colors">`;
                html += `<div class="text-xs text-center font-medium ${textClass} mb-1">${dateText}</div>`;
                
                day.events.forEach(ev => {
                    const colorClass = ev.type === 'blue' ? 'bg-sky-500' : 'bg-emerald-600';
                    
                    // 連続するイベントの角丸・マージン処理
                    let shapeClass = '';
                    if (ev.start && ev.end) { shapeClass = 'rounded mx-1'; }
                    else if (ev.start) { shapeClass = 'rounded-l ml-1 mr-0'; }
                    else if (ev.end) { shapeClass = 'rounded-r ml-0 mr-1'; }
                    else { shapeClass = 'rounded-none mx-0'; }
                    
                    html += `<div class="${colorClass} text-white text-[10px] md:text-xs font-bold px-1.5 py-0.5 mb-0.5 whitespace-nowrap overflow-hidden ${shapeClass} shadow-sm">${ev.text}</div>`;
                });
                
                html += `</div>`;
            });

            grid.innerHTML = html;
        }

        // 初期実行と1秒ごとのループ
        updateCountdown();
        setInterval(updateCountdown, 1000);
        renderCalendar(); // カレンダー描画

    </script>
</body>
</html>
